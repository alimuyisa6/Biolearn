        <style>
        :root {

        body.light-mode {

        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }

        .mobile-toggle:hover { background: var(--clr-magenta); color: white; }

        .mobile-nav-panel { position: fixed; top: 0; right: -100%; width: 70%; min-width: 260px; max-width: 350px; height: 100vh; background: linear-gradient(160deg, #0d0d24 0%, #13132e 45%, #1a1a3e 100%); box-shadow: -8px 0 40px rgba(0,0,0,0.6); z-index: 200; display: flex; flex-direction: column; opacity: 0; transition: right 0.3s ease, opacity 0.3s ease; }

        .mobile-nav-panel-inner { padding: 1.3rem; flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .mobile-nav-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1rem; border-bottom: 1px solid var(--clr-border-glow); margin-bottom: 1rem; }

        .mobile-close-btn:hover { background: var(--clr-magenta); color: white; transform: rotate(90deg); }

        .mobile-nav-links a:hover { background: rgba(255,0,170,0.15); color: var(--clr-magenta); transform: translateX(4px); }

        .mobile-signin-btn { color: var(--clr-cyan); }

        .mobile-signup-btn { background: var(--gradient-magenta); color: white !important; justify-content: center; margin-top: 0.5rem; display: flex; align-items: center; gap: 0.8rem; width: 100%; padding: 0.8rem; text-decoration: none; font-weight: 600; border-radius: var(--radius-md); transition: all var(--transition-fast); font-size: 0.9rem; cursor: pointer; border: none; box-shadow: var(--shadow-magenta); }
        .mobile-signup-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(255,0,170,0.4); }
        .mobile-user-info { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0.4rem 0.8rem; color: var(--clr-text-dim); font-size: 0.8rem; }
        .mobile-nav-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .mobile-nav-overlay.active { opacity: 1; pointer-events: auto; }

        .quiz-hero { background: linear-gradient(135deg, rgba(0,217,255,0.1) 0%, rgba(255,0,170,0.08) 100%); padding: 3rem 1rem; text-align: center; border-bottom: 1px solid var(--clr-border-glow); }
        .quiz-hero h1 { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3rem); background: var(--gradient-cyan); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.5rem; }
        .quiz-hero p { color: var(--clr-text-dim); max-width: 600px; margin: 0 auto; font-size: 0.95rem; }

        .section { max-width: var(--max-width); margin: 2.5rem auto; padding: 0 1.5rem; }
        .category-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; border-bottom: 1px solid var(--clr-border-glow); padding-bottom: 1rem; }
        .category-tab { background: transparent; border: 1.5px solid var(--clr-border-glow); color: var(--clr-text-dim); padding: 0.5rem 1.2rem; border-radius: 30px; cursor: pointer; transition: all var(--transition-fast); font-size: 0.85rem; font-weight: 500; }

        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .quiz-card { background: var(--clr-navy-card); border: 1px solid var(--clr-border-glow); border-radius: var(--radius-lg); padding: 1.5rem; transition: all var(--transition-smooth); cursor: pointer; }
        .quiz-card:hover { transform: translateY(-4px); border-color: var(--clr-violet); box-shadow: var(--shadow-violet); }
        .quiz-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .quiz-badge { padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .quiz-badge.pharmacy { background: rgba(0,217,255,0.15); color: var(--clr-cyan); }
        .quiz-badge.olevel { background: rgba(0,200,150,0.15); color: var(--clr-emerald); }
        .quiz-badge.alevel { background: rgba(124,77,255,0.15); color: var(--clr-violet); }
        .quiz-difficulty { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 20px; background: var(--clr-navy-light); color: var(--clr-text-muted); }
        .quiz-card h3 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--clr-white); }
        .quiz-card p { font-size: 0.85rem; color: var(--clr-text-dim); margin-bottom: 1rem; line-height: 1.5; }
        .quiz-meta { display: flex; gap: 1rem; margin-bottom: 1rem; font-size: 0.75rem; color: var(--clr-text-muted); }
        .quiz-meta i { margin-right: 0.3rem; }
        .quiz-progress { height: 4px; background: var(--clr-navy-light); border-radius: 2px; overflow: hidden; margin-bottom: 0.8rem; }
        .quiz-progress-bar { height: 100%; background: var(--gradient-emerald); width: 0%; transition: width 0.3s; }
        .quiz-status { font-size: 0.7rem; color: var(--clr-emerald); margin-bottom: 0.8rem; }
        .btn-start { background: var(--gradient-magenta); color: white; border: none; padding: 0.5rem 1rem; border-radius: 25px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all var(--transition-fast); width: 100%; }
        .btn-start:hover { transform: translateY(-2px); box-shadow: var(--shadow-magenta); }

        .quiz-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; overflow-y: auto; }
        .quiz-modal-content { background: var(--clr-navy-card); border-radius: var(--radius-lg); max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--clr-border-glow); }
        .quiz-modal-header { padding: 1.5rem; border-bottom: 1px solid var(--clr-border-glow); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--clr-navy-card); }
        .quiz-modal-header h2 { font-family: var(--font-display); font-size: 1.3rem; color: var(--clr-cyan); }
        .close-modal { background: transparent; border: none; color: var(--clr-text-dim); font-size: 1.5rem; cursor: pointer; transition: all var(--transition-fast); }
        .close-modal:hover { color: var(--clr-magenta); transform: rotate(90deg); }
        .quiz-question { padding: 1.5rem; border-bottom: 1px solid var(--clr-border-glow); }

        .option { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem; background: var(--clr-navy-light); border-radius: var(--radius-md); cursor: pointer; transition: all var(--transition-fast); border: 1px solid transparent; }
        .option:hover { border-color: var(--clr-cyan); background: rgba(0,217,255,0.05); }
        .option.selected { border-color: var(--clr-magenta); background: rgba(255,0,170,0.1); }
        .option-prefix { font-weight: 700; color: var(--clr-cyan); width: 30px; }
        .option-text { flex: 1; font-size: 0.9rem; }
        .quiz-footer { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; background: var(--clr-navy-card); position: sticky; bottom: 0; }
        .btn-nav { background: var(--clr-navy-light); border: none; padding: 0.6rem 1.2rem; border-radius: 25px; color: var(--clr-white); cursor: pointer; transition: all var(--transition-fast); font-size: 0.85rem; }
        .btn-nav:hover:not(:disabled) { background: var(--clr-cyan); color: #0b0b1a; }
        .btn-nav:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-submit { background: var(--gradient-emerald); color: #0b0b1a; border: none; padding: 0.6rem 1.5rem; border-radius: 25px; font-weight: 600; cursor: pointer; transition: all var(--transition-fast); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(0,200,150,0.4); }
        .question-counter { font-size: 0.8rem; color: var(--clr-text-muted); }

        .result-modal { text-align: center; padding: 2rem; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: var(--gradient-cyan); display: flex; align-items: center; justify-content: center; margin: 1.5rem auto; }
        .score-number { font-size: 3rem; font-weight: 700; color: #0b0b1a; }
        .result-status { font-size: 1.5rem; margin-bottom: 1rem; }
        .result-status.passed { color: var(--clr-emerald); }
        .result-status.failed { color: var(--clr-magenta); }
        .reaction-buttons { display: flex; gap: 1rem; justify-content: center; margin: 1.5rem 0; }
        .reaction-btn { background: var(--clr-navy-light); border: none; padding: 0.6rem 1.2rem; border-radius: 30px; color: var(--clr-white); cursor: pointer; transition: all var(--transition-fast); font-size: 1rem; }

        .form-input, .form-textarea { width: 100%; padding: 0.8rem 1.2rem; background: var(--clr-navy-card); border: 1.5px solid var(--clr-border-glow); border-radius: 30px; color: var(--clr-white); font-family: var(--font-body); font-size: 0.9rem; transition: all var(--transition-fast); }

        .footer-col h4 { font-family: var(--font-display); color: var(--clr-cyan); font-weight: 600; margin-bottom: 0.8rem; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; }

        .footer-col a { color: var(--clr-text-dim); text-decoration: none; font-size: 0.8rem; transition: color var(--transition-fast); }
        .footer-col a:hover { color: var(--clr-magenta); }
        .footer-social { display: flex; gap: 0.8rem; margin-top: 0.8rem; }
        .footer-social a { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--clr-cyan); display: inline-flex; align-items: center; justify-content: center; color: var(--clr-cyan); transition: all var(--transition-fast); }

        @media (max-width: 768px) {

            .category-tab { padding: 0.3rem 0.8rem; font-size: 0.75rem; }

        }
    </style>
</head>

    <main id="main-content">
        <div class="quiz-hero">
            <h1><i class="fa-solid fa-brain"></i> Interactive Quizzes</h1>
            <p>Test your knowledge, track your progress, and earn recognition for your expertise in biology and pharmacy.</p>
        </div>

        <div class="section">
            <div class="category-tabs" id="category-tabs">
                <button class="category-tab active" data-category="all">All Quizzes</button>
                <button class="category-tab" data-category="pharmacy">Pharmacy</button>
                <button class="category-tab" data-category="olevel">O-Level Biology</button>
                <button class="category-tab" data-category="alevel">A-Level Biology</button>
                <button class="category-tab" data-category="my-progress">My Progress</button>
            </div>

            <div id="quizzes-container">
                <div class="spinner"><i class="fa-solid fa-dna"></i><p>Loading quizzes...</p></div>
            </div>
        </div>
    </main>

    <footer class="footer-fat">
        <div class="footer-grid" id="footer-grid"></div>
        <div class="footer-bottom"><p>&copy; <span id="current-year"></span> AliverBiopharm. All rights reserved.</p></div>
    </footer>

    <button class="back-to-top" id="back-to-top"><i class="fa-solid fa-arrow-up"></i></button>

    <script>
    const MAIN_API = '/api/query';
    const QUIZ_API = '/api/quiz2';
    let currentQuiz = null;
    let currentAnswers = [];
    let quizStartTime = null;
    let currentQuestionIndex = 0;

    function getToken() { return localStorage.getItem('sb-token'); }
    function isTokenExpired() {
        const token = getToken();
        if (!token) return true;
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            return (payload.exp * 1000) < Date.now();
        } catch(e) { return true; }
    }
    function isLoggedIn() { return !!getToken() && !isTokenExpired(); }

    async function apiCall(action, params = {}) {
        const token = getToken();
        const headers = { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        
        try {
            const res = await fetch(API_BASE, {
                method: 'POST',
                headers,
                body: JSON.stringify({ action, ...params })
            });
            if (res.status === 401) { localStorage.removeItem('sb-token'); localStorage.removeItem('sb-email'); updateMobileNav(); return null; }
            const json = await res.json();
            if (!res.ok) throw new Error(json.error || 'Request failed');
            return json.data !== undefined ? json.data : json;
        } catch (err) { console.error('API Error:', err); return null; }
    }

    function esc(t) { const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }; return String(t || '').replace(/[&<>"']/g, c => m[c]); }

    async function loadNavigationAndFooter() {
        try {
            const sections = await apiCall('get_all_site_sections');
            if (!sections) return;
            
            if (sections.navigation && sections.navigation.links) {
                const navContainer = document.getElementById('main-nav');
                if (navContainer) {
                    navContainer.innerHTML = sections.navigation.links.map(link => 
                        `<li><a href="${esc(link.href)}" ${link.label === 'Quiz' ? 'class="active"' : ''}>${esc(link.label)}</a></li>`
                    ).join('');
                }
                
                const mobileNavContainer = document.getElementById('mobile-nav-links');
                if (mobileNavContainer) {
                    mobileNavContainer.innerHTML = sections.navigation.links.map(link => 
                        `<a href="${esc(link.href)}"><i class="fa-solid ${link.icon === 'fa-brain' ? 'fa-brain' : link.icon === 'fa-house' ? 'fa-house' : link.icon === 'fa-book' ? 'fa-book' : link.icon === 'fa-newspaper' ? 'fa-newspaper' : link.icon === 'fa-circle-info' ? 'fa-circle-info' : 'fa-envelope'}"></i> ${esc(link.label)}</a>`
                    ).join('');
                }
            }
            
            if (sections.footer) {
                const footerGrid = document.getElementById('footer-grid');
                if (footerGrid && footerGrid.children.length === 0) {
                    let footerHtml = '';
                    
                    if (sections.footer.columns) {
                        footerHtml += sections.footer.columns.map(col => `
                            <div class="footer-col">
                                <h4>${esc(col.heading)}</h4>
                                <ul>${(col.items || []).map(item => `<li><a href="${esc(item.href)}">${item.icon ? `<i class="${esc(item.icon)}" style="margin-right:0.5rem;"></i>` : ''}${esc(item.label)}</a></li>`).join('')}</ul>
                            </div>
                        `).join('');
                    } else {
                        footerHtml = `
                            <div class="footer-col">
                                <a href="/" class="logo-link"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
                                <p style="color:var(--clr-text-dim);margin-top:0.5rem;font-size:0.75rem;">Advancing biology and pharmacy education.</p>
                                <div class="footer-social">${(sections.footer.social_links || []).map(s => `<a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer"><i class="${esc(s.icon)}"></i></a>`).join('')}</div>
                            </div>
                        `;
                    }
                    footerGrid.innerHTML = footerHtml;
                }
            }
        } catch (err) {
            console.error('Failed to load navigation:', err);
            const navContainer = document.getElementById('main-nav');
            if (navContainer && navContainer.children.length === 0) {
                navContainer.innerHTML = '<li><a href="/">Home</a></li><li><a href="/#courses">Resources</a></li><li><a href="/quiz.html" class="active">Quiz</a></li><li><a href="/#blog">Blog</a></li><li><a href="/#about">About</a></li><li><a href="/#contact">Contact</a></li>';
            }
        }
    }

    function updateMobileNav() {
        const footer = document.getElementById('mobile-nav-footer');
        if (!footer) return;
        
        const token = getToken();
        if (token && !isTokenExpired()) {
            const email = localStorage.getItem('sb-email') || 'User';
            footer.innerHTML = `<div class="mobile-user-info"><i class="fa-solid fa-circle-user"></i> <span>Signed in as <strong>${esc(email.split('@')[0])}</strong></span></div><button class="mobile-signout-btn" onclick="signOut()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>`;
        } else {
            footer.innerHTML = `<button class="mobile-signin-btn" onclick="showAuthForm('signin')"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button><button class="mobile-signup-btn" onclick="showAuthForm('signup')"><i class="fa-solid fa-user-plus"></i> Create Account</button>`;
        }
    }

    window.signOut = function() {
        localStorage.removeItem('sb-token');
        localStorage.removeItem('sb-email');
        location.reload();
    };

    window.showAuthForm = function(mode) {
        const existing = document.getElementById('auth-modal');
        if (existing) existing.remove();
        
        const modal = document.createElement('div');
        modal.id = 'auth-modal';
        modal.style.cssText = 'position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);';
        modal.innerHTML = `
            <div style="background:var(--clr-navy-card);border:2px solid var(--clr-cyan);border-radius:var(--radius-lg);padding:2rem;max-width:380px;width:90%;position:relative;box-shadow:var(--shadow-violet);">
                <button id="close-auth" style="position:absolute;top:0.5rem;right:0.5rem;background:none;border:none;color:var(--clr-text-dim);cursor:pointer;font-size:1.2rem;">✕</button>
                <h3 style="color:var(--clr-cyan);margin-bottom:1.2rem;text-align:center;">${mode === 'signin' ? 'Sign In' : 'Create Account'}</h3>
                <form id="auth-form" style="display:flex;flex-direction:column;gap:1rem;">
                    <input type="email" id="auth-email" class="form-input" placeholder="Email" required>
                    <input type="password" id="auth-password" class="form-input" placeholder="Password (min 6 chars)" minlength="6" required>
                    <button type="submit" class="btn-primary" style="justify-content:center;">${mode === 'signin' ? 'Sign In' : 'Create Account'}</button>
                </form>
                <p style="text-align:center;margin-top:1rem;color:var(--clr-text-dim);font-size:0.9rem;">
                    ${mode === 'signin' ? "No account? <a href='#' id='switch-mode' style='color:var(--clr-magenta);'>Sign up</a>" : "Have account? <a href='#' id='switch-mode' style='color:var(--clr-magenta);'>Sign in</a>"}
                </p>
                <p id="auth-error" style="color:#ff4444;text-align:center;margin-top:0.5rem;display:none;"></p>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('close-auth').onclick = () => modal.remove();
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        
        const switchLink = document.getElementById('switch-mode');
        if (switchLink) {
            switchLink.onclick = (e) => {
                e.preventDefault();
                modal.remove();
                showAuthForm(mode === 'signin' ? 'signup' : 'signin');
            };
        }
        
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');
            errEl.style.display = 'none';
            
            try {
                const action = mode === 'signin' ? 'signin' : 'signup';
                const data = await apiCall(action, { email, password });
                if (data?.session) {
                    localStorage.setItem('sb-token', data.session.access_token);
                    localStorage.setItem('sb-email', data.user.email);
                    modal.remove();
                    location.reload();
                } else if (mode === 'signup') {
                    errEl.textContent = 'Check your email to confirm signup.';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            }
        };
    };

    async function loadQuizzes(category = 'all') {
        const container = document.getElementById('quizzes-container');
        container.innerHTML = '<div class="spinner"><i class="fa-solid fa-dna"></i><p>Loading quizzes...</p></div>';
        
        if (category === 'my-progress') {
            if (!isLoggedIn()) {
                container.innerHTML = `<div style="text-align:center;padding:3rem;"><i class="fa-solid fa-lock" style="font-size:3rem;color:var(--clr-magenta);"></i><p style="margin-top:1rem;">Please sign in to view your progress</p><button class="btn-primary" onclick="showAuthForm('signin')" style="margin-top:1rem;">Sign In</button></div>`;
                return;
            }
            const progress = await apiCall('get_user_progress');
            if (!progress || progress.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--clr-text-dim);">You haven\'t taken any quizzes yet. Start learning!</p>';
                return;
            }
            container.innerHTML = `<div class="quiz-grid">${progress.map(p => `
                <div class="quiz-card" onclick="startQuiz(${p.quiz_id})">
                    <div class="quiz-card-header"><span class="quiz-badge ${p.quizzes?.category || 'pharmacy'}">${p.quizzes?.category || 'Quiz'}</span><span class="quiz-difficulty">Score: ${p.percentage || 0}%</span></div>
                    <h3>${esc(p.quizzes?.title || 'Quiz')}</h3>
                    <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${p.percentage || 0}%"></div></div>
                    <div class="quiz-status"><i class="fa-solid ${p.passed ? 'fa-check-circle' : 'fa-clock'}"></i> ${p.passed ? 'Completed - Passed' : p.completed_at ? 'Completed' : 'In Progress'}</div>
                    <button class="btn-start">${p.completed_at ? 'Retake Quiz' : 'Continue'}</button>
                </div>
            `).join('')}</div>`;
            return;
        }
        
        const quizzes = await apiCall('get_quizzes', { category: category === 'all' ? undefined : category });
        if (!quizzes || quizzes.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:var(--clr-text-dim);">No quizzes available in this category yet.</p>';
            return;
        }
        
        container.innerHTML = `<div class="quiz-grid">${quizzes.map(q => `
            <div class="quiz-card" onclick="startQuiz(${q.id})">
                <div class="quiz-card-header"><span class="quiz-badge ${q.category}">${q.category === 'pharmacy' ? 'Pharmacy' : q.category === 'olevel' ? 'O-Level' : 'A-Level'}</span><span class="quiz-difficulty"><i class="fa-solid fa-chart-line"></i> ${q.difficulty || 'medium'}</span></div>
                <h3>${esc(q.title)}</h3>
                <p>${esc(q.description || 'Test your knowledge')}</p>
                <div class="quiz-meta"><span><i class="fa-regular fa-clock"></i> ${Math.floor(q.time_limit / 60)} min</span><span><i class="fa-regular fa-question-circle"></i> ${q.total_points || 0} questions</span><span><i class="fa-regular fa-star"></i> Pass: ${q.passing_score}%</span></div>
                ${q.user_progress ? `<div class="quiz-progress"><div class="quiz-progress-bar" style="width:${q.user_progress.percentage || 0}%"></div></div><div class="quiz-status"><i class="fa-solid ${q.user_progress.passed ? 'fa-check-circle' : 'fa-clock'}"></i> ${q.user_progress.passed ? `Score: ${q.user_progress.percentage}%` : 'In Progress'}</div>` : ''}
                <button class="btn-start">${q.user_progress ? (q.user_progress.completed_at ? 'Retake Quiz' : 'Continue') : 'Start Quiz'}</button>
            </div>
        `).join('')}</div>`;
    }

    async function startQuiz(quizId) {
        if (!isLoggedIn()) {
            showAuthForm('signin');
            return;
        }
        
        const quiz = await apiCall('get_quiz', { id: quizId });
        if (!quiz) return;
        
        currentQuiz = quiz;
        currentAnswers = new Array(quiz.questions.length).fill(null);
        quizStartTime = Date.now();
        currentQuestionIndex = 0;
        
        showQuizModal();
    }
    
    function showQuizModal() {
        const existing = document.getElementById('quiz-modal');
        if (existing) existing.remove();
        
        const question = currentQuiz.questions[currentQuestionIndex];
        const modal = document.createElement('div');
        modal.id = 'quiz-modal';
        modal.className = 'quiz-modal';
        modal.innerHTML = `
            <div class="quiz-modal-content">
                <div class="quiz-modal-header">
                    <h2><i class="fa-solid fa-dna"></i> ${esc(currentQuiz.title)}</h2>
                    <button class="close-modal" onclick="this.closest('#quiz-modal').remove()"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="quiz-question">
                    <div class="question-text">${currentQuestionIndex + 1}. ${esc(question.text)}</div>
                    <div class="options">
                        ${question.options.map((opt, optIdx) => `
                            <div class="option ${currentAnswers[currentQuestionIndex] === optIdx ? 'selected' : ''}" onclick="selectOption(${currentQuestionIndex}, ${optIdx})">
                                <span class="option-prefix">${String.fromCharCode(65 + optIdx)}.</span>
                                <span class="option-text">${esc(opt)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="quiz-footer">
                    <button class="btn-nav" onclick="previousQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i> Previous</button>
                    <div class="question-counter">Question ${currentQuestionIndex + 1} of ${currentQuiz.questions.length}</div>
                    ${currentQuestionIndex === currentQuiz.questions.length - 1 ? 
                        '<button class="btn-submit" onclick="submitQuiz()"><i class="fa-solid fa-check"></i> Submit Quiz</button>' :
                        '<button class="btn-nav" onclick="nextQuestion()">Next <i class="fa-solid fa-chevron-right"></i></button>'}
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    window.selectOption = function(questionIdx, optionIdx) {
        currentAnswers[questionIdx] = optionIdx;
        const options = document.querySelectorAll('#quiz-modal .option');
        options.forEach((opt, idx) => {
            if (idx === optionIdx) opt.classList.add('selected');
            else opt.classList.remove('selected');
        });
    };
    
    window.nextQuestion = function() {
        if (currentQuestionIndex < currentQuiz.questions.length - 1) {
            currentQuestionIndex++;
            showQuizModal();
        }
    };
    
    window.previousQuestion = function() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            showQuizModal();
        }
    };
    
    async function submitQuiz() {
        let score = 0;
        const answers = [];
        for (let i = 0; i < currentQuiz.questions.length; i++) {
            const selected = currentAnswers[i];
            const isCorrect = selected !== null && selected === currentQuiz.questions[i].correct;
            if (isCorrect) score += currentQuiz.questions[i].points;
            answers.push({ q: i, selected: selected, correct: isCorrect });
        }
        
        const total = currentQuiz.total_points;
        const percentage = Math.round((score / total) * 100);
        const passed = percentage >= (currentQuiz.passing_score || 60);
        const timeTaken = Math.floor((Date.now() - quizStartTime) / 1000);
        
        await apiCall('complete_quiz', {
            quiz_id: currentQuiz.id,
            score, total, percentage, passed,
            answers: JSON.stringify(answers),
            time_taken: timeTaken
        });
        
        document.getElementById('quiz-modal').remove();
        
        const modal = document.createElement('div');
        modal.id = 'result-modal';
        modal.className = 'quiz-modal';
        modal.innerHTML = `
            <div class="quiz-modal-content result-modal">
                <div class="quiz-modal-header"><h2><i class="fa-solid fa-chart-simple"></i> Quiz Results</h2><button class="close-modal" onclick="this.closest('#result-modal').remove()"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="score-circle"><div class="score-number">${percentage}%</div></div>
                <div class="result-status ${passed ? 'passed' : 'failed'}"><i class="fa-solid ${passed ? 'fa-trophy' : 'fa-book-open'}"></i> ${passed ? 'Congratulations! You passed!' : 'Keep practicing!'}</div>
                <p>You scored <strong>${score}</strong> out of <strong>${total}</strong> points.</p>
                <div class="reaction-buttons">
                    <button class="reaction-btn like" onclick="addReaction(${currentQuiz.id}, 'like')"><i class="fa-regular fa-thumbs-up"></i> Like</button>
                    <button class="reaction-btn love" onclick="addReaction(${currentQuiz.id}, 'love')"><i class="fa-regular fa-heart"></i> Love</button>
                    <button class="reaction-btn helpful" onclick="addReaction(${currentQuiz.id}, 'helpful')"><i class="fa-regular fa-circle-check"></i> Helpful</button>
                </div>
                <button class="btn-primary" onclick="document.getElementById('result-modal')?.remove(); loadQuizzes(document.querySelector('.category-tab.active')?.dataset.category || 'all')">Browse More Quizzes</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        loadQuizzes(document.querySelector('.category-tab.active')?.dataset.category || 'all');
    }
    
    window.addReaction = async function(quizId, type) {
        await apiCall('add_reaction', { quiz_id: quizId, reaction_type: type });
        const modal = document.getElementById('result-modal');
        if (modal) {
            const btn = modal.querySelector(`.reaction-btn.${type}`);
            if (btn) {
                btn.innerHTML = btn.innerHTML.replace('far', 'fas');
                btn.disabled = true;
                btn.style.opacity = '0.6';
            }
        }
    };
    
    function initUI() {
        const tt = document.getElementById('theme-toggle');
        const icon = tt.querySelector('i');
        if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); icon.classList.replace('fa-moon', 'fa-sun'); }
        tt.onclick = () => { document.body.classList.toggle('light-mode'); const isLight = document.body.classList.contains('light-mode'); icon.classList.replace(isLight ? 'fa-moon' : 'fa-sun', isLight ? 'fa-sun' : 'fa-moon'); localStorage.setItem('theme', isLight ? 'light' : 'dark'); };
        
        const mt = document.getElementById('mobile-toggle'), mp = document.getElementById('mobile-nav-panel'), mo = document.getElementById('mobile-nav-overlay'), closeBtn = document.getElementById('mobile-close-btn');
        function openPanel() { mp.classList.add('active'); mo.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closePanel() { mp.classList.remove('active'); mo.classList.remove('active'); document.body.style.overflow = ''; }
        mt.onclick = openPanel;
        mo.onclick = closePanel;
        closeBtn.onclick = closePanel;
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
        
        const bb = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => { bb.classList.toggle('visible', window.scrollY > 300); });
        bb.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadQuizzes(tab.dataset.category);
            };
        });
        
        loadNavigationAndFooter();
        updateMobileNav();
        loadQuizzes('all');
    }
    
    document.getElementById('current-year').textContent = new Date().getFullYear();
    initUI();
    </script>
</body>
</html>

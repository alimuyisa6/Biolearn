<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SkillHub – Sign In / Sign Up</title>
  <!-- Font Awesome for icons (same as your main app) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f6fa;
      --surface: #ffffff;
      --primary: #3b82f6;
      --primary-dark: #1e40af;
      --text-main: #0f172a;
      --text-muted: #475569;
      --border: #e2e8f0;
      --error-bg: #fee2e2;
      --error-text: #b91c1c;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --radius: 20px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-card {
      background: var(--surface);
      width: 100%;
      max-width: 420px;
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      color: white;
      padding: 24px 24px 18px;
      text-align: center;
    }

    .card-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .card-header p {
      margin-top: 6px;
      opacity: 0.9;
      font-size: 0.9rem;
    }

    .card-body {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      font-family: inherit;
      font-size: 1rem;
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-main);
    }

    .btn-outline:hover {
      background: #f8fafc;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-loading .btn-text {
      display: none;
    }
    .btn-loading .btn-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .message-box {
      padding: 12px 16px;
      border-radius: 14px;
      margin-bottom: 18px;
      font-size: 0.9rem;
      display: none;
    }

    .message-box.error {
      background: var(--error-bg);
      color: var(--error-text);
      border-left: 5px solid var(--error-text);
    }

    .message-box.success {
      background: var(--success-bg);
      color: var(--success-text);
      border-left: 5px solid var(--success-text);
    }

    .message-box.visible {
      display: block;
    }

    .toggle-link {
      text-align: center;
      margin-top: 18px;
      color: var(--primary-dark);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .toggle-link:hover {
      text-decoration: underline;
    }

    .forgot-link {
      display: block;
      text-align: right;
      margin-top: -10px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: var(--primary-dark);
      cursor: pointer;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .reset-section {
      display: none;
      margin-top: 10px;
    }

    .reset-section.visible {
      display: block;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
    }

    .back-link:hover {
      color: var(--text-main);
    }

    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--error-bg);
      color: var(--error-text);
      text-align: center;
      padding: 10px;
      font-weight: 500;
      display: none;
      z-index: 100;
    }

    .offline-banner.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="offline-banner" id="offlineBanner">
    <i class="fa-solid fa-wifi"></i> You are offline. Authentication features are limited.
  </div>

  <div class="auth-card">
    <div class="card-header">
      <h1><i class="fa-solid fa-hand-peace"></i> SkillHub</h1>
      <p>Decentralized skill exchange</p>
    </div>
    <div class="card-body">
      <!-- Message area (error / success) -->
      <div id="messageBox" class="message-box">
        <i class="fa-solid fa-circle-info"></i> <span id="messageText"></span>
      </div>

      <!-- Main auth form (login / signup) -->
      <form id="authForm">
        <div class="form-group">
          <label><i class="fa-regular fa-envelope"></i> Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group" id="passwordGroup">
          <label><i class="fa-solid fa-key"></i> Password</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
        </div>

        <!-- Forgot password link (visible in login mode) -->
        <div id="forgotPasswordContainer">
          <span class="forgot-link" id="forgotLink">Forgot your password?</span>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner" style="display:none;"></span>
        </button>
      </form>

      <!-- Password reset section (hidden by default) -->
      <div id="resetSection" class="reset-section">
        <p style="margin-bottom:12px; color:var(--text-muted); font-size:0.9rem;">
          Enter your email to receive a password reset link.
        </p>
        <div class="form-group">
          <label><i class="fa-regular fa-envelope"></i> Email</label>
          <input type="email" id="resetEmail" placeholder="you@example.com" required>
        </div>
        <button class="btn btn-primary" id="resetSubmitBtn">
          <span class="btn-text">Send Reset Link</span>
          <span class="btn-spinner" style="display:none;"></span>
        </button>
        <span class="back-link" id="backToLoginLink"><i class="fa-solid fa-arrow-left"></i> Back to login</span>
      </div>

      <!-- Toggle login / signup -->
      <div class="toggle-link" id="toggleModeBtn">Need an account? Sign Up</div>
    </div>
  </div>

  <script>
    (function() {
      // ============ CONFIGURATION ============
      const SUPABASE_URL = 'https://bhhndmcqjibodbfmbrpj.supabase.co';            // <-- Replace with your Supabase project URL
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoaG5kbWNxamlib2RiZm1icnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI3MzIsImV4cCI6MjA5MjA1ODczMn0.aXTyrqWOECUHccOLcrwERPWTWu46fsGxYwkt-5xbrl8';       // <-- Replace with your Supabase anon key

      // ============ DOM ELEMENTS ============
      const form = document.getElementById('authForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const passwordGroup = document.getElementById('passwordGroup');
      const submitBtn = document.getElementById('submitBtn');
      const forgotLink = document.getElementById('forgotLink');
      const forgotContainer = document.getElementById('forgotPasswordContainer');
      const toggleModeBtn = document.getElementById('toggleModeBtn');
      const messageBox = document.getElementById('messageBox');
      const messageText = document.getElementById('messageText');
      const resetSection = document.getElementById('resetSection');
      const resetEmailInput = document.getElementById('resetEmail');
      const resetSubmitBtn = document.getElementById('resetSubmitBtn');
      const backToLoginLink = document.getElementById('backToLoginLink');
      const offlineBanner = document.getElementById('offlineBanner');

      // ============ STATE ============
      let mode = 'login';   // 'login' or 'signup'
      let isProcessing = false;

      // ============ SUPABASE CLIENT ============
      let supabase = null;
      try {
        if (!window.supabase || typeof window.supabase.createClient !== 'function') {
          throw new Error('Supabase SDK not loaded');
        }
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('[AUTH] Supabase client created');
      } catch (err) {
        console.error('[AUTH] Failed to initialize Supabase:', err.message);
        showMessage('Authentication service unavailable. Please try again later.', 'error');
        disableForm(true);
      }

      // ============ SESSION CHECK (auto-redirect if logged in) ============
      (async function checkSession() {
        if (!supabase) return;
        try {
          const { data: { session }, error } = await supabase.auth.getSession();
          if (error) throw error;
          if (session) {
            console.log('[AUTH] Active session found, redirecting to index.html');
            window.location.href = '/index.html';
          }
        } catch (err) {
          console.warn('[AUTH] Session check failed:', err.message);
          // Continue to login page
        }
      })();

      // ============ NETWORK STATUS ============
      function updateOnlineStatus() {
        const isOnline = navigator.onLine;
        offlineBanner.classList.toggle('visible', !isOnline);
        if (!isOnline) {
          disableForm(true);
        } else {
          disableForm(false);
        }
      }
      window.addEventListener('offline', updateOnlineStatus);
      window.addEventListener('online', updateOnlineStatus);
      updateOnlineStatus(); // initial check

      // ============ UI HELPERS ============
      function showMessage(text, type = 'error') {
        messageText.textContent = text;
        messageBox.className = `message-box ${type} visible`;
      }

      function clearMessage() {
        messageBox.className = 'message-box';
        messageText.textContent = '';
      }

      function disableForm(disabled) {
        const elements = [
          emailInput, passwordInput, resetEmailInput,
          submitBtn, resetSubmitBtn
        ];
        elements.forEach(el => {
          if (el) el.disabled = disabled;
        });
      }

      function setButtonLoading(button, loading) {
        if (loading) {
          button.classList.add('btn-loading');
          button.querySelector('.btn-text').style.display = 'none';
          button.querySelector('.btn-spinner').style.display = 'inline-block';
        } else {
          button.classList.remove('btn-loading');
          button.querySelector('.btn-text').style.display = '';
          button.querySelector('.btn-spinner').style.display = 'none';
        }
      }

      // ============ MODE SWITCHING ============
      function updateModeUI() {
        clearMessage();
        if (mode === 'login') {
          submitBtn.querySelector('.btn-text').textContent = 'Sign In';
          toggleModeBtn.textContent = 'Need an account? Sign Up';
          forgotContainer.style.display = 'block';
          passwordGroup.style.display = 'block'; // show password field
          resetSection.classList.remove('visible');
        } else {
          submitBtn.querySelector('.btn-text').textContent = 'Sign Up';
          toggleModeBtn.textContent = 'Already have an account? Login';
          forgotContainer.style.display = 'none';
          passwordGroup.style.display = 'block'; // password still needed for signup
          resetSection.classList.remove('visible');
        }
      }

      toggleModeBtn.addEventListener('click', () => {
        mode = mode === 'login' ? 'signup' : 'login';
        updateModeUI();
      });

      // ============ FORGOT PASSWORD / RESET FLOW ============
      forgotLink.addEventListener('click', (e) => {
        e.preventDefault();
        // Pre-fill reset email from login form
        const currentEmail = emailInput.value.trim();
        if (currentEmail) resetEmailInput.value = currentEmail;
        // Show reset section, hide main form
        form.style.display = 'none';
        resetSection.classList.add('visible');
        clearMessage();
      });

      backToLoginLink.addEventListener('click', () => {
        resetSection.classList.remove('visible');
        form.style.display = 'block';
        clearMessage();
      });

      resetSubmitBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        if (!supabase) {
          showMessage('Authentication service unavailable.', 'error');
          return;
        }
        if (isProcessing) return;
        const email = resetEmailInput.value.trim();
        if (!email) {
          showMessage('Please enter your email address.', 'error');
          return;
        }

        isProcessing = true;
        setButtonLoading(resetSubmitBtn, true);
        disableForm(true);
        clearMessage();

        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email);
          if (error) throw error;
          showMessage('Password reset link sent! Check your inbox.', 'success');
          // Optionally return to login after a delay
          setTimeout(() => {
            resetSection.classList.remove('visible');
            form.style.display = 'block';
            emailInput.value = email; // keep email for login
            clearMessage();
          }, 2000);
        } catch (err) {
          console.error('[AUTH] Reset error:', err.message);
          showMessage(err.message, 'error');
        } finally {
          isProcessing = false;
          setButtonLoading(resetSubmitBtn, false);
          disableForm(false);
        }
      });

      // ============ MAIN FORM SUBMISSION (LOGIN / SIGNUP) ============
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!supabase) {
          showMessage('Authentication service unavailable.', 'error');
          return;
        }
        if (isProcessing) return;
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showMessage('Please fill in all fields.', 'error');
          return;
        }

        isProcessing = true;
        setButtonLoading(submitBtn, true);
        disableForm(true);
        clearMessage();

        try {
          let response;
          if (mode === 'signup') {
            response = await supabase.auth.signUp({ email, password });
            if (response.error) throw response.error;
            // If email confirmation is required, show message
            if (response.data?.user?.identities?.length === 0) {
              showMessage('This email is already registered.', 'error');
              return;
            }
            showMessage('Account created! Check your email for confirmation (if required).', 'success');
            // Don't redirect immediately for signup – user may need to confirm email
          } else {
            response = await supabase.auth.signInWithPassword({ email, password });
            if (response.error) throw response.error;
            // Successful login → redirect
            window.location.href = '/index.html';
          }
        } catch (err) {
          console.error('[AUTH] Auth error:', err.message);
          showMessage(err.message, 'error');
        } finally {
          isProcessing = false;
          setButtonLoading(submitBtn, false);
          disableForm(false);
        }
      });

      // ============ INITIAL UI ============
      updateModeUI();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BioLearn – Admin Dashboard</title>
    <meta name="description" content="Admin panel for BioLearn Digital Library"/>
    <!-- Fonts and icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2a4a7f;
            --secondary: #3b82f6;
            --accent: #60a5fa;
            --bg: #f0f4f8;
            --white: #fff;
            --text: #111827;
            --muted: #6b7280;
            --border: #d1d5db;
            --radius: 0.75rem;
            --shadow: 0 6px 18px rgba(0,0,0,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; display: flex; min-height: 100vh; }
        a { color: var(--secondary); text-decoration: none; }
        /* Sidebar */
        .sidebar {
            width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column;
            padding: 2rem 1rem; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto;
        }
        .sidebar .logo { font-family: 'Merriweather', serif; font-size: 1.3rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; }
        .sidebar .logo i { color: var(--accent); }
        .sidebar nav a {
            display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem;
            border-radius: 2rem; color: #cbd5e1; font-weight: 500; transition: background 0.2s;
        }
        .sidebar nav a:hover, .sidebar nav a.active { background: rgba(255,255,255,0.1); color: white; }
        .sidebar .signout-btn { margin-top: auto; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 0.6rem 1.2rem; border-radius: 2rem; cursor: pointer; font-weight: 600; }
        /* Main area */
        .main {
            margin-left: 260px; flex: 1; padding: 2rem 2.5rem; max-width: calc(100vw - 260px);
        }
        .section { display: none; }
        .section.active { display: block; }
        h2 { font-family: 'Merriweather', serif; font-size: 1.8rem; margin-bottom: 1.5rem; color: var(--primary); }
        .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 2rem; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat { background: var(--white); border-radius: var(--radius); padding: 1.5rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .stat .num { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
        .stat .label { font-size: 0.9rem; color: var(--muted); margin-top: 0.3rem; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.4rem;
            border-radius: 2rem; font-weight: 600; border: none; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s;
        }
        .btn-primary { background: var(--secondary); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-outline { border: 2px solid var(--border); background: transparent; color: var(--text); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--border); border-radius: 0.5rem;
            font-family: inherit; font-size: 0.95rem; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--secondary); outline: none; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { font-weight: 600; color: var(--muted); }
        .badge { font-size: 0.75rem; padding: 0.2rem 0.7rem; border-radius: 1rem; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-approved { background: #d1fae5; color: #065f46; }
        .badge-rejected { background: #fee2e2; color: #991b1b; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); color: white; padding: 0.8rem 1.5rem; border-radius: 2rem; font-weight: 600; z-index: 500; display: none; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; height: auto; }
            .main { margin-left: 0; max-width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-dna"></i> BioLearn Admin</div>
        <nav>
            <a href="#" class="active" data-section="dashboard"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="#" data-section="upload"><i class="fa-solid fa-cloud-upload-alt"></i> Upload Resource</a>
            <a href="#" data-section="submissions"><i class="fa-solid fa-file-pen"></i> Submissions</a>
            <a href="#" data-section="messages"><i class="fa-solid fa-envelope"></i> Messages</a>
            <a href="#" data-section="users"><i class="fa-solid fa-users"></i> Users</a>
            <a href="#" data-section="notify"><i class="fa-solid fa-bell"></i> Notify</a>
        </nav>
        <button class="signout-btn" id="signout-btn"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
    </aside>

    <!-- Main content -->
    <main class="main" id="admin-main">
        <!-- Dashboard -->
        <section class="section active" id="dashboard">
            <h2>Dashboard</h2>
            <div class="grid" id="stats-grid">Loading stats…</div>
        </section>

        <!-- Upload Resource -->
        <section class="section" id="upload">
            <h2>Upload New Resource</h2>
            <div class="card">
                <form id="upload-form">
                    <div class="form-group"><label>Title *</label><input type="text" id="up-title" required /></div>
                    <div class="form-group"><label>Description *</label><textarea id="up-desc" rows="4" required></textarea></div>
                    <div class="form-group"><label>Author</label><input type="text" id="up-author" /></div>
                    <div class="form-group"><label>Level</label><select id="up-level"><option value="">Select</option><option value="O-Level">O‑Level</option><option value="A-Level">A‑Level</option></select></div>
                    <div class="form-group"><label>Category</label><input type="text" id="up-category" /></div>
                    <div class="form-group"><label>Tag</label><input type="text" id="up-tag" placeholder="e.g. Notes, Past Papers" /></div>
                    <div class="form-group"><label>File URL</label><input type="url" id="up-fileurl" placeholder="https://..." /></div>
                    <div class="form-group"><label>File Size</label><input type="text" id="up-filesize" placeholder="e.g. 2.4 MB" /></div>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Publish</button>
                    <span id="upload-msg" style="margin-left:1rem;"></span>
                </form>
            </div>
        </section>

        <!-- Submissions -->
        <section class="section" id="submissions">
            <h2>Resource Submissions</h2>
            <div class="card" id="submissions-list">Loading…</div>
        </section>

        <!-- Messages -->
        <section class="section" id="messages">
            <h2>All Messages</h2>
            <div class="card" id="messages-list">Loading…</div>
        </section>

        <!-- Users -->
        <section class="section" id="users">
            <h2>Manage Users</h2>
            <div class="card">
                <div class="table-wrap" id="users-table">Loading…</div>
            </div>
        </section>

        <!-- Notify -->
        <section class="section" id="notify">
            <h2>Send Notification</h2>
            <div class="card">
                <form id="notify-form">
                    <div class="form-group"><label>Message</label><textarea id="notify-msg" rows="4" required></textarea></div>
                    <div class="form-group">
                        <label><input type="checkbox" id="notify-all" /> Send to all users</label>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Send</button>
                    <span id="notify-status" style="margin-left:1rem;"></span>
                </form>
            </div>
        </section>
    </main>

    <div class="toast" id="toast"></div>

    <script type="module">
        // Supabase auth client
        const SUPABASE_URL = 'https://bhhndmcqjibodbfmbrpj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoaG5kbWNxamlib2RiZm1icnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI3MzIsImV4cCI6MjA5MjA1ODczMn0.aXTyrqWOECUHccOLcrwERPWTWu46fsGxYwkt-5xbrl8';
        const supabase = window.supabase?.createClient?.(SUPABASE_URL, SUPABASE_ANON_KEY) ?? null;
        if (!supabase) { alert('Supabase client not loaded'); throw new Error('Supabase missing'); }

        const API_BASE = '/api';
        let currentSection = 'dashboard';

        // ---------- Helpers ----------
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        async function apiFetch(endpoint, options = {}) {
            const session = (await supabase.auth.getSession()).data.session;
            if (!session) throw new Error('Not authenticated');
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            headers['Authorization'] = `Bearer ${session.access_token}`;
            const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || `Request failed (${res.status})`);
            }
            return res.json();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // ---------- Navigation ----------
        document.querySelectorAll('.sidebar nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.sidebar nav a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const section = link.dataset.section;
                switchSection(section);
            });
        });

        function switchSection(section) {
            currentSection = section;
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            loadSection(section);
        }

        async function loadSection(section) {
            switch (section) {
                case 'dashboard': loadStats(); break;
                case 'upload': break; // form is static
                case 'submissions': loadSubmissions(); break;
                case 'messages': loadMessages(); break;
                case 'users': loadUsers(); break;
                case 'notify': break;
            }
        }

        // ---------- Dashboard Stats ----------
        async function loadStats() {
            try {
                const stats = await apiFetch('/admin-stats');
                document.getElementById('stats-grid').innerHTML = `
                    <div class="stat"><div class="num">${stats.resources}</div><div class="label">Resources</div></div>
                    <div class="stat"><div class="num">${stats.pendingSubmissions}</div><div class="label">Pending Submissions</div></div>
                    <div class="stat"><div class="num">${stats.users}</div><div class="label">Users</div></div>
                    <div class="stat"><div class="num">${stats.messages}</div><div class="label">Messages</div></div>`;
            } catch (err) { showToast('Failed to load stats'); }
        }

        // ---------- Upload ----------
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('up-title').value,
                description: document.getElementById('up-desc').value,
                author: document.getElementById('up-author').value,
                level: document.getElementById('up-level').value,
                category: document.getElementById('up-category').value,
                tag: document.getElementById('up-tag').value,
                file_url: document.getElementById('up-fileurl').value,
                file_size: document.getElementById('up-filesize').value
            };
            try {
                await apiFetch('/admin-upload', { method: 'POST', body: JSON.stringify(payload) });
                document.getElementById('upload-msg').textContent = 'Published!';
                document.getElementById('upload-form').reset();
            } catch (err) { document.getElementById('upload-msg').textContent = 'Error: ' + err.message; }
        });

        // ---------- Submissions ----------
        async function loadSubmissions() {
            const container = document.getElementById('submissions-list');
            try {
                const data = await apiFetch('/admin-submissions');
                if (!data.length) { container.innerHTML = '<p>No submissions found.</p>'; return; }
                let html = '';
                data.forEach(sub => {
                    html += `<div class="card" style="padding:1.5rem;margin-bottom:1rem;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <strong>${escapeHtml(sub.title)}</strong>
                            <span class="badge badge-${sub.status}">${sub.status}</span>
                        </div>
                        <p style="margin:0.5rem 0;">${escapeHtml(sub.description)}</p>
                        <p><small>Author: ${escapeHtml(sub.author||'Unknown')} | Level: ${escapeHtml(sub.level||'N/A')} | Category: ${escapeHtml(sub.category||'N/A')}</small></p>
                        ${sub.status === 'pending' ? `
                        <div style="margin-top:1rem;">
                            <button class="btn btn-success" data-id="${sub.id}" data-action="approve"><i class="fa-solid fa-check"></i> Approve</button>
                            <button class="btn btn-danger" data-id="${sub.id}" data-action="reject"><i class="fa-solid fa-xmark"></i> Reject</button>
                        </div>` : ''}
                    </div>`;
                });
                container.innerHTML = html;
                // Action buttons
                container.querySelectorAll('.btn-success, .btn-danger').forEach(btn => {
                    btn.addEventListener('click', () => handleApproval(btn.dataset.id, btn.dataset.action));
                });
            } catch (err) { container.innerHTML = `<p>Error loading submissions.</p>`; }
        }

        async function handleApproval(id, action) {
            try {
                await apiFetch('/admin-approve', { method: 'POST', body: JSON.stringify({ submissionId: parseInt(id), action }) });
                showToast('Submission ' + action + 'd');
                loadSubmissions();
            } catch (err) { showToast('Error: ' + err.message); }
        }

        // ---------- Messages ----------
        async function loadMessages() {
            const container = document.getElementById('messages-list');
            try {
                const data = await apiFetch('/get-messages');
                if (!data.messages?.length) { container.innerHTML = '<p>No messages.</p>'; return; }
                let html = '';
                data.messages.forEach(msg => {
                    html += `<div class="card" style="padding:1rem;margin-bottom:1rem;">
                        <p><strong>From:</strong> ${escapeHtml(msg.user_id||'Unknown')}</p>
                        <p>${escapeHtml(msg.message)}</p>
                        <small>${new Date(msg.created_at).toLocaleString()}</small>
                    </div>`;
                });
                container.innerHTML = html;
            } catch (err) { container.innerHTML = '<p>Error loading messages.</p>'; }
        }

        // ---------- Users ----------
        async function loadUsers() {
            const container = document.getElementById('users-table');
            try {
                const users = await apiFetch('/admin-users');
                if (!users.length) { container.innerHTML = '<p>No users found.</p>'; return; }
                let rows = users.map(u => `
                    <tr>
                        <td>${escapeHtml(u.email)}</td>
                        <td>${new Date(u.created_at).toLocaleDateString()}</td>
                        <td>${u.last_sign_in_at ? new Date(u.last_sign_in_at).toLocaleString() : 'Never'}</td>
                        <td><span class="badge ${u.blocked ? 'badge-rejected' : 'badge-approved'}">${u.blocked ? 'Blocked' : 'Active'}</span></td>
                        <td>
                            <button class="btn btn-outline block-btn" data-id="${u.id}" data-block="${!u.blocked}">
                                <i class="fa-solid ${u.blocked ? 'fa-unlock' : 'fa-lock'}"></i> ${u.blocked ? 'Unblock' : 'Block'}
                            </button>
                            <button class="btn btn-danger delete-user-btn" data-id="${u.id}"><i class="fa-solid fa-trash"></i> Delete</button>
                        </td>
                    </tr>
                `).join('');
                container.innerHTML = `<table><thead><tr><th>Email</th><th>Joined</th><th>Last Sign-in</th><th>Status</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;

                // Event delegation
                container.querySelectorAll('.block-btn').forEach(btn => {
                    btn.addEventListener('click', () => blockUser(btn.dataset.id, btn.dataset.block === 'true'));
                });
                container.querySelectorAll('.delete-user-btn').forEach(btn => {
                    btn.addEventListener('click', () => deleteUser(btn.dataset.id));
                });
            } catch (err) { container.innerHTML = '<p>Error loading users.</p>'; }
        }

        async function blockUser(userId, block) {
            try {
                await apiFetch('/admin-block-user', { method: 'POST', body: JSON.stringify({ userId, block }) });
                showToast(block ? 'User blocked' : 'User unblocked');
                loadUsers();
            } catch (err) { showToast('Error: ' + err.message); }
        }

        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to permanently delete this user?')) return;
            try {
                await apiFetch('/admin-delete-user', { method: 'DELETE', body: JSON.stringify({ userId }) });
                showToast('User deleted');
                loadUsers();
            } catch (err) { showToast('Error: ' + err.message); }
        }

        // ---------- Notify ----------
        document.getElementById('notify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = document.getElementById('notify-msg').value;
            const all = document.getElementById('notify-all').checked;
            try {
                await apiFetch('/admin-notify', { method: 'POST', body: JSON.stringify({ message, recipient_all: all }) });
                document.getElementById('notify-status').textContent = 'Notification sent!';
                document.getElementById('notify-form').reset();
            } catch (err) { document.getElementById('notify-status').textContent = 'Error: ' + err.message; }
        });

        // ---------- Auth & Redirect ----------
        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = 'index.html#account-section'; return; }
            // Verify admin
            try {
                await apiFetch('/admin-stats'); // throws if not admin
                // now load current section
                loadSection(currentSection);
            } catch (err) {
                document.getElementById('admin-main').innerHTML = `<h2 style="color:red;">Access Denied</h2><p>${escapeHtml(err.message)}</p>`;
            }
        }

        // Sign out
        document.getElementById('signout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — AliverBiopharm</title>
    <meta name="description" content="Contact AliverBiopharm for questions, feedback, or support.">
    <meta name="theme-color" content="#0b0b1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        :root{--clr-deep-space:#0b0b1a;--clr-cyan:#00d9ff;--clr-magenta:#ff00aa;--clr-navy-card:#1a1a2e;--clr-navy-light:#16213e;--clr-white:#e0f0ff;--clr-text-dim:#9aa9c1;--clr-text-muted:#6b7a94;--clr-border-glow:rgba(0,217,255,0.25);--shadow-card:0 8px 32px rgba(0,0,0,0.3);--transition-fast:180ms ease;--max-width:1000px;--font-body:'Inter',sans-serif;--font-display:'Space Grotesk',sans-serif;--radius-sm:0.5rem;--radius-md:0.75rem;--radius-lg:1.25rem;--gradient-cyan:linear-gradient(135deg,#00d9ff,#00b4d8);--gradient-magenta:linear-gradient(135deg,#ff00aa,#d6008e)}
        body.light-mode{--clr-deep-space:#f0f4f8;--clr-cyan:#0077b6;--clr-magenta:#d6008e;--clr-navy-card:#fff;--clr-navy-light:#e8edf2;--clr-white:#0b1a2f;--clr-text-dim:#2c3e50;--clr-text-muted:#4a5568;--clr-border-glow:rgba(0,119,182,0.25);--shadow-card:0 8px 32px rgba(0,0,0,0.08)}
        *{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;font-size:16px}
        body{font-family:var(--font-body);background:var(--clr-deep-space);color:var(--clr-white);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;transition:background 0.3s,color 0.3s}
        .site-header{position:sticky;top:0;z-index:100;background:rgba(11,11,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--clr-border-glow);padding:0.8rem 0}
        body.light-mode .site-header{background:rgba(240,244,248,0.9)}
        .header-container{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem}
        .logo-link{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--clr-cyan);text-decoration:none;display:flex;align-items:center;gap:0.5rem}
        .logo-link i{color:var(--clr-magenta)}
        .nav-actions{display:flex;gap:0.8rem;align-items:center}
        .theme-toggle,.home-btn{background:transparent;border:1px solid var(--clr-cyan);color:var(--clr-cyan);font-size:0.9rem;padding:0.5rem 1rem;border-radius:30px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem}
        .home-btn:hover,.theme-toggle:hover{background:var(--clr-cyan);color:#0b0b1a}
        .section{max-width:var(--max-width);margin:3rem auto;padding:0 1.5rem}
        .section-title{font-family:var(--font-display);font-size:2.2rem;font-weight:700;color:var(--clr-cyan);margin-bottom:1rem;text-align:center}
        .card{background:var(--clr-navy-card);border:1px solid var(--clr-border-glow);border-radius:var(--radius-lg);padding:2rem;box-shadow:var(--shadow-card)}
        .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
        .form-input,.form-textarea{width:100%;padding:0.8rem 1rem;background:var(--clr-navy-light);border:1px solid var(--clr-border-glow);border-radius:30px;color:var(--clr-white);font-family:var(--font-body);font-size:0.9rem;margin-bottom:1rem}
        .form-textarea{border-radius:var(--radius-md);min-height:120px;resize:vertical}
        .form-input:focus,.form-textarea:focus{outline:none;border-color:var(--clr-cyan)}
        .btn-submit{display:inline-flex;align-items:center;gap:0.5rem;background:var(--gradient-magenta);color:#fff;padding:0.8rem 2rem;border-radius:30px;font-weight:600;border:none;cursor:pointer}
        .info-item{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.5rem}
        .info-item i{font-size:1.3rem;color:var(--clr-cyan);margin-top:0.2rem}
        .footer-fat{background:#060615;border-top:2px solid var(--clr-cyan);padding:3rem 1.5rem 1.5rem;margin-top:auto}
        .footer-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2rem}
        .footer-col h4{font-family:var(--font-display);color:var(--clr-cyan);font-weight:600;margin-bottom:1rem;text-transform:uppercase;font-size:0.9rem}
        .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:0.5rem}
        .footer-col a{color:var(--clr-text-dim);text-decoration:none;font-size:0.85rem}
        .footer-col a:hover{color:var(--clr-magenta)}
        .footer-social{display:flex;gap:1rem;margin-top:1rem}
        .footer-social a{width:36px;height:36px;border-radius:50%;border:1px solid var(--clr-cyan);display:flex;align-items:center;justify-content:center;color:var(--clr-cyan)}
        .footer-social a:hover{background:var(--clr-magenta);border-color:var(--clr-magenta);color:#fff}
        .footer-bottom{max-width:1100px;margin:2rem auto 0;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.08);text-align:center;font-size:0.8rem;color:var(--clr-text-muted)}
        @media(max-width:768px){.contact-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <header class="site-header" id="site-header">
        <div class="header-container">
            <a href="index.html" class="logo-link"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
            <div class="nav-actions">
                <span id="auth-status"></span>
                <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
                <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            </div>
        </div>
    </header>

    <main>
        <section class="section">
            <h1 class="section-title">Contact Us</h1>
            <div class="contact-grid">
                <div class="card">
                    <h3 style="font-family:var(--font-display);color:var(--clr-cyan);margin-bottom:1rem"><i class="fa-solid fa-paper-plane"></i> Send a Message</h3>
                    <form id="contact-form">
                        <input type="text" class="form-input" id="cname" placeholder="Your name" required>
                        <input type="email" class="form-input" id="cemail" placeholder="Your email" required>
                        <input type="text" class="form-input" id="csub" placeholder="Subject">
                        <textarea class="form-textarea" id="cmsg" placeholder="Your message" required></textarea>
                        <button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
                        <p id="form-msg" style="color:#00ff88;text-align:center;margin-top:1rem;display:none"></p>
                    </form>
                </div>
                <div class="card">
                    <h3 style="font-family:var(--font-display);color:var(--clr-cyan);margin-bottom:1rem"><i class="fa-solid fa-address-book"></i> Contact Info</h3>
                    <div class="info-item"><i class="fa-solid fa-envelope"></i><div><strong>Email</strong><br><span style="color:var(--clr-text-dim)">learn@aliverbiopharm.com</span></div></div>
                    <div class="info-item"><i class="fa-solid fa-location-dot"></i><div><strong>Location</strong><br><span style="color:var(--clr-text-dim)">1 Biotech Plaza, Pharma District</span></div></div>
                    <div class="info-item"><i class="fa-solid fa-clock"></i><div><strong>Response Time</strong><br><span style="color:var(--clr-text-dim)">Within 24 hours</span></div></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer-fat">
        <div class="footer-grid" id="footer-grid"><div class="footer-col"><a href="index.html" class="logo-link" style="font-size:1.2rem"><i class="fa-solid fa-dna"></i> AliverBiopharm</a><p style="color:var(--clr-text-dim);margin-top:0.5rem">Advancing biology and pharmacy education.</p><div class="footer-social" id="footer-social"></div></div></div>
        <div class="footer-bottom"><p>&copy; <span id="current-year"></span> AliverBiopharm</p></div>
    </footer>

    <script>
        const API_BASE = '/api/query';
        async function apiCall(a, p = {}) {
            const h = { 'Content-Type': 'application/json' };
            const t = localStorage.getItem('sb-token');
            if (t) h['Authorization'] = `Bearer ${t}`;
            const r = await fetch(API_BASE, { method: 'POST', headers: h, body: JSON.stringify({ action: a, ...p }) });
            const j = await r.json();
            if (!r.ok) throw new Error(j.error || 'Failed');
            return j.data;
        }
        function esc(t) { const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }; return String(t || '').replace(/[&<>"']/g, c => m[c]); }
        function buildFooter(d) {
            if (!d?.columns) return;
            const fg = document.getElementById('footer-grid'), fs = document.getElementById('footer-social'), logo = fg.querySelector('.footer-col');
            fg.innerHTML = logo.outerHTML + d.columns.map(c => `<div class="footer-col"><h4>${esc(c.heading)}</h4><ul>${(c.items||[]).map(i => `<li><a href="${esc(i.href||'#')}">${i.icon?`<i class="${esc(i.icon)}" style="color:var(--clr-magenta);margin-right:0.5rem"></i>`:''}${esc(i.label)}</a></li>`).join('')}</ul></div>`).join('');
            fs.innerHTML = (d.social_links||[]).map(s => `<a href="${esc(s.url)}"><i class="${esc(s.icon)}"></i></a>`).join('');
        }
        function updateAuthUI() {
            const el = document.getElementById('auth-status');
            if (!el) return;
            const t = localStorage.getItem('sb-token');
            el.innerHTML = t ? `${esc(localStorage.getItem('sb-email')||'User')} <button onclick="signOut()" class="theme-toggle" style="font-size:0.8rem;padding:0.3rem 0.6rem">Sign Out</button>` : `<button onclick="showAuth()" class="theme-toggle" style="font-size:0.8rem;padding:0.3rem 0.6rem">Sign In</button>`;
        }
        window.signOut = async () => { try { await apiCall('signout') } catch(e){}; localStorage.removeItem('sb-token'); localStorage.removeItem('sb-email'); location.href = 'index.html' };
        window.showAuth = () => {
            const m = document.createElement('div');
            m.style.cssText = 'position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8)';
            m.innerHTML = `<div style="background:var(--clr-navy-card);border:2px solid var(--clr-cyan);border-radius:var(--radius-lg);padding:2rem;max-width:380px;width:90%;position:relative"><button onclick="this.closest('div').parentElement.remove()" style="position:absolute;top:0.5rem;right:0.5rem;background:none;border:none;color:var(--clr-text-dim);cursor:pointer;font-size:1.2rem">✕</button><h3 style="color:var(--clr-cyan);margin-bottom:1rem;text-align:center">Sign In</h3><form id="af" style="display:flex;flex-direction:column;gap:1rem"><input type="email" id="ae" placeholder="Email" required style="padding:0.7rem;border:1px solid var(--clr-border-glow);border-radius:0.5rem;background:var(--clr-navy-light);color:var(--clr-white)"><input type="password" id="ap" placeholder="Password" minlength="6" required style="padding:0.7rem;border:1px solid var(--clr-border-glow);border-radius:0.5rem;background:var(--clr-navy-light);color:var(--clr-white)"><button type="submit" style="background:var(--gradient-magenta);color:#fff;border:none;padding:0.7rem;border-radius:2rem;cursor:pointer;font-weight:600">Sign In</button></form><p style="text-align:center;margin-top:1rem;color:var(--clr-text-dim);font-size:0.9rem">No account? <a href='#' onclick="this.closest('div').parentElement.remove();showAuth()" style="color:var(--clr-magenta)">Sign up</a></p><p id="ae2" style="color:#ff4444;text-align:center;display:none"></p></div>`;
            document.body.appendChild(m);
            m.addEventListener('click', e => { if (e.target === m) m.remove() });
            m.querySelector('#af').onsubmit = async e => {
                e.preventDefault();
                try {
                    const d = await apiCall('signin', { email: m.querySelector('#ae').value.trim(), password: m.querySelector('#ap').value });
                    if (d.session) { localStorage.setItem('sb-token', d.session.access_token); localStorage.setItem('sb-email', d.user.email); m.remove(); updateAuthUI(); location.reload() }
                } catch(err) { m.querySelector('#ae2').textContent = err.message; m.querySelector('#ae2').style.display = 'block' }
            };
        };

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            updateAuthUI();
            const tt = document.getElementById('theme-toggle'), icon = tt.querySelector('i');
            if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); icon.classList.replace('fa-moon', 'fa-sun') }
            tt.onclick = () => { document.body.classList.toggle('light-mode'); const l = document.body.classList.contains('light-mode'); icon.classList.replace(l?'fa-moon':'fa-sun', l?'fa-sun':'fa-moon'); localStorage.setItem('theme', l?'light':'dark') };

            try { const s = await apiCall('get_all_site_sections'); if (s) buildFooter(s.footer) } catch(e) {}

            document.getElementById('contact-form').onsubmit = async e => {
                e.preventDefault();
                const fd = { name: document.getElementById('cname').value.trim(), email: document.getElementById('cemail').value.trim(), subject: document.getElementById('csub').value.trim(), message: document.getElementById('cmsg').value.trim() };
                if (!fd.name || !fd.email || !fd.message) return alert('Fill all required fields');
                try {
                    await apiCall('submit_contact', { formData: fd });
                    document.getElementById('form-msg').textContent = '✓ Message sent! We will respond within 24 hours.';
                    document.getElementById('form-msg').style.display = 'block';
                    e.target.reset();
                } catch(err) { alert(err.message) }
            };
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="Amour - Discover your perfect match">
  <title>Discover · Amour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <style>
    :root {
      --primary: #e84393;
      --primary-dark: #c62e78;
      --primary-light: #fce4ec;
      --surface: #ffffff;
      --bg: #fefaf7;
      --text-main: #1e1e2a;
      --text-muted: #6b6b7b;
      --text-light: #9a9aad;
      --nope-color: #ff4757;
      --like-color: #2ed573;
      --super-like-color: #ffa502;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 12px 28px rgba(0,0,0,0.07);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
      --shadow-xl: 0 30px 60px rgba(0,0,0,0.16);
      --radius-lg: 24px;
      --radius-xl: 32px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
    }
    .app-wrapper {
      max-width: 520px; margin: 0 auto; width: 100%; flex: 1;
      display: flex; flex-direction: column; position: relative;
    }

    /* Header */
    .discover-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid #f3e8ec; position: sticky; top:0; z-index: 100;
    }
    .discover-header h1 {
      font-size: 1.5rem; font-weight: 700; color: var(--primary);
      letter-spacing: -0.02em;
    }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 10px; border-radius: 50%;
      transition: all var(--transition); display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: var(--primary-light); color: var(--primary); }
    .icon-btn svg { width: 22px; height: 22px; }
    .badge-dot {
      position: absolute; top:6px; right:6px; width:9px; height:9px;
      background: var(--primary); border-radius: 50%; border:2px solid white;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100%{ transform:scale(1); opacity:0.9; }
      50%{ transform:scale(1.6); opacity:0.4; }
    }

    /* Card stack */
    .card-stack-container {
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:16px 20px 8px; position:relative; min-height:380px;
    }
    .card-stack {
      position:relative; width:100%; max-width:380px; height:440px;
      display:flex; align-items:center; justify-content:center;
      perspective: 1000px;
    }
    .profile-card {
      position:absolute; width:100%; height:100%;
      background:white; border-radius:var(--radius-lg);
      box-shadow:var(--shadow-md); overflow:hidden;
      display:flex; flex-direction:column; cursor:grab;
      transform-origin:center; will-change:transform;
      transition:box-shadow var(--transition);
    }
    .profile-card:active { cursor:grabbing; }
    .profile-card.dragging { cursor:grabbing; box-shadow:var(--shadow-xl); z-index:10!important; }
    .profile-card.card-0 { z-index:3; transform:scale(1) translateY(0); }
    .profile-card.card-1 { z-index:2; transform:scale(0.94) translateY(10px); filter:brightness(0.92); pointer-events:none; }
    .profile-card.card-2 { z-index:1; transform:scale(0.88) translateY(20px); filter:brightness(0.84); pointer-events:none; }
    .profile-card.swiping-left  { animation: throwLeft 0.45s cubic-bezier(0.35,0,0.65,1) forwards; }
    .profile-card.swiping-right { animation: throwRight 0.45s cubic-bezier(0.35,0,0.65,1) forwards; }
    .profile-card.snap-back    { animation: snapBack 0.4s cubic-bezier(0.2,0.8,0.3,1.2) forwards; }
    @keyframes throwLeft {
      0%   { transform:translateX(0) rotate(0deg); opacity:1; }
      100% { transform:translateX(-180%) rotate(-28deg); opacity:0; }
    }
    @keyframes throwRight {
      0%   { transform:translateX(0) rotate(0deg); opacity:1; }
      100% { transform:translateX(180%) rotate(28deg); opacity:0; }
    }
    @keyframes snapBack {
      0%   { transform:var(--snap-from); }
      60%  { transform:translateX(0) rotate(0deg) scale(1.02); }
      100% { transform:translateX(0) rotate(0deg) scale(1); }
    }
    .card-image {
      flex:1; min-height:260px; background:#e8dfe3;
      background-size:cover; background-position:center;
      position:relative; display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .card-image .img-gradient {
      position:absolute; bottom:0; left:0; right:0; height:50%;
      background:linear-gradient(to top, rgba(0,0,0,0.45), transparent); pointer-events:none;
    }
    .card-image .photo-placeholder {
      display:flex; flex-direction:column; align-items:center; gap:10px;
      color:#b0a0a8; z-index:1;
    }
    .card-image .photo-placeholder svg { width:56px; height:56px; opacity:0.5; }
    .stamp-overlay {
      position:absolute; top:24px; padding:10px 18px; border-radius:12px;
      font-weight:800; font-size:1.8rem; letter-spacing:0.04em; text-transform:uppercase;
      pointer-events:none; opacity:0; transition:opacity 0.1s; z-index:5; border:3px solid;
    }
    .stamp-nope { right:20px; color:var(--nope-color); border-color:var(--nope-color); transform:rotate(15deg); }
    .stamp-like { left:20px;  color:var(--like-color); border-color:var(--like-color); transform:rotate(-15deg); }

    .card-details { padding:16px 18px; background:white; }
    .card-details .name-age { font-size:1.35rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .card-details .name-age .age { font-weight:500; color:var(--text-muted); font-size:1.2rem; }
    .card-details .bio { color:var(--text-muted); margin:6px 0 10px; font-size:0.92rem; line-height:1.5; }
    .card-details .bio:empty::after { content:'No bio yet'; color:var(--text-light); font-style:italic; }
    .card-tags { display:flex; flex-wrap:wrap; gap:7px; }
    .tag { background:var(--primary-light); color:var(--primary-dark); padding:5px 13px; border-radius:20px; font-size:0.78rem; font-weight:500; }
    .tag.more { background:#f3f0f5; color:var(--text-muted); }

    /* Action buttons */
    .action-buttons { display:flex; justify-content:center; align-items:center; gap:20px; padding:10px 20px 16px; }
    .action-btn {
      border-radius:50%; border:none; background:white; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all var(--transition); flex-shrink:0; position:relative;
    }
    .action-btn:active { transform:scale(0.88); }
    .action-btn.pass { width:56px; height:56px; box-shadow:0 4px 16px rgba(255,71,87,0.2); color:var(--nope-color); }
    .action-btn.pass:hover { background:#fff0f0; box-shadow:0 8px 24px rgba(255,71,87,0.3); transform:scale(1.08); }
    .action-btn.super-like { width:48px; height:48px; box-shadow:0 4px 14px rgba(240,165,0,0.22); color:var(--super-like-color); }
    .action-btn.super-like:hover { background:#fff8eb; box-shadow:0 8px 22px rgba(240,165,0,0.35); transform:scale(1.1); }
    .action-btn.like { width:64px; height:64px; box-shadow:0 6px 20px rgba(46,213,115,0.22); color:var(--like-color); animation:gentle-pulse 2.5s ease-in-out infinite; }
    .action-btn.like:hover { background:#edfff5; box-shadow:0 10px 28px rgba(46,213,115,0.35); transform:scale(1.1); }
    .action-btn.undo { width:42px; height:42px; box-shadow:var(--shadow-sm); color:var(--text-muted); }
    .action-btn.undo:hover { background:#f5f5f8; box-shadow:var(--shadow-md); transform:scale(1.06); }
    .action-btn.undo:disabled { opacity:0.4; pointer-events:none; }
    .action-btn.pass svg { width:28px; height:28px; }
    .action-btn.like svg { width:32px; height:32px; }
    .action-btn.super-like svg { width:24px; height:24px; }
    .action-btn.undo svg { width:20px; height:20px; }
    @keyframes gentle-pulse {
      0%,100%{ box-shadow:0 6px 20px rgba(46,213,115,0.22); }
      50%{ box-shadow:0 10px 30px rgba(46,213,115,0.4); }
    }
    .super-like-burst {
      position:absolute; pointer-events:none;
      animation:burst-out 0.7s ease-out forwards;
    }
    @keyframes burst-out {
      0%   { transform:scale(0.2); opacity:1; }
      100% { transform:scale(3); opacity:0; }
    }

    /* Empty state */
    .empty-state { text-align:center; padding:40px 24px; color:var(--text-muted); display:flex; flex-direction:column; align-items:center; gap:12px; }
    .empty-state svg { width:72px; height:72px; color:var(--primary); opacity:0.6; }
    .empty-state h3 { font-size:1.3rem; font-weight:700; color:var(--text-main); }
    .empty-state p { font-size:0.95rem; max-width:280px; line-height:1.5; }
    .empty-state .btn-outline { margin-top:8px; padding:12px 24px; border-radius:28px; border:2px solid var(--primary); background:transparent; color:var(--primary); font-weight:600; cursor:pointer; font-family:inherit; font-size:0.95rem; transition:all var(--transition); }
    .empty-state .btn-outline:hover { background:var(--primary-light); }

    /* Skeleton loader */
    .skeleton-card { position:absolute; width:100%; height:100%; background:white; border-radius:var(--radius-lg); overflow:hidden; display:flex; flex-direction:column; z-index:1; }
    .skeleton-card .sk-img { flex:1; background:linear-gradient(120deg, #f0e8ec 30%, #f8f4f5 50%, #f0e8ec 70%); background-size:200% 100%; animation:shimmer 1.6s infinite; }
    .skeleton-card .sk-details { padding:16px 18px; display:flex; flex-direction:column; gap:10px; }
    .skeleton-card .sk-line { height:16px; border-radius:8px; background:linear-gradient(120deg, #f0e8ec 30%, #f8f4f5 50%, #f0e8ec 70%); background-size:200% 100%; animation:shimmer 1.6s infinite; }
    .skeleton-card .sk-line.wide { width:65%; height:20px; }
    .skeleton-card .sk-line.medium { width:85%; }
    .skeleton-card .sk-line.short { width:45%; }
    @keyframes shimmer {
      0%   { background-position:200% 0; }
      100% { background-position:-200% 0; }
    }

    /* Bottom nav */
    .bottom-nav {
      display:flex; justify-content:space-around; background:rgba(255,255,255,0.9);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-top:1px solid #f3e8ec; padding:10px 0 14px; position:sticky; bottom:0; z-index:100;
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      text-decoration:none; color:var(--text-muted); font-size:0.7rem; font-weight:500;
      background:none; border:none; cursor:pointer; font-family:inherit;
      padding:6px 10px; border-radius:12px; transition:all var(--transition); position:relative;
    }
    .nav-item.active { color:var(--primary); }
    .nav-item:hover { color:var(--primary); background:var(--primary-light); }
    .nav-item svg { width:22px; height:22px; }
    .nav-item .nav-badge {
      position:absolute; top:-2px; right:-2px; min-width:18px; height:18px;
      background:var(--primary); color:white; font-size:0.65rem; font-weight:700;
      border-radius:10px; display:flex; align-items:center; justify-content:center;
      padding:0 5px; border:2px solid white;
    }

    /* Match modal */
    .match-modal {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center;
      z-index:2000; visibility:hidden; opacity:0; transition:opacity 0.3s, visibility 0.3s;
    }
    .match-modal.active { visibility:visible; opacity:1; }
    .match-content {
      background:white; border-radius:var(--radius-lg); padding:36px 28px 28px;
      text-align:center; max-width:340px; width:90%; box-shadow:0 30px 60px rgba(0,0,0,0.3);
      animation:pop-in 0.45s cubic-bezier(0.2,0.9,0.4,1.1);
    }
    @keyframes pop-in {
      0%   { transform:scale(0.7); opacity:0; }
      100% { transform:scale(1); opacity:1; }
    }
    .match-content h2 { font-size:2rem; font-weight:800; margin-bottom:6px; color:var(--primary); }
    .match-content p { color:var(--text-muted); margin-bottom:20px; font-size:0.95rem; }
    .match-content .btn-primary {
      background:var(--primary); color:white; border:none; padding:13px 32px;
      border-radius:30px; font-weight:600; font-size:1rem; cursor:pointer;
      font-family:inherit; transition:all var(--transition);
      box-shadow:0 8px 24px rgba(232,67,147,0.35);
    }
    .match-content .btn-primary:hover { background:var(--primary-dark); transform:translateY(-2px); box-shadow:0 12px 30px rgba(232,67,147,0.45); }
    .match-content .btn-secondary {
      background:transparent; color:var(--text-muted); border:none; padding:10px 20px;
      cursor:pointer; font-family:inherit; font-size:0.9rem; margin-top:4px; font-weight:500;
    }

    /* Filter modal */
    .filter-modal {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.6); display:flex; align-items:flex-end; justify-content:center;
      z-index:1500; visibility:hidden; opacity:0; transition:opacity 0.3s, visibility 0.3s;
    }
    .filter-modal.active { visibility:visible; opacity:1; }
    .filter-sheet {
      background:white; border-radius:var(--radius-lg) var(--radius-lg) 0 0;
      width:100%; max-width:520px; padding:20px 24px 32px; max-height:80vh; overflow-y:auto;
      transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.3,0.9,0.4,1);
    }
    .filter-modal.active .filter-sheet { transform:translateY(0); }
    .filter-sheet h3 { font-size:1.3rem; font-weight:700; margin-bottom:20px; }
    .filter-group { margin-bottom:18px; }
    .filter-group label { font-weight:600; font-size:0.85rem; color:var(--text-muted); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em; }
    .chip-row { display:flex; flex-wrap:wrap; gap:10px; }
    .chip {
      padding:10px 16px; border-radius:24px; border:2px solid #e8dfe5; background:white;
      cursor:pointer; font-family:inherit; font-size:0.88rem; font-weight:500;
      transition:all var(--transition); color:var(--text-main);
    }
    .chip.selected { border-color:var(--primary); background:var(--primary-light); color:var(--primary); font-weight:600; }
    .age-inputs { display:flex; gap:12px; align-items:center; }
    .age-inputs input {
      width:70px; padding:10px; border-radius:12px; border:2px solid #e8dfe5;
      font-family:inherit; font-size:0.95rem; text-align:center; transition:all var(--transition);
    }
    .age-inputs input:focus { border-color:var(--primary); outline:none; box-shadow:0 0 0 3px var(--primary-light); }
    .age-inputs span { color:var(--text-muted); font-weight:500; }
    .filter-actions { display:flex; gap:12px; margin-top:20px; }
    .btn-apply {
      flex:1; padding:14px; border-radius:28px; background:var(--primary); color:white;
      border:none; font-weight:600; font-size:1rem; cursor:pointer; font-family:inherit;
    }
    .btn-reset {
      padding:14px 24px; border-radius:28px; background:transparent; border:2px solid #e8dfe5;
      color:var(--text-muted); font-weight:600; cursor:pointer; font-family:inherit;
    }

    /* Toast */
    .toast {
      position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px);
      background:#2d2f31; color:white; padding:12px 24px; border-radius:28px;
      font-weight:500; font-size:0.9rem; z-index:1800; opacity:0; transition:all 0.3s; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    @media (max-width:420px) {
      .card-stack { height:400px; max-width:340px; }
      .card-image { min-height:230px; }
      .action-btn.pass { width:50px; height:50px; }
      .action-btn.like { width:58px; height:58px; }
      .action-btn.super-like { width:42px; height:42px; }
      .action-btn.undo { width:36px; height:36px; }
      .action-buttons { gap:14px; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <header class="discover-header">
    <h1>Discover</h1>
    <div class="header-actions">
      <button class="icon-btn" id="filterBtn" aria-label="Filters"><i data-lucide="sliders-horizontal"></i></button>
      <button class="icon-btn" id="profileBtn" aria-label="My Profile"><i data-lucide="user"></i></button>
    </div>
  </header>

  <div class="card-stack-container" id="cardStackContainer">
    <div class="card-stack" id="cardStack"></div>
  </div>

  <div class="action-buttons">
    <button class="action-btn undo" id="undoBtn" disabled aria-label="Undo"><i data-lucide="rotate-ccw"></i></button>
    <button class="action-btn pass" id="passBtn" aria-label="Pass"><i data-lucide="x"></i></button>
    <button class="action-btn super-like" id="superLikeBtn" aria-label="Super Like"><i data-lucide="star"></i></button>
    <button class="action-btn like" id="likeBtn" aria-label="Like"><i data-lucide="heart"></i></button>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-page="discover"><i data-lucide="compass"></i> Discover</button>
    <button class="nav-item" data-page="matches"><i data-lucide="heart-handshake"></i> Matches <span class="nav-badge" id="matchBadge" style="display:none">0</span></button>
    <button class="nav-item" data-page="messages"><i data-lucide="message-circle"></i> Messages</button>
    <button class="nav-item" data-page="profile"><i data-lucide="user"></i> Profile</button>
  </nav>
</div>

<div class="match-modal" id="matchModal">
  <div class="match-content">
    <h2>It's a Match!</h2>
    <p>You and <strong id="matchName"></strong> liked each other</p>
    <button class="btn-primary" id="matchContinueBtn">Start chatting</button>
    <button class="btn-secondary" id="matchCloseBtn">Keep swiping</button>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="filter-modal" id="filterModal">
  <div class="filter-sheet">
    <h3>Filter Profiles</h3>
    <div class="filter-group">
      <label>I'm interested in</label>
      <div class="chip-row" id="genderChips">
        <button class="chip" data-value="male">Male</button>
        <button class="chip" data-value="female">Female</button>
        <button class="chip" data-value="non-binary">Non-binary</button>
        <button class="chip" data-value="other">Other</button>
      </div>
    </div>
    <div class="filter-group">
      <label>Age range</label>
      <div class="age-inputs">
        <input type="number" id="ageMinInput" placeholder="18" min="18" max="99" value="18">
        <span>to</span>
        <input type="number" id="ageMaxInput" placeholder="50" min="18" max="99" value="50">
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn-reset" id="filterResetBtn">Reset</button>
      <button class="btn-apply" id="filterApplyBtn">Apply Filters</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

    let supabase, currentUser, currentProfile;

    // ── DOM refs ─────────────────
    const cardStack = document.getElementById('cardStack');

    const escapeHtml = s => s ? String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) : '';
    const safeIcons = () => { if (window.lucide) lucide.createIcons(); };
    const showToast = (msg, duration = 2000) => {

        await new Promise(r => setTimeout(r, 100)); attempts++;
      }
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: true, autoRefreshToken: true }
      });
    };

    const requireAuth = async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.replace('/auth.html'); return false; }
      currentUser = session.user;
      return true;
    };

    const loadProfile = async () => {
      const { data, error } = await supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
      if (error || !data || !data.display_name) { window.location.replace('/index.html'); return null; }
      currentProfile = data;
      return data;
    };

    const calculateAge = (birthdate) => {
      if (!birthdate) return null;
      const today = new Date(), birth = new Date(birthdate);
      let age = today.getFullYear() - birth.getFullYear();
      const m = today.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
      return age;
    };

    // ── Blocked users filter ─────
    const getBlockedIds = async () => {
      const [blockedByMe, blockedMe] = await Promise.all([
        supabase.from('blocks').select('blocked_id').eq('blocker_id', currentUser.id),
        supabase.from('blocks').select('blocker_id').eq('blocked_id', currentUser.id)
      ]);
      const ids = new Set();
      (blockedByMe.data || []).forEach(r => ids.add(r.blocked_id));
      (blockedMe.data || []).forEach(r => ids.add(r.blocker_id));
      return [...ids];
    };

    // ── Super like limit using table ──
     const getSuperLikeCountToday = async () => {
  const today = new Date().toISOString().split('T')[0];  // 'YYYY-MM-DD'
  const { count } = await supabase
    .from('super_likes')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', currentUser.id)
    .eq('liked_date', today);
  return count || 0;
};

    const refreshSuperLikeUI = async () => {
      const count = await getSuperLikeCountToday();
      const btn = document.getElementById('superLikeBtn');
      if (count >= SUPER_LIKE_DAILY_LIMIT) {
        btn.style.opacity = '0.4'; btn.style.pointerEvents = 'none';
        btn.title = 'Super Like used up for today';
      } else {
        btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
        btn.title = `Super Like (${SUPER_LIKE_DAILY_LIMIT - count} left today)`;
      }
    };

    // ── Fetch potential matches ──
    const fetchMatches = async (overrideFilters = null) => {
      if (!currentProfile && !overrideFilters) return;
      const profile = overrideFilters || currentProfile;
      if (!profile) return;

      const blockedIds = await getBlockedIds();
      let query = supabase.from('profiles').select('*').neq('id', currentUser.id);
      if (blockedIds.length) query = query.not('id', 'in', `(${blockedIds.join(',')})`);

      const genderPrefs = profile.gender_preferences;
      if (genderPrefs && Array.isArray(genderPrefs) && genderPrefs.length) {
        query = query.in('gender', genderPrefs);
      }

      const ageMin = profile.age_min ?? 18;
      const ageMax = profile.age_max ?? 99;
      if (ageMin) query = query.gte('age', ageMin);
      if (ageMax) query = query.lte('age', ageMax);

      const { data: swiped } = await supabase.from('likes').select('liked_id').eq('liker_id', currentUser.id);
      const swipedIds = (swiped || []).map(s => s.liked_id).filter(id => id);
      if (swipedIds.length) query = query.not('id', 'in', `(${swipedIds.join(',')})`);

      const { data, error } = await query.limit(30);
      if (error) { showToast('Could not load profiles.'); return; }
      potentialMatches = data || [];
      currentCardIndex = 0;
      lastAction = null;
      undoBtn.disabled = true;
      renderCards();
    };

    // ── Render cards ─────────────
    const renderCards = () => {
      cardStack.innerHTML = '';
      if (!potentialMatches.length || currentCardIndex >= potentialMatches.length) {
        cardStack.innerHTML = `
          <div class="empty-state">
            <i data-lucide="search"></i>
            <h3>No more profiles</h3>
            <p>Try adjusting your filters or check back later.</p>
            <button class="btn-outline" id="refreshEmptyBtn">Refresh</button>
          </div>`;
        safeIcons();
        document.getElementById('refreshEmptyBtn')?.addEventListener('click', () => {
          cardStack.innerHTML = createSkeletonHTML();
          fetchMatches();
        });
        return;
      }
      const cardsToShow = Math.min(3, potentialMatches.length - currentCardIndex);
      for (let i = 0; i < cardsToShow; i++) {
        const profile = potentialMatches[currentCardIndex + i];
        const age = profile.birthdate ? calculateAge(profile.birthdate) : (profile.age || '');
        const cardEl = document.createElement('div');
        cardEl.className = `profile-card card-${i}`;
        cardEl.dataset.profileId = profile.id;
        cardEl.dataset.index = i;
        cardEl.innerHTML = `
          <div class="card-image" style="${profile.avatar_url ? `background-image:url(${escapeHtml(profile.avatar_url)})` : ''}">
            ${!profile.avatar_url ? `<div class="photo-placeholder"><i data-lucide="camera"></i><span>No photo</span></div>` : ''}
            <div class="img-gradient"></div>
            <div class="stamp-overlay stamp-nope">NOPE</div>
            <div class="stamp-overlay stamp-like">LIKE</div>
          </div>
          <div class="card-details">
            <div class="name-age"><span>${escapeHtml(profile.display_name || 'User')}</span>${age ? `<span class="age">${escapeHtml(String(age))}</span>` : ''}</div>
            <div class="bio">${escapeHtml(profile.bio || '')}</div>
            <div class="card-tags">
              ${(profile.interests || []).slice(0,4).map(i => `<span class="tag">${escapeHtml(i)}</span>`).join('')}
              ${(profile.interests || []).length > 4 ? `<span class="tag more">+${profile.interests.length - 4} more</span>` : ''}
            </div>
          </div>`;
        cardStack.appendChild(cardEl);
      }
      activeCardEl = cardStack.querySelector('.profile-card.card-0');
      if (activeCardEl) attachDragHandlers(activeCardEl);
      safeIcons();
    };

    const createSkeletonHTML = () => `
        <div class="skeleton-card card-0">
        <div class="sk-img"></div>
        <div class="sk-details">
          <div class="sk-line wide"></div>
          <div class="sk-line medium"></div>
          <div class="sk-line short"></div>
        </div>
      </div>`;

    // ── Drag handlers ────────────
    const attachDragHandlers = (cardEl) => {
      cardEl.addEventListener('mousedown', onDragStart);
      window.addEventListener('mousemove', onDragMove);
      window.addEventListener('mouseup', onDragEnd);
      cardEl.addEventListener('touchstart', onDragStart, { passive: false });
      window.addEventListener('touchmove', onDragMove, { passive: false });
      window.addEventListener('touchend', onDragEnd);
      window.addEventListener('touchcancel', onDragEnd);
      cardEl._cleanup = () => {
        window.removeEventListener('mousemove', onDragMove);
        window.removeEventListener('mouseup', onDragEnd);
        window.removeEventListener('touchmove', onDragMove);
        window.removeEventListener('touchend', onDragEnd);
        window.removeEventListener('touchcancel', onDragEnd);
      };
    };

    const getEventPos = (e) => {
      if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    };

    const onDragStart = (e) => {
      if (isSwiping || !activeCardEl || isDragging) return;
      if (!e.currentTarget.classList.contains('card-0')) return;
      const pos = getEventPos(e);
      dragStartX = pos.x; dragStartY = pos.y; dragCurrentX = pos.x;
      dragStartTime = Date.now();
      isDragging = true;
      activeCardEl = e.currentTarget;
      activeCardEl.classList.add('dragging');
      activeCardEl.style.transition = 'none';
      e.preventDefault();
    };

    const onDragMove = (e) => {
      if (!isDragging || !activeCardEl) return;
      const pos = getEventPos(e);
      dragCurrentX = pos.x;
      const deltaX = dragCurrentX - dragStartX;
      const deltaY = pos.y - dragStartY;
      activeCardEl.style.transform = `translateX(${deltaX}px) translateY(${deltaY}px) rotate(${deltaX * 0.08}deg)`;
      activeCardEl.style.setProperty('--snap-from', `translateX(${deltaX}px) translateY(${deltaY}px) rotate(${deltaX * 0.08}deg)`);
      const stampNope = activeCardEl.querySelector('.stamp-nope');
      const stampLike = activeCardEl.querySelector('.stamp-like');
      if (deltaX < -20 && stampNope) stampNope.style.opacity = Math.min(1, Math.abs(deltaX) / SWIPE_THRESHOLD);
      else if (stampNope) stampNope.style.opacity = 0;
      if (deltaX > 20 && stampLike) stampLike.style.opacity = Math.min(1, Math.abs(deltaX) / SWIPE_THRESHOLD);
      else if (stampLike) stampLike.style.opacity = 0;
      e.preventDefault();
    };

    const onDragEnd = (e) => {
      if (!isDragging || !activeCardEl) return;
      isDragging = false;
      activeCardEl.classList.remove('dragging');
      const deltaX = dragCurrentX - dragStartX;
      const deltaTime = Date.now() - dragStartTime;
      const velocity = deltaTime > 0 ? Math.abs(deltaX) / deltaTime : 0;
      let direction = null;
      if (Math.abs(deltaX) > SWIPE_THRESHOLD || velocity > SWIPE_VELOCITY_THRESHOLD) {
        direction = deltaX > 0 ? 'right' : 'left';
      }
      const stampNope = activeCardEl.querySelector('.stamp-nope');
      const stampLike = activeCardEl.querySelector('.stamp-like');
      if (stampNope) stampNope.style.opacity = 0;
      if (stampLike) stampLike.style.opacity = 0;
      if (direction) {
        completeSwipe(direction, activeCardEl);
      } else {
        activeCardEl.style.transition = 'transform 0.4s cubic-bezier(0.2,0.8,0.3,1.2)';
        activeCardEl.style.transform = 'translateX(0) translateY(0) rotate(0deg)';
        activeCardEl.classList.add('snap-back');
        setTimeout(() => { if (activeCardEl) activeCardEl.classList.remove('snap-back'); }, 400);
      }
    };

    // ── Swipe completion ─────────
    const completeSwipe = async (direction, cardEl) => {
      if (isSwiping) return;
      isSwiping = true;
      const profileId = cardEl.dataset.profileId;
      const profile = potentialMatches[currentCardIndex];
      if (!profile || profile.id !== profileId) { isSwiping = false; return; }

      cardEl.style.transition = 'transform 0.45s cubic-bezier(0.35,0,0.65,1), opacity 0.45s cubic-bezier(0.35,0,0.65,1)';
      if (direction === 'right') {
        cardEl.style.transform = 'translateX(180%) rotate(28deg)';
        cardEl.style.opacity = '0';
      } else {
        cardEl.style.transform = 'translateX(-180%) rotate(-28deg)';
        cardEl.style.opacity = '0';
      }
      vibrate(direction === 'right' ? [15,30,15] : 10);
      lastAction = { profileId: profile.id, profileData: { ...profile }, direction };
      undoBtn.disabled = false;

      try {
        if (direction === 'right') await likeUser(profile.id);
        else await passUser(profile.id);
      } catch (err) { console.error('Swipe record error:', err); }

      setTimeout(() => {
        currentCardIndex++;
        if (cardEl._cleanup) cardEl._cleanup();
        cardEl.remove();
        activeCardEl = null;
        isSwiping = false;
        renderCards();
      }, 460);
    };

    // ── Backend actions ──────────
    const likeUser = async (likedId) => {
      // Record like
      const { error } = await supabase.from('likes').insert({ liker_id: currentUser.id, liked_id: likedId });
      if (error && error.code !== '23505') return null;
      // Check mutual like
      const { data: mutual } = await supabase.from('likes')
        .select('*').eq('liker_id', likedId).eq('liked_id', currentUser.id).maybeSingle();
      if (mutual) {
        // Insert match record
        await supabase.from('matches').insert({
          user1_id: currentUser.id,
          user2_id: likedId
        });
        const matchedProfile = potentialMatches.find(p => p.id === likedId) || lastAction?.profileData;
        matchNameEl.textContent = matchedProfile?.display_name || 'someone';
        matchModal.classList.add('active');
        spawnConfetti();
        vibrate([30,50,30,50,60]);
        updateMatchBadge();
      }
    };

    const passUser = async (likedId) => {
      await supabase.from('likes').insert({ liker_id: currentUser.id, liked_id: likedId });
    };

    const superLikeUser = async (likedId) => {
      const count = await getSuperLikeCountToday();
      if (count >= SUPER_LIKE_DAILY_LIMIT) {
        showToast('No Super Likes left today.');
        return false;
      }
      await supabase.from('super_likes').insert({ user_id: currentUser.id, liked_user_id: likedId });
      const btn = document.getElementById('superLikeBtn');
      const burst = document.createElement('div');
      burst.className = 'super-like-burst';
      burst.style.cssText = 'position:absolute;top:50%;left:50%;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#ffa502,transparent);transform:translate(-50%,-50%);pointer-events:none;z-index:5;';
      btn.appendChild(burst);
      setTimeout(() => burst.remove(), 700);
      vibrate([20,30,20,30,40]);
      await likeUser(likedId);
      refreshSuperLikeUI();
      return true;
    };

    const undoLastAction = async () => {
      if (!lastAction || isSwiping) return;
      const { profileId, profileData } = lastAction;
      await supabase.from('likes').delete().eq('liker_id', currentUser.id).eq('liked_id', profileId);
      potentialMatches.splice(currentCardIndex, 0, profileData);
      lastAction = null;
      undoBtn.disabled = true;
      renderCards();
      showToast('Undo successful. Profile restored.');
    };

    const updateMatchBadge = async () => {
      try {
        const { data: myLikes } = await supabase.from('likes').select('liked_id').eq('liker_id', currentUser.id);
        const likedIds = (myLikes || []).map(l => l.liked_id);
        if (!likedIds.length) { matchBadge.style.display = 'none'; return; }
        const { data: mutuals } = await supabase.from('likes')
          .select('liker_id').in('liker_id', likedIds).eq('liked_id', currentUser.id);
        const count = (mutuals || []).length;
        matchBadge.style.display = count ? 'flex' : 'none';
        matchBadge.textContent = count;
      } catch (e) {}
    };

    // ── Confetti ─────────────────
    const spawnConfetti = () => {
      const colors = ['#e84393','#ff6ba6','#ffa502','#2ed573','#ff4757','#7bed9f','#ffda79','#70a1ff','#ff6348','#a29bfe'];
      const frag = document.createDocumentFragment();
      for (let i=0; i<80; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random()*100+'%';
        piece.style.top = -(Math.random()*40+10)+'%';
        piece.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        piece.style.width = (Math.random()*10+6)+'px';
        piece.style.height = (Math.random()*16+6)+'px';
        piece.style.animationDuration = (Math.random()*1.5+1)+'s';
        piece.style.animationDelay = Math.random()*0.5+'s';
        piece.style.borderRadius = Math.random()>0.5?'50%':'3px';
        piece.style.position = 'absolute';
        piece.style.animation = 'confetti-fall 1.2s ease-out forwards';
        frag.appendChild(piece);
      }
      document.getElementById('confettiContainer').appendChild(frag);
      setTimeout(() => { document.getElementById('confettiContainer').innerHTML = ''; }, 2500);
    };

    // ── Filter modal ─────────────
    const openFilterModal = () => {
      const prefs = currentProfile?.gender_preferences || [];
      document.querySelectorAll('#genderChips .chip').forEach(chip => {
        chip.classList.toggle('selected', prefs.includes(chip.dataset.value));
      });
      document.getElementById('ageMinInput').value = currentProfile?.age_min ?? 18;
      document.getElementById('ageMaxInput').value = currentProfile?.age_max ?? 50;
      filterModal.classList.add('active');
    };
    const closeFilterModal = () => filterModal.classList.remove('active');
    const applyFilters = async () => {
      const selectedGenders = [];
      document.querySelectorAll('#genderChips .chip.selected').forEach(chip => selectedGenders.push(chip.dataset.value));
      const ageMin = Math.max(18, Math.min(parseInt(document.getElementById('ageMinInput').value) || 18, 99));
      const ageMax = Math.max(18, Math.min(parseInt(document.getElementById('ageMaxInput').value) || 50, 99));

      if (currentProfile) {
        await supabase.from('profiles').update({
          gender_preferences: selectedGenders.length ? selectedGenders : ['male','female','non-binary','other'],
          age_min: ageMin,
          age_max: ageMax
        }).eq('id', currentUser.id);
        currentProfile.gender_preferences = selectedGenders.length ? selectedGenders : ['male','female','non-binary','other'];
        currentProfile.age_min = ageMin;
        currentProfile.age_max = ageMax;
      }
      closeFilterModal();
      cardStack.innerHTML = createSkeletonHTML();
      await fetchMatches();
      showToast('Filters applied.');
    };
    const resetFilters = () => {
      document.querySelectorAll('#genderChips .chip').forEach(chip => chip.classList.add('selected'));
      document.getElementById('ageMinInput').value = 18;
      document.getElementById('ageMaxInput').value = 50;
    };

    // ── Event listeners ──────────
    document.getElementById('likeBtn').addEventListener('click', () => {
      if (isSwiping || !activeCardEl || isDragging) return;
      completeSwipe('right', activeCardEl);
    });
    document.getElementById('passBtn').addEventListener('click', () => {
      if (isSwiping || !activeCardEl || isDragging) return;
      completeSwipe('left', activeCardEl);
    });
    document.getElementById('superLikeBtn').addEventListener('click', async () => {
      if (isSwiping || !activeCardEl || isDragging) return;
      const profile = potentialMatches[currentCardIndex];
      if (!profile) return;
      const ok = await superLikeUser(profile.id);
      if (ok) completeSwipe('right', activeCardEl);
    });
    document.getElementById('undoBtn').addEventListener('click', undoLastAction);

    document.getElementById('matchContinueBtn').addEventListener('click', () => {
      matchModal.classList.remove('active');
      showToast('Open Messages to start chatting.');
    });
    document.getElementById('matchCloseBtn').addEventListener('click', () => matchModal.classList.remove('active'));
    matchModal.addEventListener('click', (e) => { if (e.target === e.currentTarget) matchModal.classList.remove('active'); });

    document.getElementById('filterBtn').addEventListener('click', openFilterModal);
    document.getElementById('filterApplyBtn').addEventListener('click', applyFilters);
    document.getElementById('filterResetBtn').addEventListener('click', resetFilters);
    filterModal.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeFilterModal(); });
    document.querySelectorAll('#genderChips .chip').forEach(chip => chip.addEventListener('click', () => chip.classList.toggle('selected')));

    document.getElementById('profileBtn').addEventListener('click', () => window.location.href = '/index.html');

    document.querySelectorAll('.bottom-nav .nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.bottom-nav .nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const page = btn.dataset.page;
        if (page === 'matches') showToast('Matches page coming soon.');
        else if (page === 'messages') showToast('Messages page coming soon.');
        else if (page === 'profile') window.location.href = '/index.html';
      });
    });

    document.addEventListener('keydown', (e) => {
      if (isSwiping || isDragging) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight') { e.preventDefault(); if (activeCardEl) completeSwipe('right', activeCardEl); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); if (activeCardEl) completeSwipe('left', activeCardEl); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); document.getElementById('superLikeBtn').click(); }
      else if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undoLastAction(); }
      else if (e.key === 'Escape') {
        if (filterModal.classList.contains('active')) closeFilterModal();
        if (matchModal.classList.contains('active')) matchModal.classList.remove('active');
      }
    });

    // Confetti fall animation
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
      .confetti-piece {
        animation: confetti-fall 1.2s ease-out forwards;
      }
      @keyframes confetti-fall {
        0%   { transform:translateY(-120px) rotate(0deg) scale(1); opacity:1; }
        100% { transform:translateY(105vh) rotate(720deg) scale(0.3); opacity:0; }
      }
    `;
    document.head.appendChild(styleSheet);

    // ── Init ─────────────────────
    const init = async () => {
      try {
        await initSupabase();
        if (!await requireAuth()) return;
        await loadProfile();
        await fetchMatches();
        await updateMatchBadge();
        await refreshSuperLikeUI();
        safeIcons();
      } catch (err) {
        console.error('Init error:', err);
        cardStack.innerHTML = `
          <div class="empty-state">
            <i data-lucide="alert-triangle"></i>
            <h3>Something went wrong</h3>
            <p>Please refresh the page or try again later.</p>
            <button class="btn-outline" onclick="location.reload()">Refresh</button>
          </div>`;
        safeIcons();
      }
    };
    init();
  })();
</script>
</body>
</html>

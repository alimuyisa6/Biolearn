<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Study Notes — AliverBiopharm</title>
  <meta name="description" content="Read full biology and pharmacy study notes." />
  <meta name="theme-color" content="#012c2c" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: http: 'unsafe-inline' 'unsafe-eval'; script-src 'self' https: http: 'unsafe-inline' 'unsafe-eval'; style-src 'self' https: http: 'unsafe-inline'; img-src 'self' https: http: data:; font-src 'self' https: http: data:; connect-src 'self' https: http:;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            teal: {
              950: '#012c2c', 900: '#013d3d', 800: '#025252', 700: '#037070',
              600: '#069090', 500: '#0ab5b5', 400: '#2ecece', 300: '#6ee7e7',
              200: '#a8f3f3', 100: '#d4fafa',
            },
            gold: { 500: '#c9a84c', 400: '#e2c06a', 300: '#f0d896' },
            cream: '#f9f5ee',
          },
          animation: {
            'spin-slow': 'spin 20s linear infinite',
          },
        },
      },
    }
  </script>
  <style>
    /* ── Global Variables & Base ── */
    :root {
      --clr-deep-space: #012c2c; --clr-cyan: #0ab5b5; --clr-magenta: #c9a84c;
      --clr-navy-card: rgba(2, 82, 82, 0.45); --clr-navy-light: rgba(2, 82, 82, 0.25);
      --clr-white: #f9f5ee; --clr-text-dim: rgba(249, 245, 238, 0.7);
      --clr-text-muted: rgba(249, 245, 238, 0.45);
      --clr-border-glow: rgba(10, 181, 181, 0.25);
      --shadow-card: 0 15px 40px rgba(0, 0, 0, 0.4);
      --transition-fast: 180ms ease; --transition-smooth: 350ms cubic-bezier(0.4,0,0.2,1);
      --max-width: 1200px;
      --font-body: 'DM Sans', sans-serif;
      --font-display: 'Playfair Display', serif;
      --radius-sm: 0.5rem; --radius-md: 0.85rem; --radius-lg: 1.4rem;
      --gradient-cyan: linear-gradient(135deg, #0ab5b5, #069090);
      --gradient-magenta: linear-gradient(135deg, #c9a84c, #e2c06a);
    }
    body.light-mode {
      --clr-deep-space: #f9f5ee; --clr-cyan: #037070; --clr-magenta: #b08a2c;
      --clr-navy-card: #ffffff; --clr-navy-light: #e2f0f0;
      --clr-white: #012c2c; --clr-text-dim: #2c4a4a;
      --clr-text-muted: #4a6666;
      --clr-border-glow: rgba(3, 112, 112, 0.25);
      --shadow-card: 0 8px 36px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--clr-deep-space);
      color: var(--clr-white);
      line-height: 1.6;
      min-height: 100vh;
      display: flex; flex-direction: column;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(10,181,181,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(201,168,76,0.06) 0%, transparent 60%);
      transition: background 0.35s, color 0.35s;
    }
    body.light-mode { background-image: none; }

    /* ── Header ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(1, 44, 44, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--clr-border-glow);
      padding: 0.8rem 0;
    }
    body.light-mode .site-header { background: rgba(249, 245, 238, 0.88); }
    .header-container {
      max-width: var(--max-width); margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
    }
    .logo-link {
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 700;
      color: var(--clr-cyan); text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem;
      text-shadow: 0 0 18px rgba(10,181,181,0.4);
      letter-spacing: -0.02em;
    }
    .logo-link i { color: var(--clr-magenta); }
    .home-btn {
      background: transparent; border: 1.5px solid var(--clr-cyan);
      color: var(--clr-cyan); font-size: 0.9rem; font-weight: 500;
      padding: 0.5rem 1.2rem; border-radius: 30px;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.4rem;
      transition: all var(--transition-fast);
    }
    .home-btn:hover { background: var(--clr-cyan); color: #012c2c; }

    /* ── Layout ── */
    .notes-layout {
      max-width: var(--max-width); margin: 2rem auto;
      padding: 0 1.5rem; display: grid;
      grid-template-columns: 300px 1fr; gap: 2rem;
      flex: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--clr-navy-card); backdrop-filter: blur(12px);
      border: 1px solid var(--clr-border-glow);
      border-radius: var(--radius-lg); padding: 1.5rem;
      max-height: 75vh; overflow-y: auto;
      box-shadow: var(--shadow-card);
      position: sticky; top: 5rem;
    }
    .sidebar h3 {
      font-family: var(--font-display); color: var(--clr-cyan);
      margin-bottom: 1.2rem; font-size: 1.2rem;
      letter-spacing: -0.01em;
    }
    .filter-group {
      margin-bottom: 1.2rem;
    }
    .filter-group label {
      display: block; font-size: 0.7rem; font-weight: 600;
      color: var(--clr-text-muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 0.3rem;
    }
    .filter-group select {
      width: 100%; padding: 0.55rem 0.8rem;
      background: rgba(2, 82, 82, 0.35); backdrop-filter: blur(8px);
      border: 1.5px solid var(--clr-border-glow);
      border-radius: 30px; color: var(--clr-white);
      font-family: var(--font-body); font-size: 0.85rem;
      transition: border-color var(--transition-fast);
    }
    .filter-group select:focus {
      outline: none; border-color: var(--clr-cyan);
      box-shadow: 0 0 14px rgba(10,181,181,0.2);
    }
    .note-link {
      display: block; padding: 0.65rem 0.9rem;
      color: var(--clr-text-dim); text-decoration: none;
      border-radius: var(--radius-sm); margin-bottom: 0.25rem;
      font-size: 0.9rem; transition: all var(--transition-fast);
      border-left: 3px solid transparent;
    }
    .note-link:hover, .note-link.active {
      background: rgba(201, 168, 76, 0.15); color: var(--clr-magenta);
      border-left-color: var(--clr-magenta);
    }
    .sidebar-divider {
      border-top: 1px solid var(--clr-border-glow);
      margin: 1rem 0;
    }

    /* ── Detail Pane ── */
    .detail-pane {
      background: var(--clr-navy-card); backdrop-filter: blur(12px);
      border: 1px solid var(--clr-border-glow);
      border-radius: var(--radius-lg); padding: 2.2rem;
      box-shadow: var(--shadow-card);
      min-height: 60vh;
    }
    .detail-title {
      font-family: var(--font-display); font-size: 2rem;
      color: var(--clr-cyan); margin-bottom: 1rem;
      line-height: 1.2;
    }
    .detail-meta {
      display: flex; flex-wrap: wrap; gap: 1.2rem;
      font-size: 0.85rem; color: var(--clr-text-muted);
      margin-bottom: 1.8rem; padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--clr-border-glow);
    }
    .detail-meta span { display: flex; align-items: center; gap: 0.35rem; }

    /* ── Note Content Styling ── */
    .note-body {
      color: var(--clr-text-dim); line-height: 1.8;
      font-size: 0.95rem;
    }
    .note-body h2 {
      font-family: var(--font-display); font-size: 1.5rem;
      color: var(--clr-cyan); margin: 1.8rem 0 0.8rem;
      padding-bottom: 0.4rem; border-bottom: 1px solid var(--clr-border-glow);
    }
    .note-body h3 {
      font-family: var(--font-display); font-size: 1.2rem;
      color: var(--clr-magenta); margin: 1.4rem 0 0.6rem;
      font-weight: 600;
    }
    .note-body h4 {
      font-size: 1rem; color: var(--clr-white);
      margin: 1rem 0 0.5rem; font-weight: 600;
    }
    .note-body p { margin-bottom: 1rem; }
    .note-body ul, .note-body ol {
      margin: 0.8rem 0 1.2rem 1.5rem;
      color: var(--clr-text-dim);
    }
    .note-body li { margin-bottom: 0.4rem; }
    .note-body strong { color: var(--clr-white); font-weight: 600; }
    .note-body em { color: var(--clr-magenta); font-style: italic; }
    .note-body blockquote {
      border-left: 4px solid var(--clr-cyan);
      padding: 0.8rem 1.2rem; margin: 1.2rem 0;
      background: rgba(10, 181, 181, 0.05);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--clr-text-dim); font-style: italic;
    }
    .note-body code {
      background: rgba(2, 82, 82, 0.5); padding: 0.15rem 0.4rem;
      border-radius: 4px; font-family: var(--font-mono);
      font-size: 0.85rem; color: var(--clr-cyan);
    }
    .note-body pre {
      background: #011f1f; padding: 1rem; border-radius: var(--radius-md);
      overflow-x: auto; margin: 1rem 0;
      border: 1px solid var(--clr-border-glow);
    }
    .note-body pre code { background: transparent; padding: 0; color: var(--clr-text-dim); }

    /* ── Show More / End Marker ── */
    .note-truncated {
      max-height: 600px; overflow: hidden;
      position: relative;
    }
    .note-truncated::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(transparent, var(--clr-navy-card));
      pointer-events: none;
    }
    .show-more-btn {
      display: block; width: 100%; text-align: center;
      padding: 0.8rem; margin-top: 1rem;
      background: transparent; border: 1.5px solid var(--clr-cyan);
      color: var(--clr-cyan); border-radius: 30px;
      font-weight: 600; font-size: 0.85rem; cursor: pointer;
      transition: all var(--transition-fast);
      font-family: var(--font-body);
    }
    .show-more-btn:hover { background: rgba(10,181,181,0.1); }
    .end-marker {
      text-align: center; margin-top: 2rem; padding-top: 1.5rem;
      border-top: 1px solid var(--clr-border-glow);
      color: var(--clr-text-muted); font-size: 0.8rem;
      font-style: italic;
    }
    .end-marker i { margin: 0 0.4rem; color: var(--clr-magenta); }

    .btn-download {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--gradient-cyan); color: #012c2c;
      padding: 0.7rem 1.6rem; border-radius: 30px;
      text-decoration: none; font-weight: 600; font-size: 0.9rem;
      margin-top: 1.5rem;
      box-shadow: 0 4px 18px rgba(10,181,181,0.3);
      transition: all var(--transition-fast);
    }
    .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(10,181,181,0.45); }

    /* ── Footer ── */
    .footer-fat {
      background: #011f1f; border-top: 2px solid rgba(10,181,181,0.3);
      padding: 3rem 1.5rem 1.5rem; margin-top: auto;
    }
    .footer-grid {
      max-width: var(--max-width); margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
    }
    .footer-col h4 {
      font-family: var(--font-display); color: var(--clr-cyan);
      font-weight: 600; margin-bottom: 1rem; text-transform: uppercase;
      font-size: 0.9rem; letter-spacing: 0.05em;
    }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .footer-col a { color: var(--clr-text-dim); text-decoration: none; font-size: 0.85rem; }
    .footer-col a:hover { color: var(--clr-magenta); }
    .footer-social { display: flex; gap: 1rem; margin-top: 1rem; }
    .footer-social a {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid var(--clr-cyan);
      display: flex; align-items: center; justify-content: center;
      color: var(--clr-cyan); transition: all var(--transition-fast);
    }
    .footer-social a:hover { background: var(--clr-magenta); border-color: var(--clr-magenta); color: #012c2c; }
    .footer-bottom {
      max-width: var(--max-width); margin: 2rem auto 0; padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center; font-size: 0.8rem; color: var(--clr-text-muted);
    }

    .spinner { text-align: center; padding: 3rem; color: var(--clr-cyan); }
    .spinner i { font-size: 2.5rem; animation: spin 1.2s linear infinite; display: block; margin-bottom: 0.8rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .notes-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: none; }
      .detail-pane { padding: 1.5rem; }
      .detail-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="logo-link"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
      <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
    </div>
  </header>

  <main>
    <div class="notes-layout">
      <aside class="sidebar" id="note-list">
        <h3><i class="fa-solid fa-book-open" style="color:var(--clr-magenta);margin-right:0.4rem;"></i> Study Notes</h3>
        <div class="filter-group">
          <label>Level</label>
          <select id="filter-level"><option value="">All Levels</option></select>
        </div>
        <div class="filter-group">
          <label>Category</label>
          <select id="filter-category"><option value="">All Categories</option></select>
        </div>
        <div class="filter-group">
          <label>Tag</label>
          <select id="filter-tag"><option value="">All Tags</option></select>
        </div>
        <button class="home-btn" id="apply-filters" style="width:100%;justify-content:center;margin-top:0.5rem;">
          <i class="fa-solid fa-filter"></i> Apply
        </button>
        <div class="sidebar-divider"></div>
        <div id="note-links-container">
          <div class="spinner"><i class="fa-solid fa-dna"></i><p>Loading notes...</p></div>
        </div>
      </aside>

      <section class="detail-pane" id="detail-pane">
        <p style="color:var(--clr-text-dim);text-align:center;padding:3rem;">
          <i class="fa-solid fa-arrow-left" style="font-size:2rem;display:block;margin-bottom:1rem;opacity:0.5;"></i>
          Select a note from the sidebar to view its content.
        </p>
      </section>
    </div>
  </main>

  <footer class="footer-fat">
    <div class="footer-grid" id="footer-grid">
      <div class="footer-col">
        <a href="index.html" class="logo-link" style="font-size:1.2rem"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
        <p style="color:var(--clr-text-dim);margin-top:0.5rem">Advancing biology and pharmacy education.</p>
        <div class="footer-social" id="footer-social"></div>
      </div>
    </div>
    <div class="footer-bottom"><p>&copy; <span id="current-year"></span> AliverBiopharm</p></div>
  </footer>

  <script>
    const API_BASE = '/api/query';
    async function apiCall(a, p = {}) {
        const r = await fetch(API_BASE, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: a, ...p }) });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || 'Failed');
        return j.data;
    }
    function esc(t) { const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }; return String(t || '').replace(/[&<>"']/g, c => m[c]); }
    function safeUrl(u) { if (!u || typeof u !== 'string') return '#'; const t = u.trim(); return t && !/^(javascript|data|vbscript):/i.test(t) ? t : '#'; }

    function buildFooter(d) {
        if (!d?.columns) return;
        const fg = document.getElementById('footer-grid'), fs = document.getElementById('footer-social'), logo = fg.querySelector('.footer-col');
        fg.innerHTML = logo.outerHTML + d.columns.map(c => `<div class="footer-col"><h4>${esc(c.heading)}</h4><ul>${(c.items||[]).map(i => `<li><a href="${esc(i.href||'#')}">${i.icon?`<i class="${esc(i.icon)}" style="color:var(--clr-magenta);margin-right:0.5rem"></i>`:''}${esc(i.label)}</a></li>`).join('')}</ul></div>`).join('');
        fs.innerHTML = (d.social_links||[]).map(s => `<a href="${esc(s.url)}"><i class="${esc(s.icon)}"></i></a>`).join('');
    }

    let allNotes = [], currentFilters = { level: '', category: '', tag: '' };

    async function loadFilters() {
        try {
            const { levels, categories, tags } = await apiCall('get_filter_options');
            populateSelect('filter-level', levels);
            populateSelect('filter-category', categories);
            populateSelect('filter-tag', tags);
        } catch(e) {}
    }

    function populateSelect(id, options) {
        const sel = document.getElementById(id);
        if (!sel || !options) return;
        sel.innerHTML = '<option value="">All</option>';
        options.forEach(o => { const el = document.createElement('option'); el.value = o; el.textContent = o; sel.appendChild(el); });
    }

    async function loadNotes(filters = {}) {
        document.getElementById('note-links-container').innerHTML = '<div class="spinner"><i class="fa-solid fa-dna"></i><p>Loading...</p></div>';
        try {
            const data = await apiCall('get_resources', { filters: { ...filters, type: 'note' } });
            allNotes = data || [];
            renderNoteList(allNotes);
            const id = new URLSearchParams(location.search).get('id');
            if (id) showNote(id);
        } catch(e) {
            document.getElementById('note-links-container').innerHTML = '<p style="color:var(--clr-magenta);text-align:center;">Failed to load notes.</p>';
        }
    }

    function renderNoteList(notes) {
        const c = document.getElementById('note-links-container');
        if (!notes.length) { c.innerHTML = '<p style="color:var(--clr-text-dim);text-align:center;padding:1rem;">No notes found.</p>'; return }
        c.innerHTML = notes.map(n => `
          <a href="#" class="note-link" data-id="${n.id}">
            <span style="display:block;font-weight:600;">${esc(n.title||'Untitled')}</span>
            <span style="font-size:0.7rem;color:var(--clr-text-muted);">${esc(n.category||'General')} · ${esc(n.level||'')}</span>
          </a>`).join('');
        c.querySelectorAll('.note-link').forEach(l => l.onclick = e => { e.preventDefault(); showNote(l.dataset.id); history.pushState(null,'',`?id=${l.dataset.id}`) });
    }

    function showNote(id) {
        const note = allNotes.find(n => String(n.id) === String(id));
        if (!note) return;
        document.querySelectorAll('.note-link').forEach(l => l.classList.toggle('active', l.dataset.id === String(id)));

        const content = note.content || note.description || '';
        const isLong = content.length > 1500;
        const truncatedContent = isLong ? content.substring(0, 1500) + '...' : content;

        document.getElementById('detail-pane').innerHTML = `
            <h1 class="detail-title">${esc(note.title||'Untitled')}</h1>
            <div class="detail-meta">
                <span><i class="fa-regular fa-user"></i> ${esc(note.author||'Unknown')}</span>
                <span><i class="fa-regular fa-calendar"></i> ${note.created_at?new Date(note.created_at).toLocaleDateString():'N/A'}</span>
                <span><i class="fa-solid fa-layer-group"></i> ${esc(note.level||'General')}</span>
                <span><i class="fa-solid fa-tag"></i> ${esc(note.category||'Uncategorized')}</span>
            </div>
            <div class="note-body ${isLong ? 'note-truncated' : ''}" id="note-content-area">
                ${formatNoteContent(isLong ? truncatedContent : content)}
            </div>
            ${isLong ? `<button class="show-more-btn" id="show-more-btn" onclick="toggleNoteContent(this, '${esc(content.replace(/'/g, "\\'"))}')">Show More <i class="fa-solid fa-chevron-down"></i></button>` : ''}
            <div class="end-marker">
                <i class="fa-solid fa-dna"></i> End of Note <i class="fa-solid fa-dna"></i>
            </div>
            ${note.file_url ? `<a href="${esc(safeUrl(note.file_url))}" class="btn-download" download><i class="fa-solid fa-download"></i> Download PDF</a>` : ''}
        `;
    }

    function formatNoteContent(text) {
        if (!text) return '<p style="color:var(--clr-text-dim);">No content available.</p>';
        let html = esc(text);
        html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        html = html.replace(/`(.+?)`/g, '<code>$1</code>');
        html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        html = html.replace(/<\/ul>\s*<ul>/g, '');
        html = html.replace(/\n/g, '<br>');
        html = html.replace(/<br>\s*<br>/g, '</p><p>');
        html = '<p>' + html + '</p>';
        return html;
    }

    window.toggleNoteContent = function(btn, fullContent) {
        const area = document.getElementById('note-content-area');
        area.classList.remove('note-truncated');
        area.innerHTML = formatNoteContent(fullContent);
        btn.style.display = 'none';
    };

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('current-year').textContent = new Date().getFullYear();
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

        try { const s = await apiCall('get_all_site_sections'); if (s) buildFooter(s.footer); } catch(e) {}
        await loadFilters();
        await loadNotes();

        document.getElementById('apply-filters').onclick = () => {
            currentFilters = {
                level: document.getElementById('filter-level').value,
                category: document.getElementById('filter-category').value,
                tag: document.getElementById('filter-tag').value,
            };
            loadNotes(currentFilters);
        };
    });
  </script>
</body>
</html>

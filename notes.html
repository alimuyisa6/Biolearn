 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLearn – Study Notes</title>
    <meta name="description" content="Read full O‑ and A‑Level biology notes.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --color-primary: #1a365d; --color-primary-light: #2a4a7f; --color-secondary: #3b82f6;
            --color-accent: #60a5fa; --color-gold: #f59e0b; --color-surface: #f0f4f8;
            --color-bg-white: #ffffff; --color-text: #111827; --color-text-muted: #6b7280;
            --color-border: #d1d5db; --radius-md: 0.75rem; --radius-lg: 1.25rem;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow-md: 0 6px 18px rgba(0,0,0,0.06);
            --transition-fast: 180ms ease; --max-width: 1200px; --header-height: 4.5rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--color-surface); color: var(--color-text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .site-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--color-border); height: var(--header-height); display: flex; align-items: center; }
        .header-inner { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 1.8rem; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 700; font-size: 1.3rem; font-family: 'Merriweather', serif; color: var(--color-primary); }
        .logo i { color: var(--color-secondary); }
        .home-btn { background: var(--color-secondary); color: white; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background var(--transition-fast); }
        .home-btn:hover { background: var(--color-primary); }
        .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: var(--color-primary); font-weight: 500; font-size: 0.9rem; transition: color var(--transition-fast); }
        .nav-links a:hover { color: var(--color-secondary); }
        @media (max-width: 768px) { .nav-links { display: none; } }
        .notes-container { max-width: var(--max-width); margin: 2rem auto; padding: 0 1.8rem; display: grid; grid-template-columns: 280px 1fr; gap: 2rem; }
        @media (max-width: 768px) { .notes-container { grid-template-columns: 1fr; } }
        .level-toggle { grid-column: 1/-1; display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; }
        .toggle-btn { padding: 0.65rem 2rem; border-radius: 30px; font-weight: 600; border: 2px solid var(--color-border); background: white; cursor: pointer; transition: all var(--transition-fast); font-family: inherit; }
        .toggle-btn.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
        .sidebar { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); padding: 1.5rem; max-height: calc(100vh - 10rem); overflow-y: auto; }
        .note-list-item { display: block; padding: 0.75rem 1rem; border-radius: var(--radius-md); margin-bottom: 0.4rem; text-decoration: none; color: var(--color-text); transition: background var(--transition-fast); font-size: 0.9rem; }
        .note-list-item:hover, .note-list-item.active { background: var(--color-accent); color: white; }
        .detail-pane { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); padding: 2rem; }
        .detail-title { font-family: 'Merriweather', serif; font-size: 2rem; margin-bottom: 0.5rem; color: var(--color-primary); }
        .detail-meta { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--color-text-muted); }
        .detail-description { margin-bottom: 1.5rem; line-height: 1.7; }
        .btn-download { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--color-primary); color: white; padding: 0.6rem 1.4rem; border-radius: 30px; text-decoration: none; font-weight: 600; transition: background var(--transition-fast); }
        .btn-download:hover { background: var(--color-primary-light); }
        .site-footer { background: #0f172a; color: #cbd5e1; padding: 2rem 1.5rem; margin-top: auto; text-align: center; }
        .site-footer a { color: var(--color-gold); }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <nav class="nav-links">
                <a href="index.html">Home</a><a href="resources.html">All Resources</a><a href="submit.html">Submit</a><a href="guidelines.html">Guidelines</a><a href="about.html">About</a><a href="contact.html">Contact</a>
            </nav>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
        </div>
    </header>
    <main>
        <div class="notes-container">
            <div class="level-toggle"><button class="toggle-btn active" data-level="O-Level">O‑Level</button><button class="toggle-btn" data-level="A-Level">A‑Level</button></div>
            <aside class="sidebar" id="note-list"><p style="color:var(--color-text-muted);">Loading...</p></aside>
            <section class="detail-pane" id="detail-pane"><p style="color:var(--color-text-muted);">Select a note to view details.</p></section>
        </div>
    </main>
    <footer class="site-footer"><p>&copy; <span id="current-year"></span> BioLearn. <a href="index.html">Home</a> | <a href="resources.html">Resources</a> | <a href="contact.html">Contact</a></p></footer>
    <script type="module">
        const API_BASE = '/api';
        let currentLevel = 'O-Level', notes = [], activeNoteId = null;
        // ── Cache ──
        const cache = {};

        function escapeHtml(t) { const m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, c => m[c]); }

        async function loadNotes(level) {
            const cacheKey = `notes_${level}`;
            if (cache[cacheKey]) { notes = cache[cacheKey]; renderNoteList(notes); checkUrlId(); return; }
            try {
                const res = await fetch(`${API_BASE}/data?action=resources&level=${encodeURIComponent(level)}`);
                notes = await res.json();
                cache[cacheKey] = notes;
                renderNoteList(notes);
                checkUrlId();
            } catch (err) { document.getElementById('note-list').innerHTML = '<p style="color:red;">Failed to load notes.</p>'; }
        }

        function renderNoteList(list) {
            const container = document.getElementById('note-list');
            if (!list.length) { container.innerHTML = '<p>No notes found for this level.</p>'; return; }
            container.innerHTML = list.map(n => `<a href="#" class="note-list-item${activeNoteId==n.id?' active':''}" data-id="${n.id}">${escapeHtml(n.title)}</a>`).join('');
            container.querySelectorAll('.note-list-item').forEach(link => {
                link.addEventListener('click', (e) => { e.preventDefault(); activateNoteById(link.dataset.id); history.pushState(null, '', `?id=${link.dataset.id}`); });
            });
        }

        function checkUrlId() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) activateNoteById(id);
        }

        async function activateNoteById(id) {
            if (!id) return;
            activeNoteId = id;
            document.querySelectorAll('.note-list-item').forEach(el => el.classList.toggle('active', el.dataset.id == id));
            if (cache[`note_${id}`]) { renderNoteDetail(cache[`note_${id}`]); return; }
            try {
                const res = await fetch(`${API_BASE}/data?action=note&id=${encodeURIComponent(id)}`);
                if (!res.ok) throw new Error('Note not found');
                const note = await res.json();
                cache[`note_${id}`] = note;
                renderNoteDetail(note);
            } catch (err) { document.getElementById('detail-pane').innerHTML = '<p style="color:red;">Failed to load note.</p>'; }
        }

        function renderNoteDetail(note) {
            document.getElementById('detail-pane').innerHTML = `
                <h1 class="detail-title">${escapeHtml(note.title||'')}</h1>
                <div class="detail-meta"><span><i class="fa-regular fa-user"></i> ${escapeHtml(note.author||'Unknown')}</span><span><i class="fa-regular fa-file"></i> ${escapeHtml(note.file_size||'N/A')}</span><span><i class="fa-solid fa-tag"></i> ${escapeHtml(note.category||'')}</span></div>
                <div class="detail-description">${escapeHtml(note.description||'')}</div>
                <a href="${escapeHtml(note.file_url||'#')}" class="btn-download" download><i class="fa-solid fa-download"></i> Download</a>`;
        }

        document.querySelector('.level-toggle').addEventListener('click', (e) => {
            const btn = e.target.closest('.toggle-btn');
            if (!btn) return;
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLevel = btn.dataset.level;
            loadNotes(currentLevel);
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            loadNotes(currentLevel);
        });
    </script>
</body>
</html>

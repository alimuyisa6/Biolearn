 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLearn – Study Notes</title>
    <meta name="description" content="Read full O‑ and A‑Level biology notes.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --color-primary: #1a365d; --color-primary-light: #2a4a7f; --color-secondary: #3b82f6;
            --color-accent: #60a5fa; --color-gold: #f59e0b; --color-surface: #f0f4f8;
            --color-bg-white: #ffffff; --color-text: #111827; --color-text-muted: #6b7280;
            --color-border: #d1d5db; --radius-sm: 0.5rem; --radius-md: 0.75rem; --radius-lg: 1.25rem;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow-md: 0 6px 18px rgba(0,0,0,0.06);
            --transition-fast: 180ms ease; --max-width: 1200px; --header-height: 4.5rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--color-surface); color: var(--color-text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .site-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--color-border); height: var(--header-height); display: flex; align-items: center; }
        .site-header.scrolled { box-shadow: var(--shadow-md); }
        .header-inner { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 1.8rem; display: flex; align-items: center; justify-content: space-between; gap: 1.2rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 700; font-size: 1.3rem; font-family: 'Merriweather', serif; color: var(--color-primary); }
        .logo i { color: var(--color-secondary); }
        .home-btn { background: var(--color-secondary); color: white; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background var(--transition-fast); }
        .home-btn:hover { background: var(--color-primary); }
        .notes-container { max-width: var(--max-width); margin: 2rem auto; padding: 0 1.8rem; display: grid; grid-template-columns: 280px 1fr; gap: 2rem; }
        @media (max-width: 768px) { .notes-container { grid-template-columns: 1fr; } }
        .level-toggle { grid-column: 1/-1; display: flex; gap: 0.5rem; margin-bottom: 1rem; justify-content: center; }
        .toggle-btn { padding: 0.65rem 2rem; border-radius: 30px; font-weight: 600; border: 2px solid var(--color-border); background: white; cursor: pointer; transition: all var(--transition-fast); }
        .toggle-btn.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
        .sidebar { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); padding: 1.5rem; max-height: calc(100vh - 10rem); overflow-y: auto; }
        .note-list-item { display: block; padding: 0.75rem 1rem; border-radius: var(--radius-md); margin-bottom: 0.4rem; text-decoration: none; color: var(--color-text); transition: background var(--transition-fast); font-size: 0.9rem; }
        .note-list-item:hover, .note-list-item.active { background: var(--color-accent); color: white; }
        .detail-pane { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); padding: 2rem; }
        .detail-title { font-family: 'Merriweather', serif; font-size: 2rem; margin-bottom: 0.5rem; color: var(--color-primary); }
        .detail-meta { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--color-text-muted); }
        .detail-description { margin-bottom: 1.5rem; line-height: 1.7; }
        .btn-download { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--color-primary); color: white; padding: 0.6rem 1.4rem; border-radius: 30px; text-decoration: none; font-weight: 600; transition: background var(--transition-fast); }
        .btn-download:hover { background: var(--color-primary-light); }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--color-text-muted); }
        .spinner-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; }
        .spinner-icon { font-size: 2.5rem; color: var(--color-secondary); animation: spin 1.2s linear infinite; margin-bottom: 0.6rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadePulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .spinner-message { font-size: 0.9rem; color: var(--color-text-muted); animation: fadePulse 2s ease-in-out infinite; }
        .hamburger-action { background: white; border: 2px solid var(--color-border); color: var(--color-primary); font-size: 1.3rem; padding: 0.7rem 1.6rem; border-radius: 30px; display: none; cursor: pointer; }
        .hamburger-action:hover { background: #e5e7eb; }
        @media (max-width: 768px) { .hamburger-action { display: inline-flex; } }
        .site-footer { background: #0f172a; color: #cbd5e1; padding: 2rem 1.5rem; margin-top: auto; text-align: center; }
        .footer-inner { max-width: var(--max-width); margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 2rem; padding: 0 1rem 1rem; text-align: left; }
        .footer-links h4 { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #f0f9ff; margin-bottom: 0.8rem; }
        .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; }
        .footer-links a:hover { color: var(--color-gold-light); }
        .footer-bottom { text-align: center; font-size: 0.78rem; color: #64748b; padding-top: 1rem; }
    </style>
</head>
<body>
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            <button class="hamburger-action" id="hamburger-action" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>
    <main>
        <div class="notes-container">
            <div class="level-toggle"><button class="toggle-btn active" data-level="O-Level">O‑Level</button><button class="toggle-btn" data-level="A-Level">A‑Level</button></div>
            <aside class="sidebar" id="note-list"><p style="color:var(--color-text-muted);text-align:center;padding:2rem;">Loading notes...</p></aside>
            <section class="detail-pane" id="detail-pane"><div class="empty-state"><i class="fa-solid fa-book-open" style="font-size:3rem;color:var(--color-accent);margin-bottom:1rem;"></i><p>Select a note to view details.</p></div></section>
        </div>
    </main>
    <footer class="site-footer" id="site-footer">
        <div style="text-align:center;padding:1rem 0 0.5rem;"><a href="index.html" class="logo" style="color:#f0f9ff;"><i class="fa-solid fa-dna"></i> BioLearn</a><p style="color:#cbd5e1;font-size:0.85rem;">Free biology notes for O‑ and A‑Level learners.</p></div>
        <div class="footer-inner" id="footer-inner"></div>
        <div class="footer-bottom"><p>&copy; <span id="current-year"></span> BioLearn. All rights reserved.</p></div>
    </footer>
    <script>
        var AUTH = { async getValidSession() { if (!supabase) return null; var cached = getCachedSession(); if (cached) { var exp = cached.expires_at || 0; var now = Math.floor(Date.now() / 1000); if (exp > now + 60) return cached; } try { var _a = await supabase.auth.getSession(); var session = _a.data.session; if (session) { setCachedSession(session); return session; } } catch(e) {} return null; }, async logout() { sessionStorage.removeItem('biolearn_session'); if (supabase) await supabase.auth.signOut(); window.location.href = 'index.html'; } };
        var SUPABASE_URL = 'https://bhhndmcqjibodbfmbrpj.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoaG5kbWNxamlib2RiZm1icnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI3MzIsImV4cCI6MjA5MjA1ODczMn0.aXTyrqWOECUHccOLcrwERPWTWu46fsGxYwkt-5xbrl8';
        var supabase = window.supabase && window.supabase.createClient ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
        var API_BASE = '/api'; var currentLevel = 'O-Level'; var notes = []; var activeNoteId = null; var notesCache = {};
        function getCachedSession() { var c = sessionStorage.getItem('biolearn_session'); if (c) { try { var p = JSON.parse(c); if (p.timestamp && Date.now() - p.timestamp < 300000) return p.session; } catch(e) {} } return null; }
        function setCachedSession(s) { if (s) sessionStorage.setItem('biolearn_session', JSON.stringify({session:s, timestamp:Date.now()})); else sessionStorage.removeItem('biolearn_session'); }
        supabase && supabase.auth.onAuthStateChange(function(e) { if (e === 'SIGNED_OUT') { sessionStorage.removeItem('biolearn_session'); } });
        function escapeHtml(t) { var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, function(c){return m[c];}); }

        async function loadFooter() {
            try { var r = await fetch(API_BASE + '/data?action=site-sections'); if (!r.ok) return; var d = await r.json(); var fr = Array.isArray(d) ? d.find(function(rr){return rr.section==='footer';}) : null;
                if (fr&&fr.data&&fr.data.columns) { document.getElementById('footer-inner').innerHTML = fr.data.columns.map(function(col){ var h=escapeHtml(col.heading); var items=(col.items||[]).map(function(item){ var href=item.href?item.href.trim():'#'; var icon=item.icon?'<i class="'+escapeHtml(item.icon)+'"></i> ':''; return '<li><a href="'+escapeHtml(href)+'">'+icon+escapeHtml(item.label)+'</a></li>'; }).join(''); return '<div class="footer-links"><h4>'+h+'</h4><ul>'+items+'</ul></div>'; }).join(''); } }
            catch(err) {}
        }

        async function loadNotes(level) {
            var ck = 'notes_'+level;
            if (notesCache[ck]) { notes = notesCache[ck]; renderNoteList(notes); checkUrlForId(); return; }
            document.getElementById('note-list').innerHTML = '<div class="spinner-wrapper"><i class="fa-solid fa-dna spinner-icon"></i><p class="spinner-message">Loading notes...</p></div>';
            try { var r = await fetch(API_BASE + '/data?action=resources&level=' + encodeURIComponent(level)); if (!r.ok) { document.getElementById('note-list').innerHTML = '<p style="color:var(--color-text-muted);text-align:center;padding:2rem;">Unable to load notes.</p>'; return; }
                notes = await r.json(); if (!Array.isArray(notes)) { document.getElementById('note-list').innerHTML = '<p style="color:var(--color-text-muted);text-align:center;padding:2rem;">No notes found.</p>'; return; }
                notesCache[ck] = notes; renderNoteList(notes); checkUrlForId(); }
            catch(err) { document.getElementById('note-list').innerHTML = '<p style="color:var(--color-text-muted);text-align:center;padding:2rem;">Unable to load notes.</p>'; }
        }

        function checkUrlForId() { var id = new URLSearchParams(window.location.search).get('id'); if (id) activateNoteById(id); }
        function renderNoteList(list) {
            var c = document.getElementById('note-list');
            if (!list.length) { c.innerHTML = '<p style="color:var(--color-text-muted);text-align:center;padding:2rem;">No notes for this level.</p>'; return; }
            c.innerHTML = list.map(function(n){ return '<a href="#" class="note-list-item'+(activeNoteId==n.id?' active':'')+'" data-id="'+n.id+'">'+escapeHtml(n.title)+'</a>'; }).join('');
            c.querySelectorAll('.note-list-item').forEach(function(l){ l.addEventListener('click',function(e){ e.preventDefault(); activateNoteById(this.dataset.id); history.pushState(null,'','?id='+this.dataset.id); }); });
        }

        async function activateNoteById(id) {
            if (!id) return; activeNoteId = id;
            document.querySelectorAll('.note-list-item').forEach(function(el){ el.classList.toggle('active',el.dataset.id==id); });
            if (notesCache['detail_'+id]) { renderNoteDetail(notesCache['detail_'+id]); return; }
            document.getElementById('detail-pane').innerHTML = '<div class="spinner-wrapper"><i class="fa-solid fa-dna spinner-icon"></i><p class="spinner-message">Loading note...</p></div>';
            try { var r = await fetch(API_BASE + '/data?action=note&id=' + encodeURIComponent(id)); if (!r.ok) { document.getElementById('detail-pane').innerHTML = '<div class="empty-state"><p>Note not found.</p></div>'; return; }
                var note = await r.json(); notesCache['detail_'+id] = note; renderNoteDetail(note); }
            catch(err) { document.getElementById('detail-pane').innerHTML = '<div class="empty-state"><p>Unable to load note.</p></div>'; }
        }

        function renderNoteDetail(note) {
            document.getElementById('detail-pane').innerHTML = '<h1 class="detail-title">'+escapeHtml(note.title||'')+'</h1><div class="detail-meta"><span><i class="fa-regular fa-user"></i> '+escapeHtml(note.author||'Unknown')+'</span><span><i class="fa-regular fa-calendar"></i> '+escapeHtml(note.created_at||'')+'</span><span><i class="fa-regular fa-file"></i> '+escapeHtml(note.file_size||'N/A')+'</span><span><i class="fa-solid fa-tag"></i> '+escapeHtml(note.category||'')+'</span></div><div class="detail-description">'+escapeHtml(note.description||'')+'</div><a href="'+escapeHtml(note.file_url||'#')+'" class="btn-download" download><i class="fa-solid fa-download"></i> Download</a>';
        }

        document.getElementById('level-toggle').addEventListener('click',function(e){ var btn = e.target.closest('.toggle-btn'); if (!btn) return; document.querySelectorAll('.toggle-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); currentLevel = btn.dataset.level; loadNotes(currentLevel); });
        function initMobileNav() { var ha=document.getElementById('hamburger-action'); if (!ha) return; var panel=document.getElementById('mobile-nav-panel'); var overlay=document.getElementById('mobile-nav-overlay'); if (!panel||!overlay) return; function open(){ panel.classList.add('active'); overlay.classList.add('active'); ha.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; } function close(){ panel.classList.remove('active'); overlay.classList.remove('active'); ha.setAttribute('aria-expanded','false'); document.body.style.overflow=''; } ha.addEventListener('click',function(){ panel.classList.contains('active')?close():open(); }); overlay.addEventListener('click',close); }
        document.addEventListener('DOMContentLoaded', function(){ document.getElementById('current-year').textContent = new Date().getFullYear(); window.addEventListener('scroll',function(){ document.getElementById('site-header').classList.toggle('scrolled',window.scrollY>10); },{passive:true}); initMobileNav(); loadFooter(); loadNotes(currentLevel); });
    </script>
</body>
</html>

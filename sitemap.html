<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap – BioLearn</title>
    <meta name="description" content="Complete list of all pages on BioLearn. Find biology notes, study tips, and resources.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --color-primary: #1a365d; --color-primary-light: #2a4a7f; --color-secondary: #3b82f6;
            --color-accent: #60a5fa; --color-gold: #f59e0b; --color-gold-light: #fcd34d;
            --color-surface: #f0f4f8; --color-bg-white: #ffffff; --color-text: #111827;
            --color-text-muted: #6b7280; --color-border: #d1d5db; --radius-lg: 1rem;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow-md: 0 6px 18px rgba(0,0,0,0.06);
            --transition-fast: 180ms ease; --max-width: 850px; --header-height: 4.5rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--color-surface); color: var(--color-text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .site-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--color-border); height: var(--header-height); display: flex; align-items: center; }
        .site-header.scrolled { box-shadow: var(--shadow-md); }
        .header-inner { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 700; font-size: 1.3rem; font-family: 'Merriweather', serif; color: var(--color-primary); }
        .logo i { font-size: 1.4rem; color: var(--color-secondary); }
        .home-btn { background: var(--color-secondary); color: white; padding: 0.45rem 1.1rem; border-radius: 30px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background var(--transition-fast); font-size: 0.85rem; }
        .home-btn:hover { background: var(--color-primary); }
        .hamburger-action { background: white; border: 2px solid var(--color-border); color: var(--color-primary); font-size: 1.2rem; padding: 0.6rem 1.2rem; border-radius: 30px; display: none; cursor: pointer; }
        .hamburger-action:hover { background: #e5e7eb; }
        @media (max-width: 768px) { .hamburger-action { display: inline-flex; } }
        .main-content { max-width: var(--max-width); margin: 0 auto; padding: 2rem 1.5rem; width: 100%; flex: 1; }
        .hero-mini { text-align: center; padding: 1.5rem 0 2rem; }
        .hero-mini h1 { font-family: 'Merriweather', serif; font-size: 2.2rem; color: var(--color-primary); margin-bottom: 0.4rem; }
        .hero-mini p { font-size: 0.95rem; color: var(--color-text-muted); }
        .section-group { margin-bottom: 2rem; }
        .section-group h2 { font-family: 'Merriweather', serif; font-size: 1.3rem; color: var(--color-primary); margin-bottom: 0.8rem; padding-left: 0.6rem; border-left: 3px solid var(--color-secondary); }
        .sitemap-links { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
        @media (max-width: 500px) { .sitemap-links { grid-template-columns: 1fr; } }
        .sitemap-links li { }
        .sitemap-links a { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.8rem; text-decoration: none; color: var(--color-text); border-radius: var(--radius-lg); transition: background var(--transition-fast); font-size: 0.9rem; }
        .sitemap-links a:hover { background: var(--color-bg-white); box-shadow: var(--shadow-sm); }
        .sitemap-links a i { width: 1.2rem; text-align: center; color: var(--color-secondary); font-size: 0.85rem; }
        .sitemap-links a span { color: var(--color-text-muted); font-size: 0.78rem; }
        .spinner-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; }
        .spinner-icon { font-size: 2.5rem; color: var(--color-secondary); animation: spin 1.2s linear infinite; margin-bottom: 0.6rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadePulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .spinner-message { font-size: 0.9rem; color: var(--color-text-muted); animation: fadePulse 2s ease-in-out infinite; }
        .mobile-nav-panel { position: fixed; top: 0; right: -280px; width: 260px; max-height: 100vh; overflow-y: auto; background: white; box-shadow: -8px 0 30px rgba(0,0,0,0.12); z-index: 200; padding: 4rem 1.5rem 2rem; display: flex; flex-direction: column; gap: 0.6rem; opacity: 0; transition: right 0.3s ease, opacity 0.3s ease; }
        .mobile-nav-panel.active { right: 0; opacity: 1; }
        .mobile-nav-panel a { display: block; padding: 0.7rem 1rem; text-decoration: none; color: var(--color-text); font-weight: 500; border-radius: 30px; transition: background var(--transition-fast); }
        .mobile-nav-panel a:hover { background: var(--color-surface); }
        .mobile-nav-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .mobile-nav-overlay.active { opacity: 1; pointer-events: auto; }
        .site-footer { background: #0f172a; color: #cbd5e1; padding: 2rem 1.5rem; margin-top: auto; }
        .footer-intro { max-width: var(--max-width); margin: 0 auto 1.5rem; text-align: center; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .footer-intro .logo { color: #f0f9ff; background: none; -webkit-text-fill-color: #f0f9ff; }
        .footer-inner { max-width: var(--max-width); margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 2rem; }
        .footer-links h4 { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #f0f9ff; margin-bottom: 0.8rem; }
        .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; transition: color var(--transition-fast); }
        .footer-links a:hover { color: var(--color-gold-light); }
        .footer-bottom { text-align: center; font-size: 0.78rem; color: #64748b; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.08); max-width: var(--max-width); margin: 1.5rem auto 0; }
    </style>
</head>
<body>
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            <button class="hamburger-action" id="hamburger-action" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <main class="main-content" id="sitemap-content">
        <div class="hero-mini">
            <h1>Sitemap</h1>
            <p>Everything on BioLearn — all pages in one place.</p>
        </div>
        <div id="sitemap-sections"></div>
    </main>

    <div class="mobile-nav-panel" id="mobile-nav-panel">
        <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        <a href="resources.html"><i class="fa-solid fa-book"></i> Resources</a>
        <a href="notes.html"><i class="fa-solid fa-book-open"></i> Notes</a>
        <a href="submit.html"><i class="fa-solid fa-upload"></i> Submit</a>
        <a href="guidelines.html"><i class="fa-solid fa-check-circle"></i> Guidelines</a>
        <a href="blog.html"><i class="fa-solid fa-newspaper"></i> Blog</a>
        <a href="study-tips.html"><i class="fa-solid fa-lightbulb"></i> Tips</a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a>
        <a href="sitemap.html"><i class="fa-solid fa-sitemap"></i> Sitemap</a>
        <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
    </div>
    <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>

    <footer class="site-footer" id="site-footer">
        <div class="footer-intro"><a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a><p style="color:#cbd5e1;font-size:0.9rem;">Free biology notes for O‑ and A‑Level learners.</p></div>
        <div class="footer-inner" id="footer-inner"></div>
        <div class="footer-bottom"><p>&copy; <span id="current-year"></span> BioLearn. All rights reserved.</p></div>
    </footer>

    <script>
        var SUPABASE_URL = 'https://bhhndmcqjibodbfmbrpj.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoaG5kbWNxamlib2RiZm1icnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI3MzIsImV4cCI6MjA5MjA1ODczMn0.aXTyrqWOECUHccOLcrwERPWTWu46fsGxYwkt-5xbrl8';
        var supabase = window.supabase && window.supabase.createClient ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
        var API_BASE = '/api';
        var pageCache = { siteSections: null };

        function getCachedSession() { var c = sessionStorage.getItem('bl_sess'); if (c) { try { var p = JSON.parse(c); if (p.t && Date.now() - p.t < 300000) return p.s; } catch(e) {} } return null; }
        function setCachedSession(s) { if (s) sessionStorage.setItem('bl_sess', JSON.stringify({s:s, t:Date.now()})); else sessionStorage.removeItem('bl_sess'); }
        async function getSession() { var c = getCachedSession(); if (c) return c; if (!supabase) return null; var _a = await supabase.auth.getSession(), s = _a.data.session; setCachedSession(s); return s; }
        supabase && supabase.auth.onAuthStateChange(function(e) { if (e === 'SIGNED_OUT') sessionStorage.removeItem('bl_sess'); });

        function escapeHtml(t) { var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, function(c){return m[c];}); }

        async function loadSiteSections() { if (pageCache.siteSections) return pageCache.siteSections; var r = await fetch(API_BASE + '/data?action=site-sections'); if (!r.ok) throw new Error('HTTP ' + r.status); var d = await r.json(); pageCache.siteSections = d; return d; }

        function loadFooter(data) { var fr = data.find(function(r){return r.section==='footer';}); if (fr&&fr.data&&fr.data.columns) { document.getElementById('footer-inner').innerHTML = fr.data.columns.map(function(col){ var h=escapeHtml(col.heading); var items=(col.items||[]).map(function(item){ var href=item.href?item.href.trim():'#'; var icon=item.icon?'<i class="'+escapeHtml(item.icon)+'"></i> ':''; return '<li><a href="'+escapeHtml(href)+'">'+icon+escapeHtml(item.label)+'</a></li>'; }).join(''); return '<div class="footer-links"><h4>'+h+'</h4><ul>'+items+'</ul></div>'; }).join(''); } }

        function renderSitemap(data) {
            var container = document.getElementById('sitemap-sections');
            var navRow = data.find(function(r){return r.section==='navigation';});
            var links = (navRow && navRow.data && navRow.data.links) ? navRow.data.links : [];

            // Define categories
            var categories = [
                { heading: 'Main', icon: 'fa-home', pages: ['Home'] },
                { heading: 'Study Resources', icon: 'fa-book', pages: ['All Resources', 'Browse Notes'] },
                { heading: 'Contribute', icon: 'fa-upload', pages: ['Submit a Resource', 'Guidelines'] },
                { heading: 'Learn & Explore', icon: 'fa-lightbulb', pages: ['Articles & Blog', 'Study Tips'] },
                { heading: 'Support', icon: 'fa-heart', pages: ['Donate'] },
                { heading: 'About & Legal', icon: 'fa-circle-info', pages: ['About', 'Contact', 'Privacy Policy', 'Terms of Use'] },
                { heading: 'More', icon: 'fa-sitemap', pages: ['Sitemap'] }
            ];

            var html = '';
            categories.forEach(function(cat) {
                html += '<div class="section-group"><h2><i class="fa-solid ' + cat.icon + '" style="font-size:0.9rem;color:var(--color-secondary);margin-right:0.3rem;"></i> ' + cat.heading + '</h2><ul class="sitemap-links">';
                cat.pages.forEach(function(pageName) {
                    var link = links.find(function(l) { return l.label === pageName; });
                    if (link) {
                        html += '<li><a href="' + escapeHtml(link.href) + '"><i class="fa-solid ' + escapeHtml(link.icon || 'fa-circle') + '"></i> ' + escapeHtml(link.label) + '</a></li>';
                    }
                });
                html += '</ul></div>';
            });

            container.innerHTML = html;
        }

        function initMobileNav() { var ha=document.getElementById('hamburger-action'), panel=document.getElementById('mobile-nav-panel'), overlay=document.getElementById('mobile-nav-overlay'); function open(){ panel.classList.add('active'); overlay.classList.add('active'); ha.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; } function close(){ panel.classList.remove('active'); overlay.classList.remove('active'); ha.setAttribute('aria-expanded','false'); document.body.style.overflow=''; } ha.addEventListener('click',function(){ panel.classList.contains('active')?close():open(); }); overlay.addEventListener('click',close); panel.querySelectorAll('a').forEach(function(l){ l.addEventListener('click',close); }); }

        document.addEventListener('DOMContentLoaded', async function(){ document.getElementById('current-year').textContent = new Date().getFullYear(); window.addEventListener('scroll',function(){ document.getElementById('site-header').classList.toggle('scrolled',window.scrollY>10); },{passive:true}); initMobileNav(); try { var data = await loadSiteSections(); loadFooter(data); renderSitemap(data); } catch(err) { document.getElementById('sitemap-sections').innerHTML = '<p style="color:var(--color-text-muted);text-align:center;">Unable to load sitemap.</p>'; } });
    </script>
</body>
</html>

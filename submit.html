<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Resource — AliverBiopharm</title>
    <meta name="description" content="Submit your biology or pharmacy resources to AliverBiopharm.">
    <meta name="theme-color" content="#0b0b1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        :root{--clr-deep-space:#0b0b1a;--clr-cyan:#00d9ff;--clr-magenta:#ff00aa;--clr-navy-card:#1a1a2e;--clr-navy-light:#16213e;--clr-white:#e0f0ff;--clr-text-dim:#9aa9c1;--clr-text-muted:#6b7a94;--clr-border-glow:rgba(0,217,255,0.25);--shadow-card:0 8px 32px rgba(0,0,0,0.3);--transition-fast:180ms ease;--max-width:800px;--font-body:'Inter',sans-serif;--font-display:'Space Grotesk',sans-serif;--radius-sm:0.5rem;--radius-md:0.75rem;--radius-lg:1.25rem;--gradient-cyan:linear-gradient(135deg,#00d9ff,#00b4d8);--gradient-magenta:linear-gradient(135deg,#ff00aa,#d6008e)}
        body.light-mode{--clr-deep-space:#f0f4f8;--clr-cyan:#0077b6;--clr-magenta:#d6008e;--clr-navy-card:#fff;--clr-navy-light:#e8edf2;--clr-white:#0b1a2f;--clr-text-dim:#2c3e50;--clr-text-muted:#4a5568;--clr-border-glow:rgba(0,119,182,0.25);--shadow-card:0 8px 32px rgba(0,0,0,0.08)}
        *{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;font-size:16px}
        body{font-family:var(--font-body);background:var(--clr-deep-space);color:var(--clr-white);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;transition:background 0.3s,color 0.3s}
        .site-header{position:sticky;top:0;z-index:100;background:rgba(11,11,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--clr-border-glow);padding:0.8rem 0}
        body.light-mode .site-header{background:rgba(240,244,248,0.9)}
        .header-container{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem}
        .logo-link{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--clr-cyan);text-decoration:none;display:flex;align-items:center;gap:0.5rem}
        .logo-link i{color:var(--clr-magenta)}
        .nav-actions{display:flex;gap:0.8rem;align-items:center}
        .theme-toggle,.home-btn{background:transparent;border:1px solid var(--clr-cyan);color:var(--clr-cyan);font-size:0.9rem;padding:0.5rem 1rem;border-radius:30px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem}
        .home-btn:hover,.theme-toggle:hover{background:var(--clr-cyan);color:#0b0b1a}
        .section{max-width:var(--max-width);margin:3rem auto;padding:0 1.5rem}
        .section-title{font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--clr-cyan);margin-bottom:0.5rem;text-align:center}
        .section-subtitle{text-align:center;color:var(--clr-text-dim);margin-bottom:2rem}
        .card{background:var(--clr-navy-card);border:1px solid var(--clr-border-glow);border-radius:var(--radius-lg);padding:2rem;box-shadow:var(--shadow-card)}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;margin-bottom:0.3rem;font-weight:600;font-size:0.9rem;color:var(--clr-text-dim)}
        .form-input,.form-textarea,.form-select{width:100%;padding:0.7rem 1rem;background:var(--clr-navy-light);border:1px solid var(--clr-border-glow);border-radius:30px;color:var(--clr-white);font-family:var(--font-body);font-size:0.9rem}
        .form-textarea{border-radius:var(--radius-md);min-height:100px;resize:vertical}
        .form-select{border-radius:30px;appearance:none}
        .form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--clr-cyan)}
        .btn-submit{display:inline-flex;align-items:center;gap:0.5rem;background:var(--gradient-magenta);color:#fff;padding:0.8rem 2rem;border-radius:30px;font-weight:600;border:none;cursor:pointer;width:100%;justify-content:center}
        .btn-submit:disabled{opacity:0.5;cursor:not-allowed}
        .status-msg{margin-top:1rem;text-align:center;font-size:0.9rem}
        .footer-fat{background:#060615;border-top:2px solid var(--clr-cyan);padding:3rem 1.5rem 1.5rem;margin-top:auto}
        .footer-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2rem}
        .footer-col h4{font-family:var(--font-display);color:var(--clr-cyan);font-weight:600;margin-bottom:1rem;text-transform:uppercase;font-size:0.9rem}
        .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:0.5rem}
        .footer-col a{color:var(--clr-text-dim);text-decoration:none;font-size:0.85rem}
        .footer-col a:hover{color:var(--clr-magenta)}
        .footer-social{display:flex;gap:1rem;margin-top:1rem}
        .footer-social a{width:36px;height:36px;border-radius:50%;border:1px solid var(--clr-cyan);display:flex;align-items:center;justify-content:center;color:var(--clr-cyan)}
        .footer-social a:hover{background:var(--clr-magenta);border-color:var(--clr-magenta);color:#fff}
        .footer-bottom{max-width:1100px;margin:2rem auto 0;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.08);text-align:center;font-size:0.8rem;color:var(--clr-text-muted)}
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo-link"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
            <div class="nav-actions">
                <span id="auth-status"></span>
                <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
                <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            </div>
        </div>
    </header>

    <main>
        <section class="section">
            <h1 class="section-title">Submit a Resource</h1>
            <p class="section-subtitle">Share your biology or pharmacy materials with our community.</p>
            <div class="card" id="form-container">
                <p style="text-align:center;color:var(--clr-text-dim)">Please sign in to submit a resource.</p>
            </div>
        </section>
    </main>

    <footer class="footer-fat">
        <div class="footer-grid" id="footer-grid"><div class="footer-col"><a href="index.html" class="logo-link" style="font-size:1.2rem"><i class="fa-solid fa-dna"></i> AliverBiopharm</a><p style="color:var(--clr-text-dim);margin-top:0.5rem">Advancing biology and pharmacy education.</p><div class="footer-social" id="footer-social"></div></div></div>
        <div class="footer-bottom"><p>&copy; <span id="current-year"></span> AliverBiopharm</p></div>
    </footer>

    <script>
        const API_BASE = '/api/query';
        async function apiCall(a, p = {}) {
            const h = { 'Content-Type': 'application/json' };
            const t = localStorage.getItem('sb-token');
            if (t) h['Authorization'] = `Bearer ${t}`;
            const r = await fetch(API_BASE, { method: 'POST', headers: h, body: JSON.stringify({ action: a, ...p }) });
            const j = await r.json();
            if (!r.ok) throw new Error(j.error || 'Failed');
            return j.data;
        }
        function esc(t) { const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }; return String(t || '').replace(/[&<>"']/g, c => m[c]); }
        function buildFooter(d) {
            if (!d?.columns) return;
            const fg = document.getElementById('footer-grid'), fs = document.getElementById('footer-social'), logo = fg.querySelector('.footer-col');
            fg.innerHTML = logo.outerHTML + d.columns.map(c => `<div class="footer-col"><h4>${esc(c.heading)}</h4><ul>${(c.items||[]).map(i => `<li><a href="${esc(i.href||'#')}">${i.icon?`<i class="${esc(i.icon)}" style="color:var(--clr-magenta);margin-right:0.5rem"></i>`:''}${esc(i.label)}</a></li>`).join('')}</ul></div>`).join('');
            fs.innerHTML = (d.social_links||[]).map(s => `<a href="${esc(s.url)}"><i class="${esc(s.icon)}"></i></a>`).join('');
        }
        function updateAuthUI() {
            const el = document.getElementById('auth-status');
            if (!el) return;
            const t = localStorage.getItem('sb-token');
            el.innerHTML = t ? `${esc(localStorage.getItem('sb-email')||'User')} <button onclick="signOut()" class="theme-toggle" style="font-size:0.8rem;padding:0.3rem 0.6rem">Sign Out</button>` : `<button onclick="showAuth()" class="theme-toggle" style="font-size:0.8rem;padding:0.3rem 0.6rem">Sign In</button>`;
        }
        window.signOut = async () => { try { await apiCall('signout') } catch(e){}; localStorage.removeItem('sb-token'); localStorage.removeItem('sb-email'); location.href = 'index.html' };
        window.showAuth = (m = 'signin') => {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8)';
            modal.innerHTML = `<div style="background:var(--clr-navy-card);border:2px solid var(--clr-cyan);border-radius:var(--radius-lg);padding:2rem;max-width:380px;width:90%;position:relative"><button onclick="this.closest('div').parentElement.remove()" style="position:absolute;top:0.5rem;right:0.5rem;background:none;border:none;color:var(--clr-text-dim);cursor:pointer;font-size:1.2rem">✕</button><h3 style="color:var(--clr-cyan);margin-bottom:1rem;text-align:center">${m==='signin'?'Sign In':'Create Account'}</h3><form id="af" style="display:flex;flex-direction:column;gap:1rem"><input type="email" id="ae" placeholder="Email" required style="padding:0.7rem;border:1px solid var(--clr-border-glow);border-radius:0.5rem;background:var(--clr-navy-light);color:var(--clr-white)"><input type="password" id="ap" placeholder="Password" minlength="6" required style="padding:0.7rem;border:1px solid var(--clr-border-glow);border-radius:0.5rem;background:var(--clr-navy-light);color:var(--clr-white)"><button type="submit" style="background:var(--gradient-magenta);color:#fff;border:none;padding:0.7rem;border-radius:2rem;cursor:pointer;font-weight:600">${m==='signin'?'Sign In':'Create Account'}</button></form><p style="text-align:center;margin-top:1rem;color:var(--clr-text-dim);font-size:0.9rem">${m==='signin'?"No account? <a href='#' onclick='event.preventDefault();this.closest(\"div\").parentElement.remove();showAuth(\"signup\")' style='color:var(--clr-magenta)'>Sign up</a>":"Have account? <a href='#' onclick='event.preventDefault();this.closest(\"div\").parentElement.remove();showAuth(\"signin\")' style='color:var(--clr-magenta)'>Sign in</a>"}</p><p id="ae2" style="color:#ff4444;text-align:center;display:none"></p></div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', e => { if (e.target === modal) modal.remove() });
            modal.querySelector('#af').onsubmit = async e => {
                e.preventDefault();
                try {
                    const d = await apiCall(m, { email: modal.querySelector('#ae').value.trim(), password: modal.querySelector('#ap').value });
                    if (d.session) { localStorage.setItem('sb-token', d.session.access_token); localStorage.setItem('sb-email', d.user.email); modal.remove(); updateAuthUI(); checkAuth() }
                    else if (m === 'signup') { modal.querySelector('#ae2').textContent = 'Check your email.'; modal.querySelector('#ae2').style.display = 'block' }
                } catch(err) { modal.querySelector('#ae2').textContent = err.message; modal.querySelector('#ae2').style.display = 'block' }
            };
        };

        function renderForm() {
            document.getElementById('form-container').innerHTML = `
                <form id="submit-form">
                    <div class="form-group"><label>Title *</label><input type="text" id="stitle" class="form-input" required maxlength="200"></div>
                    <div class="form-group"><label>Description *</label><textarea id="sdesc" class="form-textarea" required maxlength="2000"></textarea></div>
                    <div class="form-group"><label>Author</label><input type="text" id="sauthor" class="form-input"></div>
                    <div class="form-group"><label>Level</label><select id="slevel" class="form-select"><option value="">Select</option><option value="O-Level">O-Level</option><option value="A-Level">A-Level</option></select></div>
                    <div class="form-group"><label>Category</label><input type="text" id="scat" class="form-input" placeholder="e.g. Cell Biology"></div>
                    <div class="form-group"><label>Tags</label><input type="text" id="stag" class="form-input" placeholder="e.g. Notes, Past Papers"></div>
                    <div class="form-group"><label>File URL</label><input type="url" id="surl" class="form-input" placeholder="https://..."></div>
                    <div class="form-group"><label>File Size</label><input type="text" id="ssize" class="form-input" placeholder="e.g. 2.4 MB"></div>
                    <button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Submit for Review</button>
                    <p class="status-msg" id="submit-msg"></p>
                </form>`;
            document.getElementById('submit-form').onsubmit = async e => {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                btn.disabled = true;
                const payload = { title: document.getElementById('stitle').value.trim(), description: document.getElementById('sdesc').value.trim(), author: document.getElementById('sauthor').value.trim(), level: document.getElementById('slevel').value, category: document.getElementById('scat').value.trim(), tag: document.getElementById('stag').value.trim(), file_url: document.getElementById('surl').value.trim(), file_size: document.getElementById('ssize').value.trim() };
                if (!payload.title || !payload.description) { document.getElementById('submit-msg').innerHTML = '<span style="color:#ff4444">Title and description required.</span>'; btn.disabled = false; return }
                try {
                    await apiCall('submit_resource', { payload });
                    document.getElementById('submit-msg').innerHTML = '<span style="color:#00ff88">✓ Submitted for review!</span>';
                    e.target.reset();
                } catch(err) { document.getElementById('submit-msg').innerHTML = `<span style="color:#ff4444">${esc(err.message)}</span>` }
                finally { btn.disabled = false }
            };
        }

        async function checkAuth() {
            const token = localStorage.getItem('sb-token');
            if (token) { renderForm(); return }
            document.getElementById('form-container').innerHTML = '<p style="text-align:center;color:var(--clr-text-dim)">Please <a href="#" onclick="showAuth()" style="color:var(--clr-magenta)">sign in</a> to submit a resource.</p>';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            updateAuthUI();
            const tt = document.getElementById('theme-toggle'), icon = tt.querySelector('i');
            if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); icon.classList.replace('fa-moon', 'fa-sun') }
            tt.onclick = () => { document.body.classList.toggle('light-mode'); const l = document.body.classList.contains('light-mode'); icon.classList.replace(l?'fa-moon':'fa-sun', l?'fa-sun':'fa-moon'); localStorage.setItem('theme', l?'light':'dark') };
            try { const s = await apiCall('get_all_site_sections'); if (s) buildFooter(s.footer) } catch(e) {}
            checkAuth();
        });
    </script>
</body>
</html>

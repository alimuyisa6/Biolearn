<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLearn – Submit a Resource</title>
    <meta name="description" content="Contribute biology notes, past papers, and study materials.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Supabase client (for auth) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --color-primary: #1a365d;
            --color-primary-light: #2a4a7f;
            --color-secondary: #3b82f6;
            --color-accent: #60a5fa;
            --color-gold: #f59e0b;
            --color-gold-light: #fcd34d;
            --color-surface: #f0f4f8;
            --color-bg-white: #ffffff;
            --color-text: #111827;
            --color-text-muted: #6b7280;
            --color-border: #d1d5db;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1.25rem;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 6px 18px rgba(0,0,0,0.06);
            --shadow-lg: 0 14px 32px rgba(0,0,0,0.08);
            --transition-fast: 180ms ease;
            --max-width: 1200px;
            --header-height: 4.5rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--color-surface);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .site-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--color-border);
            height: var(--header-height); display: flex; align-items: center;
            transition: box-shadow var(--transition-fast);
        }
        .site-header.scrolled { box-shadow: var(--shadow-md); }
        .header-inner {
            width: 100%; max-width: var(--max-width); margin: 0 auto;
            padding: 0 1.8rem; display: flex; align-items: center;
            justify-content: space-between; gap: 1.2rem;
        }
        .logo {
            display: flex; align-items: center; gap: 0.5rem;
            text-decoration: none; font-weight: 700; font-size: 1.3rem;
            font-family: 'Merriweather', serif;
            color: var(--color-primary);
        }
        .logo i { font-size: 1.4rem; color: var(--color-secondary); }
        .home-btn {
            background: var(--color-secondary); color: white;
            padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;
            transition: background var(--transition-fast);
        }
        .home-btn:hover { background: var(--color-primary); }
        .home-btn i { font-size: 0.9rem; }
        .hamburger-action {
            background: white; border: 2px solid var(--color-border);
            color: var(--color-primary); font-size: 1.3rem; padding: 0.7rem 1.6rem;
            border-radius: 30px; display: none; cursor: pointer;
        }
        .hamburger-action:hover { background: #e5e7eb; }
        @media (max-width: 768px) { .hamburger-action { display: inline-flex; } }

        .main-content {
            max-width: 700px; margin: 2rem auto; padding: 0 1.8rem; width: 100%;
        }
        .form-card {
            background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
            padding: 2rem; border: 1px solid var(--color-border);
        }
        .form-card h2 {
            font-family: 'Merriweather', serif; margin-bottom: 1.5rem;
            color: var(--color-primary); font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--color-border);
            border-radius: var(--radius-md); font-family: inherit; font-size: 0.95rem;
            transition: border-color var(--transition-fast);
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--color-secondary); outline: none;
        }
        .btn-submit {
            background: linear-gradient(135deg, #1a365d, #3b82f6);
            color: white; border: none; padding: 0.75rem 2rem;
            border-radius: 30px; font-weight: 600; font-size: 1rem; cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.5rem;
            transition: background var(--transition-fast);
        }
        .btn-submit:hover { background: linear-gradient(135deg, #2a4a7f, #60a5fa); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .message-status { margin-top: 1rem; font-size: 0.9rem; }
        .signin-prompt {
            text-align: center; padding: 3rem 1rem; font-size: 1.1rem; color: var(--color-text-muted);
        }
        .signin-prompt a { color: var(--color-secondary); font-weight: 600; }

        /* Mobile nav */
        .mobile-nav-panel {
            position: fixed; top: 0; right: -320px; width: 280px;
            height: auto; max-height: 100vh; overflow-y: auto;
            background: white; box-shadow: -8px 0 30px rgba(0,0,0,0.12);
            z-index: 200; padding: 5rem 1.8rem 2rem;
            display: flex; flex-direction: column; gap: 0.8rem;
            opacity: 0; transition: right 0.35s ease, opacity 0.35s ease;
        }
        .mobile-nav-panel.active { right: 0; opacity: 1; }
        .mobile-nav-panel a {
            display: block; padding: 0.8rem 1rem; text-decoration: none;
            color: var(--color-text); font-weight: 500; border-radius: 30px;
            transition: background var(--transition-fast);
        }
        .mobile-nav-panel a:hover { background: var(--color-surface); }
        .mobile-nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.35);
            z-index: 150; opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .mobile-nav-overlay.active { opacity: 1; pointer-events: auto; }

        /* Footer same as index */
        .site-footer {
            background: #0f172a; color: #cbd5e1; padding: 3rem 1.5rem 2rem; margin-top: auto;
        }
        .footer-intro {
            max-width: var(--max-width); margin: 0 auto 2rem;
            text-align: center; padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .footer-intro .logo { color: #f0f9ff; }
        .footer-inner {
            max-width: var(--max-width); margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2.5rem;
        }
        .footer-links h4 {
            font-weight: 700; font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 0.06em; color: #f0f9ff; margin-bottom: 1rem;
        }
        .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: color var(--transition-fast); }
        .footer-links a:hover { color: var(--color-gold-light); }
        .footer-bottom {
            max-width: var(--max-width); margin: 2.5rem auto 0; padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.08); text-align: center;
            font-size: 0.82rem; color: #64748b;
        }
    </style>
</head>
<body>
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="BioLearn Home">
                <i class="fa-solid fa-dna"></i> BioLearn
            </a>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            <button class="hamburger-action" id="hamburger-action" aria-label="Open menu" aria-expanded="false">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div id="auth-state">
            <!-- Dynamically filled: sign‑in prompt or the form -->
        </div>
    </main>

    <div class="mobile-nav-panel" id="mobile-nav-panel">
        <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        <a href="notes.html"><i class="fa-solid fa-book"></i> Browse Notes</a>
    </div>
    <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>

    <footer class="site-footer" id="site-footer">
        <div class="footer-intro">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <p>Free biology notes for O‑ and A‑Level learners.</p>
        </div>
        <div class="footer-inner" id="footer-inner"></div>
        <div class="footer-bottom">
            <p>&copy; <span id="current-year"></span> BioLearn. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        // Supabase client (for AUTH ONLY)
        const SUPABASE_URL = 'https://bhhndmcqjibodbfmbrpj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoaG5kbWNxamlib2RiZm1icnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI3MzIsImV4cCI6MjA5MjA1ODczMn0.aXTyrqWOECUHccOLcrwERPWTWu46fsGxYwkt-5xbrl8';
        const supabase = window.supabase?.createClient?.(SUPABASE_URL, SUPABASE_ANON_KEY) ?? null;
        if (!supabase) {
            console.error('Supabase client not loaded.');
        }

        const API_BASE = '/api';
        let categories = [];

        // Escape HTML
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // Fetch footer
        async function loadFooter() {
            try {
                const res = await fetch(`${API_BASE}/site-sections`);
                const data = await res.json();
                const footerData = data.find(row => row.section === 'footer');
                if (footerData?.data?.columns) {
                    renderFooter(footerData.data.columns);
                }
            } catch (err) { console.warn('Footer load failed', err); }
        }

        function renderFooter(columns) {
            const footerInner = document.getElementById('footer-inner');
            if (!footerInner) return;
            footerInner.innerHTML = columns.map(col => {
                const heading = escapeHtml(col.heading);
                const items = (col.items || []).map(item => {
                    let href = item.href ? item.href.trim() : '#';
                    let iconHtml = item.icon ? `<i class="${escapeHtml(item.icon)}"></i> ` : '';
                    return `<li><a href="${escapeHtml(href)}">${iconHtml}${escapeHtml(item.label)}</a></li>`;
                }).join('');
                return `<div class="footer-links"><h4>${heading}</h4><ul>${items}</ul></div>`;
            }).join('');
        }

        // Fetch filter options (for category dropdown)
        async function loadFilterOptions() {
            try {
                const res = await fetch(`${API_BASE}/filter-options`);
                const data = await res.json();
                categories = data.categories || [];
            } catch (err) { console.warn('Could not load categories'); }
        }

        // Check auth and show form or prompt
        async function checkAuthAndRender() {
            const container = document.getElementById('auth-state');
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                container.innerHTML = `
                    <div class="signin-prompt">
                        <p>Please <a href="index.html#account-section">sign in</a> to submit a resource.</p>
                    </div>`;
                return;
            }
            renderForm();
        }

        function renderForm() {
            const container = document.getElementById('auth-state');
            const catOptions = categories.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join('');

            container.innerHTML = `
                <div class="form-card">
                    <h2>Submit a Resource</h2>
                    <form id="submit-form">
                        <div class="form-group">
                            <label for="title">Title *</label>
                            <input type="text" id="title" required maxlength="200">
                        </div>
                        <div class="form-group">
                            <label for="description">Description *</label>
                            <textarea id="description" rows="5" required maxlength="2000"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="author">Author</label>
                            <input type="text" id="author" maxlength="100">
                        </div>
                        <div class="form-group">
                            <label for="level">Level</label>
                            <select id="level">
                                <option value="">Select level</option>
                                <option value="O-Level">O‑Level</option>
                                <option value="A-Level">A‑Level</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category">
                                <option value="">Select category</option>
                                ${catOptions}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="tag">Tags (optional)</label>
                            <input type="text" id="tag" placeholder="e.g., Notes, Past Papers">
                        </div>
                        <div class="form-group">
                            <label for="file_url">File URL (optional)</label>
                            <input type="url" id="file_url" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label for="file_size">File size (optional)</label>
                            <input type="text" id="file_size" placeholder="e.g., 2.4 MB">
                        </div>
                        <button type="submit" class="btn-submit" id="submit-btn">
                            <i class="fa-solid fa-paper-plane"></i> Submit for Review
                        </button>
                        <div class="message-status" id="message-status"></div>
                    </form>
                </div>
            `;

            document.getElementById('submit-form').addEventListener('submit', handleSubmit);
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const statusEl = document.getElementById('message-status');
            btn.disabled = true;
            statusEl.innerText = '';

            const session = (await supabase.auth.getSession()).data.session;
            if (!session) {
                statusEl.innerText = 'You must be signed in.';
                btn.disabled = false;
                return;
            }

            const payload = {
                title: document.getElementById('title').value.trim(),
                description: document.getElementById('description').value.trim(),
                author: document.getElementById('author').value.trim(),
                level: document.getElementById('level').value,
                category: document.getElementById('category').value,
                tag: document.getElementById('tag').value.trim(),
                file_url: document.getElementById('file_url').value.trim(),
                file_size: document.getElementById('file_size').value.trim()
            };

            // Quick client-side validation
            if (!payload.title || !payload.description) {
                statusEl.innerText = 'Title and description are required.';
                btn.disabled = false;
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/submit-resource`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${session.access_token}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Submission failed');
                statusEl.innerHTML = '<span style="color:green;">✅ Resource submitted for review. Thank you!</span>';
                document.getElementById('submit-form').reset();
            } catch (err) {
                statusEl.innerHTML = `<span style="color:red;">❌ ${escapeHtml(err.message)}</span>`;
            } finally {
                btn.disabled = false;
            }
        }

        // Mobile nav
        function initMobileNav() {
            const hamburger = document.getElementById('hamburger-action');
            const panel = document.getElementById('mobile-nav-panel');
            const overlay = document.getElementById('mobile-nav-overlay');
            function openNav() { panel.classList.add('active'); overlay.classList.add('active'); hamburger.setAttribute('aria-expanded','true'); document.body.style.overflow = 'hidden'; }
            function closeNav() { panel.classList.remove('active'); overlay.classList.remove('active'); hamburger.setAttribute('aria-expanded','false'); document.body.style.overflow = ''; }
            hamburger.addEventListener('click', () => panel.classList.contains('active') ? closeNav() : openNav());
            overlay.addEventListener('click', closeNav);
            panel.querySelectorAll('a').forEach(link => link.addEventListener('click', closeNav));
        }

        function initHeaderScroll() {
            const header = document.getElementById('site-header');
            window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 10), { passive: true });
        }

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            initHeaderScroll();
            initMobileNav();
            loadFooter();
            await loadFilterOptions();
            supabase.auth.onAuthStateChange(() => checkAuthAndRender());
            checkAuthAndRender(); // initial call
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Study Tips — AliverBiopharm</title>
  <meta name="description" content="Biology study tips, exam strategies, and revision techniques to help you excel." />
  <meta name="theme-color" content="#012c2c" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: http: 'unsafe-inline' 'unsafe-eval'; script-src 'self' https: http: 'unsafe-inline' 'unsafe-eval'; style-src 'self' https: http: 'unsafe-inline'; img-src 'self' https: http: data:; font-src 'self' https: http: data:; connect-src 'self' https: http:;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            teal: {
              950: '#012c2c', 900: '#013d3d', 800: '#025252', 700: '#037070',
              600: '#069090', 500: '#0ab5b5', 400: '#2ecece', 300: '#6ee7e7',
              200: '#a8f3f3', 100: '#d4fafa',
            },
            gold: { 500: '#c9a84c', 400: '#e2c06a', 300: '#f0d896' },
            cream: '#f9f5ee',
          },
          animation: {
            'spin-slow': 'spin 20s linear infinite',
            'fade-up': 'fadeUp 0.7s ease forwards',
          },
          keyframes: {
            fadeUp: { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        },
      },
    }
  </script>
  <style>
    /* ── Global Variables & Base ── */
    :root {
      --clr-deep-space: #012c2c; --clr-cyan: #0ab5b5; --clr-magenta: #c9a84c;
      --clr-navy-card: rgba(2, 82, 82, 0.45); --clr-navy-light: rgba(2, 82, 82, 0.25);
      --clr-white: #f9f5ee; --clr-text-dim: rgba(249, 245, 238, 0.7);
      --clr-text-muted: rgba(249, 245, 238, 0.45);
      --clr-border-glow: rgba(10, 181, 181, 0.25);
      --shadow-card: 0 15px 40px rgba(0, 0, 0, 0.4);
      --transition-fast: 180ms ease; --transition-smooth: 350ms cubic-bezier(0.4,0,0.2,1);
      --max-width: 1100px;
      --font-body: 'DM Sans', sans-serif;
      --font-display: 'Playfair Display', serif;
      --radius-sm: 0.5rem; --radius-md: 0.85rem; --radius-lg: 1.4rem;
      --gradient-cyan: linear-gradient(135deg, #0ab5b5, #069090);
      --gradient-magenta: linear-gradient(135deg, #c9a84c, #e2c06a);
    }
    body.light-mode {
      --clr-deep-space: #f9f5ee; --clr-cyan: #037070; --clr-magenta: #b08a2c;
      --clr-navy-card: #ffffff; --clr-navy-light: #e2f0f0;
      --clr-white: #012c2c; --clr-text-dim: #2c4a4a;
      --clr-text-muted: #4a6666;
      --clr-border-glow: rgba(3, 112, 112, 0.25);
      --shadow-card: 0 8px 36px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--clr-deep-space);
      color: var(--clr-white);
      line-height: 1.6;
      min-height: 100vh;
      display: flex; flex-direction: column;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(10,181,181,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(201,168,76,0.06) 0%, transparent 60%);
      transition: background 0.35s, color 0.35s;
    }
    body.light-mode { background-image: none; }

    /* ── Header ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(1, 44, 44, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--clr-border-glow);
      padding: 0.8rem 0;
      transition: box-shadow var(--transition-smooth);
    }
    body.light-mode .site-header { background: rgba(249, 245, 238, 0.88); }
    .site-header.scrolled { box-shadow: 0 0 28px rgba(10,181,181,0.25); }
    .header-container {
      max-width: var(--max-width); margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
    }
    .logo-link {
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 700;
      color: var(--clr-cyan); text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem;
      text-shadow: 0 0 18px rgba(10,181,181,0.4);
      letter-spacing: -0.02em;
    }
    .logo-link i { color: var(--clr-magenta); }
    .home-btn {
      background: transparent; border: 1.5px solid var(--clr-cyan);
      color: var(--clr-cyan); font-size: 0.9rem; font-weight: 500;
      padding: 0.5rem 1.2rem; border-radius: 30px;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.4rem;
      transition: all var(--transition-fast);
    }
    .home-btn:hover { background: var(--clr-cyan); color: #012c2c; }

    /* ── Main Content ── */
    .main-content {
      max-width: var(--max-width); margin: 0 auto;
      padding: 0 1.5rem 3rem; width: 100%; flex: 1;
    }

    /* ── Hero Welcome ── */
    .hero-welcome {
      text-align: center; padding: 3.5rem 1.5rem 2.5rem;
      margin: 0 -1.5rem 2.5rem -1.5rem;
      border-bottom: 2px solid var(--clr-cyan);
      background: linear-gradient(180deg, rgba(2,82,82,0.3) 0%, transparent 100%);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }
    .hero-welcome h1 {
      font-family: var(--font-display); font-size: clamp(2.4rem, 7vw, 3.6rem);
      font-weight: 900; color: var(--clr-cyan);
      margin-bottom: 1rem; letter-spacing: -0.02em;
      text-shadow: 0 0 28px rgba(10,181,181,0.3);
    }
    .hero-welcome .welcome-note {
      font-size: 1.15rem; color: var(--clr-text-dim);
      max-width: 700px; margin: 0 auto 1.8rem;
      line-height: 1.7;
    }
    .hero-welcome .purpose-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(10,181,181,0.1); border: 1px solid rgba(10,181,181,0.3);
      color: var(--clr-cyan); padding: 0.5rem 1.4rem;
      border-radius: 30px; font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ── Section Headers ── */
    .section-header {
      margin-bottom: 1.8rem; padding-left: 1.2rem;
      border-left: 5px solid var(--clr-magenta);
    }
    .section-header h2 {
      font-family: var(--font-display); font-size: 2rem;
      color: var(--clr-cyan); font-weight: 700;
      letter-spacing: -0.01em; margin-bottom: 0.2rem;
    }
    .section-header p {
      font-size: 0.9rem; color: var(--clr-text-muted);
    }

    /* ── Tips Grid ── */
    .tips-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.3rem; margin-bottom: 2.8rem;
    }
    @media (max-width: 768px) { .tips-grid { grid-template-columns: 1fr; } }

    .tip-card {
      background: var(--clr-navy-card); backdrop-filter: blur(12px);
      border: 1px solid var(--clr-border-glow);
      border-radius: var(--radius-lg); padding: 1.5rem;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition-smooth), border-color var(--transition-smooth);
      display: flex; gap: 1rem; align-items: flex-start;
    }
    .tip-card:hover { transform: translateY(-4px); border-color: rgba(201,168,76,0.5); }
    .tip-icon {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .tip-icon.teal { background: rgba(10,181,181,0.2); color: var(--clr-cyan); }
    .tip-icon.gold { background: rgba(201,168,76,0.2); color: var(--clr-magenta); }
    .tip-content h4 {
      font-family: var(--font-display); font-size: 1.1rem;
      color: var(--clr-white); margin-bottom: 0.3rem; font-weight: 600;
    }
    .tip-content p {
      font-size: 0.85rem; color: var(--clr-text-dim); line-height: 1.6;
    }

    /* ── Strategy Cards ── */
    .strategy-card {
      background: var(--clr-navy-card); backdrop-filter: blur(12px);
      border: 1px solid var(--clr-border-glow);
      border-radius: var(--radius-lg); padding: 1.8rem;
      box-shadow: var(--shadow-card); margin-bottom: 1.2rem;
      display: flex; gap: 1.5rem; align-items: flex-start;
      transition: transform var(--transition-smooth);
    }
    .strategy-card:hover { transform: translateY(-3px); }
    @media (max-width: 768px) { .strategy-card { flex-direction: column; } }
    .strategy-number {
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--gradient-cyan); color: #012c2c;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.4rem; flex-shrink: 0;
      font-family: var(--font-display);
      box-shadow: 0 0 18px rgba(10,181,181,0.3);
    }
    .strategy-body h4 {
      font-family: var(--font-display); font-size: 1.2rem;
      color: var(--clr-white); margin-bottom: 0.4rem;
    }
    .strategy-body p {
      font-size: 0.9rem; color: var(--clr-text-dim); line-height: 1.7;
    }

    /* ── Checklist ── */
    .checklist-card {
      background: var(--clr-navy-card); backdrop-filter: blur(12px);
      border: 1px solid var(--clr-border-glow);
      border-radius: var(--radius-lg); padding: 1.8rem;
      box-shadow: var(--shadow-card); margin-bottom: 2rem;
    }
    .checklist { list-style: none; padding: 0; }
    .checklist li {
      padding: 0.7rem 0; border-bottom: 1px solid var(--clr-border-glow);
      display: flex; align-items: center; gap: 0.8rem;
      font-size: 0.9rem; color: var(--clr-text-dim);
    }
    .checklist li:last-child { border-bottom: none; }
    .checklist li i { color: var(--clr-cyan); font-size: 1rem; }

    /* ── CTA Banner ── */
    .cta-banner {
      background: var(--gradient-cyan); color: #012c2c;
      border-radius: var(--radius-lg); padding: 2.5rem 2rem;
      text-align: center; margin-top: 2rem;
      box-shadow: 0 0 32px rgba(10,181,181,0.25);
    }
    .cta-banner h3 {
      font-family: var(--font-display); font-size: 1.6rem;
      margin-bottom: 0.5rem; font-weight: 700;
    }
    .cta-banner p { opacity: 0.8; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .btn-cta {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--clr-magenta); color: #012c2c;
      padding: 0.8rem 2rem; border-radius: 30px;
      font-weight: 600; text-decoration: none;
      box-shadow: 0 4px 18px rgba(201,168,76,0.4);
      transition: all var(--transition-fast);
    }
    .btn-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,168,76,0.55); }

    /* ── Footer ── */
    .footer-fat {
      background: #011f1f; border-top: 2px solid rgba(10,181,181,0.3);
      padding: 3rem 1.5rem 1.5rem; margin-top: auto;
    }
    .footer-grid {
      max-width: var(--max-width); margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
    }
    .footer-col h4 {
      font-family: var(--font-display); color: var(--clr-cyan);
      font-weight: 600; margin-bottom: 1rem; text-transform: uppercase;
      font-size: 0.9rem; letter-spacing: 0.05em;
    }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .footer-col a { color: var(--clr-text-dim); text-decoration: none; font-size: 0.85rem; }
    .footer-col a:hover { color: var(--clr-magenta); }
    .footer-social { display: flex; gap: 1rem; margin-top: 1rem; }
    .footer-social a {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid var(--clr-cyan);
      display: flex; align-items: center; justify-content: center;
      color: var(--clr-cyan); transition: all var(--transition-fast);
    }
    .footer-social a:hover { background: var(--clr-magenta); border-color: var(--clr-magenta); color: #012c2c; }
    .footer-bottom {
      max-width: var(--max-width); margin: 2rem auto 0; padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center; font-size: 0.8rem; color: var(--clr-text-muted);
    }

    .spinner-wrapper {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 4rem 1rem;
    }
    .spinner-icon { font-size: 3rem; color: var(--clr-cyan); animation: spin 1.2s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadePulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .spinner-message { font-size: 0.95rem; color: var(--clr-text-muted); animation: fadePulse 2s ease-in-out infinite; }

    @media (max-width: 768px) {
      .hero-welcome { padding: 2.5rem 1rem 2rem; }
      .section-header h2 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <header class="site-header" id="site-header">
    <div class="header-container">
      <a href="index.html" class="logo-link"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
      <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
    </div>
  </header>

  <main class="main-content" id="study-tips-content">
    <div class="spinner-wrapper" id="loading-spinner">
      <i class="fa-solid fa-dna spinner-icon"></i>
      <p class="spinner-message">Loading study tips...</p>
    </div>
  </main>

  <footer class="footer-fat">
    <div class="footer-grid" id="footer-grid">
      <div class="footer-col">
        <a href="index.html" class="logo-link" style="font-size:1.2rem"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
        <p style="color:var(--clr-text-dim);margin-top:0.5rem">Advancing biology and pharmacy education.</p>
        <div class="footer-social" id="footer-social"></div>
      </div>
    </div>
    <div class="footer-bottom"><p>&copy; <span id="current-year"></span> AliverBiopharm</p></div>
  </footer>

  <script>
    var API_BASE = '/api';
    var pageCache = { siteSections: null };

    function escapeHtml(t) {
        var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
        return String(t).replace(/[&<>"']/g, function(c){return m[c];});
    }
    function removeSpinner() {
        var s = document.getElementById('loading-spinner');
        if (s) s.remove();
    }
    async function loadSiteSections() {
        if (pageCache.siteSections) return pageCache.siteSections;
        var r = await fetch(API_BASE + '/data?action=site-sections');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        var d = await r.json();
        pageCache.siteSections = d;
        return d;
    }
    function loadFooter(data) {
        var fr = data.find(function(r){return r.section==='footer';});
        if (fr&&fr.data&&fr.data.columns) {
            var fg = document.getElementById('footer-grid');
            var fs = document.getElementById('footer-social');
            var logo = fg.querySelector('.footer-col');
            var cols = fr.data.columns.map(function(col){
                var h=escapeHtml(col.heading);
                var items=(col.items||[]).map(function(item){
                    var href=item.href?item.href.trim():'#';
                    var icon=item.icon?'<i class="'+escapeHtml(item.icon)+'" style="color:var(--clr-magenta);margin-right:0.5rem;"></i> ':'';
                    return '<li><a href="'+escapeHtml(href)+'">'+icon+escapeHtml(item.label)+'</a></li>';
                }).join('');
                return '<div class="footer-col"><h4>'+h+'</h4><ul>'+items+'</ul></div>';
            }).join('');
            fg.innerHTML = logo.outerHTML + cols;
            if (fr.data.social_links) {
                fs.innerHTML = fr.data.social_links.map(function(s){
                    return '<a href="'+escapeHtml(s.url||'#')+'" aria-label="'+escapeHtml(s.platform||'')+'"><i class="'+escapeHtml(s.icon||'')+'"></i></a>';
                }).join('');
            }
        }
    }

    function renderPage(data) {
        var c = document.getElementById('study-tips-content');
        var tr = data.find(function(r){return r.section==='study_tips';});
        if (!tr||!tr.data) {
            removeSpinner();
            c.innerHTML = `
              <div class="hero-welcome">
                <h1>Study Tips</h1>
                <p class="welcome-note">Tips are being prepared. Check back soon for expert strategies to elevate your learning.</p>
              </div>`;
            return;
        }
        var d = tr.data;
        var html = `
          <div class="hero-welcome">
            <h1>${escapeHtml(d.title||'Master Your Study')}</h1>
            <p class="welcome-note">${escapeHtml(d.welcome_note||'Welcome to the AliverBiopharm Study Tips hub. This page is your personal guide to mastering biology and pharmacy through proven revision techniques, exam strategies, and smart learning habits. Whether you are preparing for O‑Level, A‑Level, or university exams, each tip is designed to help you study more effectively, retain information longer, and walk into the exam hall with confidence. Bookmark this page and return whenever you need a fresh dose of motivation or a new strategy to try.')}</p>
            <span class="purpose-badge"><i class="fa-solid fa-lightbulb"></i> ${escapeHtml(d.purpose_label||'Your Exam Success Toolkit')}</span>
          </div>`;

        if (d.quick_tips&&d.quick_tips.length) {
            html += '<div class="section-header"><h2>' + escapeHtml(d.quick_tips_heading||'Quick Tips') + '</h2><p>' + escapeHtml(d.quick_tips_subtitle||'Small changes that make a big difference.') + '</p></div><div class="tips-grid">';
            d.quick_tips.forEach(function(tip){
                var colorClass = tip.color==='gold'?'gold':'teal';
                html += '<div class="tip-card"><div class="tip-icon '+colorClass+'"><i class="fa-solid '+escapeHtml(tip.icon||'fa-lightbulb')+'"></i></div><div class="tip-content"><h4>'+escapeHtml(tip.title)+'</h4><p>'+escapeHtml(tip.body)+'</p></div></div>';
            });
            html += '</div>';
        }
        if (d.strategies&&d.strategies.length) {
            html += '<div class="section-header"><h2>' + escapeHtml(d.strategies_heading||'Exam Strategies') + '</h2><p>' + escapeHtml(d.strategies_subtitle||'Proven approaches to tackle any paper.') + '</p></div>';
            d.strategies.forEach(function(s,i){
                html += '<div class="strategy-card"><div class="strategy-number">'+(i+1)+'</div><div class="strategy-body"><h4>'+escapeHtml(s.title)+'</h4><p>'+escapeHtml(s.body)+'</p></div></div>';
            });
        }
        if (d.checklist&&d.checklist.length) {
            html += '<div class="section-header"><h2>' + escapeHtml(d.checklist_heading||'Revision Checklist') + '</h2><p>' + escapeHtml(d.checklist_subtitle||'Tick these off as you prepare.') + '</p></div><div class="checklist-card"><ul class="checklist">';
            d.checklist.forEach(function(item){
                html += '<li><i class="fa-solid fa-circle-check"></i> '+escapeHtml(item)+'</li>';
            });
            html += '</ul></div>';
        }
        html += '<div class="cta-banner"><h3>' + escapeHtml(d.cta_heading||'Ready to Practice?') + '</h3><p>' + escapeHtml(d.cta_body||'Apply these tips with our curated learning resources.') + '</p><a href="resources.html" class="btn-cta"><i class="fa-solid fa-book"></i> Browse Resources</a></div>';

        removeSpinner();
        c.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', async function(){
        document.getElementById('current-year').textContent = new Date().getFullYear();
        window.addEventListener('scroll', function(){
            document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 10);
        }, {passive: true});

        try {
            var data = await loadSiteSections();
            loadFooter(data);
            renderPage(data);
        } catch(err) {
            removeSpinner();
            document.getElementById('study-tips-content').innerHTML = `
              <div class="hero-welcome">
                <h1>Study Tips</h1>
                <p class="welcome-note">Unable to load tips at this moment. Please refresh the page or try again later.</p>
              </div>`;
        }
    });
  </script>
</body>
</html>

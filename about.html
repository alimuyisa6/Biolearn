 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About BioLearn – Free Biology Notes</title>
    <meta name="description" content="Learn more about the BioLearn Digital Library and our mission.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        :root {
            --color-primary: #1a365d;
            --color-primary-light: #2a4a7f;
            --color-secondary: #3b82f6;
            --color-accent: #60a5fa;
            --color-gold: #f59e0b;
            --color-gold-light: #fcd34d;
            --color-surface: #f0f4f8;
            --color-bg-white: #ffffff;
            --color-text: #111827;
            --color-text-muted: #6b7280;
            --color-border: #d1d5db;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1.25rem;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 6px 18px rgba(0,0,0,0.06);
            --shadow-lg: 0 14px 32px rgba(0,0,0,0.08);
            --transition-fast: 180ms ease;
            --max-width: 1200px;
            --header-height: 4.5rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--color-surface);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--color-border);
            height: var(--header-height); display: flex; align-items: center;
        }
        .site-header.scrolled { box-shadow: var(--shadow-md); }
        .header-inner {
            width: 100%; max-width: var(--max-width); margin: 0 auto;
            padding: 0 1.8rem; display: flex; align-items: center;
            justify-content: space-between; gap: 1.2rem;
        }
        .logo {
            display: flex; align-items: center; gap: 0.5rem;
            text-decoration: none; font-weight: 700; font-size: 1.3rem;
            font-family: 'Merriweather', serif;
            color: var(--color-primary);
        }
        .logo i { font-size: 1.4rem; color: var(--color-secondary); }
        .home-btn {
            background: var(--color-secondary); color: white;
            padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;
            transition: background var(--transition-fast);
        }
        .home-btn:hover { background: var(--color-primary); }
        .home-btn i { font-size: 0.9rem; }

        .main-content {
            max-width: var(--max-width); margin: 0 auto; padding: 3rem 1.8rem; width: 100%;
        }
        .hero-mini {
            text-align: center; padding: 3rem 0 2rem;
        }
        .hero-mini h1 {
            font-family: 'Merriweather', serif; font-size: 2.8rem; color: var(--color-primary); margin-bottom: 1rem;
        }
        .hero-mini p {
            font-size: 1.2rem; color: var(--color-text-muted); max-width: 600px; margin: 0 auto;
        }

        .grid-2 {
            display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 3rem;
        }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--color-bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border); padding: 2rem;
        }
        .card h3 {
            font-family: 'Merriweather', serif; font-size: 1.5rem; color: var(--color-primary); margin-bottom: 1rem;
        }
        .card p, .card li {
            font-size: 1rem; color: var(--color-text); line-height: 1.7;
        }
        .val-list {
            list-style: none; padding: 0; margin: 1.5rem 0 0;
        }
        .val-list li {
            margin-bottom: 1rem; display: flex; align-items: center; gap: 0.8rem;
        }
        .val-list li i {
            font-size: 1.2rem; color: var(--color-gold); width: 1.5rem; text-align: center;
        }

        .team-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .team-card {
            text-align: center; background: var(--color-bg-white); border-radius: var(--radius-lg);
            padding: 2rem 1rem; box-shadow: var(--shadow-sm); transition: transform var(--transition-fast);
        }
        .team-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .team-card i {
            font-size: 2.5rem; color: var(--color-accent); margin-bottom: 1rem;
        }
        .team-card h4 { font-size: 1.1rem; color: var(--color-primary); margin-bottom: 0.3rem; }
        .team-card p { font-size: 0.9rem; color: var(--color-text-muted); }

        .cta-section {
            text-align: center; background: linear-gradient(135deg, #1a365d, #3b82f6); color: white;
            border-radius: var(--radius-lg); padding: 3rem 2rem; margin-top: 3rem;
        }
        .cta-section h2 {
            font-family: 'Merriweather', serif; font-size: 2rem; margin-bottom: 1rem;
        }
        .btn-outline-white {
            display: inline-flex; align-items: center; gap: 0.5rem;
            border: 2px solid white; color: white; padding: 0.75rem 2rem;
            border-radius: 30px; font-weight: 600; text-decoration: none;
            transition: background var(--transition-fast), color var(--transition-fast);
        }
        .btn-outline-white:hover { background: white; color: var(--color-primary); }

        /* Mobile nav */
        .mobile-nav-panel {
            position: fixed; top: 0; right: -320px; width: 280px;
            height: auto; max-height: 100vh; overflow-y: auto;
            background: white; box-shadow: -8px 0 30px rgba(0,0,0,0.12);
            z-index: 200; padding: 5rem 1.8rem 2rem;
            display: flex; flex-direction: column; gap: 0.8rem;
            opacity: 0; transition: right 0.35s ease, opacity 0.35s ease;
        }
        .mobile-nav-panel.active { right: 0; opacity: 1; }
        .mobile-nav-panel a {
            display: block; padding: 0.8rem 1rem; text-decoration: none;
            color: var(--color-text); font-weight: 500; border-radius: 30px;
            transition: background var(--transition-fast);
        }
        .mobile-nav-panel a:hover { background: var(--color-surface); }
        .mobile-nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.35);
            z-index: 150; opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .mobile-nav-overlay.active { opacity: 1; pointer-events: auto; }
        .hamburger-action {
            background: white; border: 2px solid var(--color-border);
            color: var(--color-primary); font-size: 1.3rem; padding: 0.7rem 1.6rem;
            border-radius: 30px; display: none; cursor: pointer;
        }
        .hamburger-action:hover { background: #e5e7eb; }
        @media (max-width: 768px) { .hamburger-action { display: inline-flex; } }

        /* Footer */
        .site-footer {
            background: #0f172a; color: #cbd5e1; padding: 3rem 1.5rem 2rem; margin-top: auto;
        }
        .footer-intro {
            max-width: var(--max-width); margin: 0 auto 2rem;
            text-align: center; padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .footer-intro .logo { color: #f0f9ff; }
        .footer-inner {
            max-width: var(--max-width); margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2.5rem;
        }
        .footer-links h4 {
            font-weight: 700; font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 0.06em; color: #f0f9ff; margin-bottom: 1rem;
        }
        .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: color var(--transition-fast); }
        .footer-links a:hover { color: var(--color-gold-light); }
        .footer-bottom {
            max-width: var(--max-width); margin: 2.5rem auto 0; padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.08); text-align: center;
            font-size: 0.82rem; color: #64748b;
        }
    </style>
</head>
<body>
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="BioLearn Home">
                <i class="fa-solid fa-dna"></i> BioLearn
            </a>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            <button class="hamburger-action" id="hamburger-action" aria-label="Open menu" aria-expanded="false">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="main-content" id="about-content">
        <p style="text-align:center; padding:3rem;">Loading...</p>
    </main>

    <div class="mobile-nav-panel" id="mobile-nav-panel">
        <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        <a href="notes.html"><i class="fa-solid fa-book"></i> Browse Notes</a>
        <a href="submit.html"><i class="fa-solid fa-upload"></i> Submit a Resource</a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a>
    </div>
    <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>

    <footer class="site-footer" id="site-footer">
        <div class="footer-intro">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <p>Free biology notes for O‑ and A‑Level learners.</p>
        </div>
        <div class="footer-inner" id="footer-inner"></div>
        <div class="footer-bottom">
            <p>&copy; <span id="current-year"></span> BioLearn. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        // ── Import shared auth module ──
        import { supabase, getSession, pageCache } from './auth-check.js';

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        async function loadFooter() {
            try {
                if (pageCache.siteSections) {
                    const footerData = pageCache.siteSections.find(row => row.section === 'footer');
                    if (footerData?.data?.columns) { renderFooter(footerData.data.columns); return; }
                }
                const res = await fetch('/api/data?action=site-sections');
                const data = await res.json();
                pageCache.siteSections = data;
                const footerData = data.find(row => row.section === 'footer');
                if (footerData?.data?.columns) {
                    const footerInner = document.getElementById('footer-inner');
                    footerInner.innerHTML = footerData.data.columns.map(col => {
                        const heading = escapeHtml(col.heading);
                        const items = (col.items || []).map(item => {
                            let href = item.href ? item.href.trim() : '#';
                            let iconHtml = item.icon ? `<i class="${escapeHtml(item.icon)}"></i> ` : '';
                            return `<li><a href="${escapeHtml(href)}">${iconHtml}${escapeHtml(item.label)}</a></li>`;
                        }).join('');
                        return `<div class="footer-links"><h4>${heading}</h4><ul>${items}</ul></div>`;
                    }).join('');
                }
            } catch (err) { console.warn('Footer load failed'); }
        }

        function renderFooter(columns) {
            const footerInner = document.getElementById('footer-inner');
            if (!footerInner) return;
            footerInner.innerHTML = columns.map(col => {
                const heading = escapeHtml(col.heading);
                const items = (col.items || []).map(item => {
                    let href = item.href ? item.href.trim() : '#';
                    let iconHtml = item.icon ? `<i class="${escapeHtml(item.icon)}"></i> ` : '';
                    return `<li><a href="${escapeHtml(href)}">${iconHtml}${escapeHtml(item.label)}</a></li>`;
                }).join('');
                return `<div class="footer-links"><h4>${heading}</h4><ul>${items}</ul></div>`;
            }).join('');
        }

        async function loadAboutContent() {
            const container = document.getElementById('about-content');
            try {
                let data;
                if (pageCache.siteSections) {
                    data = pageCache.siteSections;
                } else {
                    const res = await fetch('/api/data?action=site-sections');
                    data = await res.json();
                    pageCache.siteSections = data;
                }
                const aboutData = data.find(row => row.section === 'about');
                if (!aboutData?.data) throw new Error('About data not found');
                const d = aboutData.data;

                let html = '';
                html += `
                <div class="hero-mini">
                    <h1>${escapeHtml(d.title)}</h1>
                    <p>${escapeHtml(d.subtitle)}</p>
                </div>`;

                html += `<div class="grid-2">`;
                if (d.mission) {
                    html += `
                    <div class="card">
                        <h3>${escapeHtml(d.mission.heading)}</h3>
                        <p>${escapeHtml(d.mission.body)}</p>
                        ${d.mission.extra ? `<p style="margin-top:1rem;">${escapeHtml(d.mission.extra)}</p>` : ''}
                    </div>`;
                }
                if (d.vision) {
                    html += `
                    <div class="card">
                        <h3>${escapeHtml(d.vision.heading)}</h3>
                        <p>${escapeHtml(d.vision.body)}</p>
                        ${d.vision.values ? `
                        <ul class="val-list">
                            ${d.vision.values.map(v => `
                                <li><i class="fa-solid fa-check-circle"></i> ${escapeHtml(v)}</li>
                            `).join('')}
                        </ul>` : ''}
                    </div>`;
                }
                html += `</div>`;

                if (d.story) {
                    html += `
                    <div class="card" style="margin-bottom:2rem;">
                        <h3>${escapeHtml(d.story.heading)}</h3>
                        <p>${escapeHtml(d.story.body)}</p>
                        ${d.story.extra ? `<p style="margin-top:1rem;">${escapeHtml(d.story.extra)}</p>` : ''}
                    </div>`;
                }

                if (d.team) {
                    html += `
                    <div class="card" style="margin-bottom:2rem;">
                        <h3>${escapeHtml(d.team.heading)}</h3>
                        <div class="team-grid">
                            ${(d.team.members || []).map(m => `
                                <div class="team-card">
                                    <i class="${escapeHtml(m.icon)}"></i>
                                    <h4>${escapeHtml(m.name)}</h4>
                                    <p>${escapeHtml(m.role)}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }

                if (d.cta) {
                    html += `
                    <div class="cta-section">
                        <h2>${escapeHtml(d.cta.heading)}</h2>
                        <p style="margin-bottom:1.5rem; font-size:1.1rem;">${escapeHtml(d.cta.body)}</p>
                        <a href="${escapeHtml(d.cta.button_link || '#')}" class="btn-outline-white">
                            <i class="fa-solid fa-upload"></i> ${escapeHtml(d.cta.button_text)}
                        </a>
                    </div>`;
                }

                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<p style="text-align:center; padding:3rem; color:red;">Failed to load about content.</p>';
                console.error(err);
            }
        }

        function initMobileNav() {
            const hamburger = document.getElementById('hamburger-action');
            const panel = document.getElementById('mobile-nav-panel');
            const overlay = document.getElementById('mobile-nav-overlay');
            function openNav() { panel.classList.add('active'); overlay.classList.add('active'); hamburger.setAttribute('aria-expanded','true'); document.body.style.overflow = 'hidden'; }
            function closeNav() { panel.classList.remove('active'); overlay.classList.remove('active'); hamburger.setAttribute('aria-expanded','false'); document.body.style.overflow = ''; }
            hamburger.addEventListener('click', () => panel.classList.contains('active') ? closeNav() : openNav());
            overlay.addEventListener('click', closeNav);
            panel.querySelectorAll('a').forEach(link => link.addEventListener('click', closeNav));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            initMobileNav();
            window.addEventListener('scroll', () => {
                document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 10);
            }, { passive: true });
            loadFooter();
            await loadAboutContent();
        });
    </script>
</body>
</html>

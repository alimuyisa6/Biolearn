 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About BioLearn – Free Biology Notes</title>
    <meta name="description" content="Learn more about the BioLearn Digital Library and our mission.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --color-primary: #1a365d; --color-secondary: #3b82f6; --color-accent: #60a5fa;
            --color-gold: #f59e0b; --color-surface: #f0f4f8; --color-bg-white: #ffffff;
            --color-text: #111827; --color-text-muted: #6b7280; --color-border: #d1d5db;
            --radius-lg: 1.25rem; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --transition-fast: 180ms ease;
            --max-width: 1200px; --header-height: 4.5rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--color-surface); color: var(--color-text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .site-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--color-border); height: var(--header-height); display: flex; align-items: center; }
        .header-inner { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 1.8rem; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 700; font-size: 1.3rem; font-family: 'Merriweather', serif; color: var(--color-primary); }
        .logo i { color: var(--color-secondary); }
        .home-btn { background: var(--color-secondary); color: white; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background var(--transition-fast); }
        .home-btn:hover { background: var(--color-primary); }
        .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: var(--color-primary); font-weight: 500; font-size: 0.9rem; transition: color var(--transition-fast); }
        .nav-links a:hover { color: var(--color-secondary); }
        @media (max-width: 768px) { .nav-links { display: none; } }
        .main-content { max-width: var(--max-width); margin: 0 auto; padding: 2rem 1.8rem; }
        .hero-mini { text-align: center; padding: 2rem 0; }
        .hero-mini h1 { font-family: 'Merriweather', serif; font-size: 2.6rem; color: var(--color-primary); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); padding: 2rem; margin-bottom: 1.5rem; }
        .card h3 { font-family: 'Merriweather', serif; font-size: 1.4rem; color: var(--color-primary); margin-bottom: 1rem; }
        .val-list { list-style: none; padding: 0; margin-top: 1rem; }
        .val-list li { margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .val-list li i { color: var(--color-gold); }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .team-card { text-align: center; background: var(--color-surface); border-radius: var(--radius-lg); padding: 1.5rem; }
        .team-card i { font-size: 2rem; color: var(--color-accent); margin-bottom: 0.5rem; }
        .cta-section { text-align: center; background: linear-gradient(135deg, #1a365d, #3b82f6); color: white; border-radius: var(--radius-lg); padding: 2.5rem 2rem; }
        .btn-outline-white { display: inline-flex; align-items: center; gap: 0.5rem; border: 2px solid white; color: white; padding: 0.75rem 2rem; border-radius: 30px; font-weight: 600; text-decoration: none; margin-top: 1rem; }
        .btn-outline-white:hover { background: white; color: var(--color-primary); }
        .site-footer { background: #0f172a; color: #cbd5e1; padding: 2rem 1.5rem; margin-top: auto; text-align: center; }
        .site-footer a { color: var(--color-gold); }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <nav class="nav-links">
                <a href="index.html">Home</a><a href="resources.html">Resources</a><a href="notes.html">Notes</a><a href="submit.html">Submit</a><a href="guidelines.html">Guidelines</a><a href="contact.html">Contact</a>
            </nav>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
        </div>
    </header>
    <main class="main-content" id="about-content"><p style="text-align:center;padding:3rem;">Loading...</p></main>
    <footer class="site-footer"><p>&copy; <span id="current-year"></span> BioLearn. <a href="index.html">Home</a> | <a href="contact.html">Contact</a></p></footer>
    <script type="module">
        const API_BASE = '/api';
        const cache = {};

        function escapeHtml(t) { const m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, c => m[c]); }

        async function loadAbout() {
            const container = document.getElementById('about-content');
            try {
                let data;
                if (cache.siteSections) { data = cache.siteSections; }
                else { const res = await fetch(`${API_BASE}/data?action=site-sections`); data = await res.json(); cache.siteSections = data; }
                const about = data.find(row => row.section === 'about');
                if (!about?.data) throw new Error('No about data');
                const d = about.data;
                let html = `<div class="hero-mini"><h1>${escapeHtml(d.title||'About BioLearn')}</h1><p>${escapeHtml(d.subtitle||'')}</p></div>`;
                if (d.mission || d.vision) {
                    html += '<div class="grid-2">';
                    if (d.mission) html += `<div class="card"><h3>${escapeHtml(d.mission.heading)}</h3><p>${escapeHtml(d.mission.body)}</p></div>`;
                    if (d.vision) html += `<div class="card"><h3>${escapeHtml(d.vision.heading)}</h3><p>${escapeHtml(d.vision.body)}</p>${d.vision.values ? `<ul class="val-list">${d.vision.values.map(v => `<li><i class="fa-solid fa-check-circle"></i> ${escapeHtml(v)}</li>`).join('')}</ul>` : ''}</div>`;
                    html += '</div>';
                }
                if (d.story) html += `<div class="card"><h3>${escapeHtml(d.story.heading)}</h3><p>${escapeHtml(d.story.body)}</p></div>`;
                if (d.team) html += `<div class="card"><h3>${escapeHtml(d.team.heading)}</h3><div class="team-grid">${(d.team.members||[]).map(m => `<div class="team-card"><i class="${escapeHtml(m.icon||'fa-user')}"></i><h4>${escapeHtml(m.name)}</h4><p>${escapeHtml(m.role)}</p></div>`).join('')}</div></div>`;
                if (d.cta) html += `<div class="cta-section"><h2>${escapeHtml(d.cta.heading)}</h2><p>${escapeHtml(d.cta.body)}</p><a href="${escapeHtml(d.cta.button_link||'#')}" class="btn-outline-white"><i class="fa-solid fa-upload"></i> ${escapeHtml(d.cta.button_text)}</a></div>`;
                container.innerHTML = html;
            } catch (err) { container.innerHTML = '<p style="text-align:center;color:red;">Failed to load about content.</p>'; }
        }

        document.addEventListener('DOMContentLoaded', () => { document.getElementById('current-year').textContent = new Date().getFullYear(); loadAbout(); });
    </script>
</body>
</html>

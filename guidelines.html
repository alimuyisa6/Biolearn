 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Guidelines – BioLearn</title>
    <meta name="description" content="Learn how to submit quality biology resources.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --color-primary: #1a365d; --color-secondary: #3b82f6; --color-accent: #60a5fa;
            --color-gold: #f59e0b; --color-surface: #f0f4f8; --color-bg-white: #ffffff;
            --color-text: #111827; --color-text-muted: #6b7280; --color-border: #d1d5db;
            --color-success: #10b981; --color-danger: #ef4444; --radius-md: 0.75rem;
            --radius-lg: 1.25rem; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --transition-fast: 180ms ease;
            --max-width: 1200px; --header-height: 4.5rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--color-surface); color: var(--color-text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .site-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--color-border); height: var(--header-height); display: flex; align-items: center; }
        .header-inner { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 1.8rem; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 700; font-size: 1.3rem; font-family: 'Merriweather', serif; color: var(--color-primary); }
        .logo i { color: var(--color-secondary); }
        .home-btn { background: var(--color-secondary); color: white; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background var(--transition-fast); }
        .home-btn:hover { background: var(--color-primary); }
        .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: var(--color-primary); font-weight: 500; font-size: 0.9rem; transition: color var(--transition-fast); }
        .nav-links a:hover { color: var(--color-secondary); }
        @media (max-width: 768px) { .nav-links { display: none; } }
        .main-content { max-width: var(--max-width); margin: 0 auto; padding: 2rem 1.8rem; }
        .hero-mini { text-align: center; padding: 2rem 0; }
        .hero-mini h1 { font-family: 'Merriweather', serif; font-size: 2.6rem; color: var(--color-primary); }
        .card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); padding: 2rem; margin-bottom: 1.5rem; }
        .card h3 { font-family: 'Merriweather', serif; font-size: 1.4rem; color: var(--color-primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .card h3 i { color: var(--color-secondary); }
        .checklist-item { display: flex; align-items: flex-start; gap: 0.8rem; margin-bottom: 0.8rem; padding: 0.8rem; background: var(--color-surface); border-radius: var(--radius-md); }
        .checklist-item i.fa-check-circle { color: var(--color-success); }
        .checklist-item i.fa-times-circle { color: var(--color-danger); }
        .step-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .step-card { text-align: center; padding: 1.5rem; background: var(--color-surface); border-radius: var(--radius-md); }
        .step-number { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: var(--color-primary); color: white; font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .step-card h4 { color: var(--color-primary); margin-bottom: 0.3rem; }
        .cta-banner { text-align: center; background: linear-gradient(135deg, #1a365d, #3b82f6); color: white; border-radius: var(--radius-lg); padding: 2.5rem 2rem; }
        .btn-cta { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--color-gold); color: white; padding: 0.85rem 2.2rem; border-radius: 30px; font-weight: 600; text-decoration: none; margin-top: 1rem; }
        .btn-cta:hover { background: #d97706; }
        .site-footer { background: #0f172a; color: #cbd5e1; padding: 2rem 1.5rem; margin-top: auto; text-align: center; }
        .site-footer a { color: var(--color-gold); }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <nav class="nav-links">
                <a href="index.html">Home</a><a href="resources.html">Resources</a><a href="notes.html">Notes</a><a href="submit.html">Submit</a><a href="about.html">About</a><a href="contact.html">Contact</a>
            </nav>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
        </div>
    </header>
    <main class="main-content" id="guidelines-content"><p style="text-align:center;padding:3rem;">Loading...</p></main>
    <footer class="site-footer"><p>&copy; <span id="current-year"></span> BioLearn. <a href="index.html">Home</a> | <a href="submit.html">Submit</a> | <a href="contact.html">Contact</a></p></footer>
    <script type="module">
        const API_BASE = '/api';
        const cache = {};

        function escapeHtml(t) { const m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, c => m[c]); }

        async function loadGuidelines() {
            const container = document.getElementById('guidelines-content');
            try {
                let data;
                if (cache.siteSections) { data = cache.siteSections; }
                else { const res = await fetch(`${API_BASE}/data?action=site-sections`); data = await res.json(); cache.siteSections = data; }
                const gData = data.find(row => row.section === 'guidelines');
                if (!gData?.data?.sections) { renderHardcoded(container); return; }
                const d = gData.data;
                let html = `<div class="hero-mini"><h1>${escapeHtml(d.title||'Submission Guidelines')}</h1><p>${escapeHtml(d.subtitle||'')}</p></div>`;
                d.sections.forEach(s => {
                    if (s.type === 'steps') {
                        html += `<div class="card"><h3><i class="fa-solid ${escapeHtml(s.icon||'fa-list-ol')}"></i> ${escapeHtml(s.heading)}</h3><p>${escapeHtml(s.body||'')}</p><div class="step-grid">${(s.steps||[]).map((st,i) => `<div class="step-card"><div class="step-number">${i+1}</div><h4>${escapeHtml(st.title)}</h4><p>${escapeHtml(st.description)}</p></div>`).join('')}</div></div>`;
                    } else if (s.type === 'checklist') {
                        html += `<div class="card"><h3><i class="fa-solid ${escapeHtml(s.icon||'fa-clipboard-check')}"></i> ${escapeHtml(s.heading)}</h3><p>${escapeHtml(s.body||'')}</p>${(s.items||[]).map(i => `<div class="checklist-item"><i class="fa-solid ${escapeHtml(i.icon||'fa-check-circle')}"></i><span>${escapeHtml(i.text)}</span></div>`).join('')}</div>`;
                    } else if (s.type === 'list') {
                        html += `<div class="card"><h3><i class="fa-solid ${escapeHtml(s.icon||'fa-circle-info')}"></i> ${escapeHtml(s.heading)}</h3><p>${escapeHtml(s.body||'')}</p><ul>${(s.items||[]).map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul></div>`;
                    }
                });
                html += `<div class="cta-banner"><h2>Ready to Contribute?</h2><p>Your knowledge helps thousands of students.</p><a href="submit.html" class="btn-cta"><i class="fa-solid fa-upload"></i> Submit Now</a></div>`;
                container.innerHTML = html;
            } catch (err) { renderHardcoded(container); }
        }

        function renderHardcoded(container) {
            container.innerHTML = `
                <div class="hero-mini"><h1>Submission Guidelines</h1><p>Help us maintain quality resources.</p></div>
                <div class="card"><h3><i class="fa-solid fa-list-ol"></i> How to Submit</h3><div class="step-grid"><div class="step-card"><div class="step-number">1</div><h4>Sign In</h4><p>Create an account or sign in.</p></div><div class="step-card"><div class="step-number">2</div><h4>Prepare Content</h4><p>Ensure notes are accurate and original.</p></div><div class="step-card"><div class="step-number">3</div><h4>Fill Form</h4><p>Provide title, description, and file.</p></div><div class="step-card"><div class="step-number">4</div><h4>Submit</h4><p>Our team reviews within 48 hours.</p></div></div></div>
                <div class="card"><h3><i class="fa-solid fa-check-circle"></i> What We Accept</h3><div class="checklist-item"><i class="fa-solid fa-check-circle"></i><span>Original biology notes</span></div><div class="checklist-item"><i class="fa-solid fa-check-circle"></i><span>Past papers with answers</span></div><div class="checklist-item"><i class="fa-solid fa-check-circle"></i><span>Well-organized PDFs</span></div></div>
                <div class="card"><h3><i class="fa-solid fa-times-circle"></i> What We Do Not Accept</h3><div class="checklist-item"><i class="fa-solid fa-times-circle"></i><span>Copyrighted material</span></div><div class="checklist-item"><i class="fa-solid fa-times-circle"></i><span>Low-quality scans</span></div><div class="checklist-item"><i class="fa-solid fa-times-circle"></i><span>Duplicate submissions</span></div></div>
                <div class="cta-banner"><h2>Ready to Contribute?</h2><a href="submit.html" class="btn-cta"><i class="fa-solid fa-upload"></i> Submit Now</a></div>`;
        }

        document.addEventListener('DOMContentLoaded', () => { document.getElementById('current-year').textContent = new Date().getFullYear(); loadGuidelines(); });
    </script>
</body>
</html>

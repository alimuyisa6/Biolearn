<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Guidelines – BioLearn</title>
    <meta name="description" content="Learn how to submit quality biology resources to BioLearn. Follow our guidelines for content, formatting, and review process.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Supabase client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --color-primary: #1a365d;
            --color-primary-light: #2a4a7f;
            --color-secondary: #3b82f6;
            --color-accent: #60a5fa;
            --color-gold: #f59e0b;
            --color-gold-light: #fcd34d;
            --color-surface: #f0f4f8;
            --color-bg-white: #ffffff;
            --color-text: #111827;
            --color-text-muted: #6b7280;
            --color-border: #d1d5db;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1.25rem;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 6px 18px rgba(0,0,0,0.06);
            --shadow-lg: 0 14px 32px rgba(0,0,0,0.08);
            --transition-fast: 180ms ease;
            --max-width: 1200px;
            --header-height: 4.5rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--color-surface);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--color-border);
            height: var(--header-height); display: flex; align-items: center;
        }
        .site-header.scrolled { box-shadow: var(--shadow-md); }
        .header-inner {
            width: 100%; max-width: var(--max-width); margin: 0 auto;
            padding: 0 1.8rem; display: flex; align-items: center;
            justify-content: space-between; gap: 1.2rem;
        }
        .logo {
            display: flex; align-items: center; gap: 0.5rem;
            text-decoration: none; font-weight: 700; font-size: 1.3rem;
            font-family: 'Merriweather', serif;
            color: var(--color-primary);
        }
        .logo i { font-size: 1.4rem; color: var(--color-secondary); }
        .home-btn {
            background: var(--color-secondary); color: white;
            padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;
            transition: background var(--transition-fast);
        }
        .home-btn:hover { background: var(--color-primary); }
        .home-btn i { font-size: 0.9rem; }
        .hamburger-action {
            background: white; border: 2px solid var(--color-border);
            color: var(--color-primary); font-size: 1.3rem; padding: 0.7rem 1.6rem;
            border-radius: 30px; display: none; cursor: pointer;
        }
        .hamburger-action:hover { background: #e5e7eb; }
        @media (max-width: 768px) { .hamburger-action { display: inline-flex; } }

        .main-content {
            max-width: var(--max-width); margin: 0 auto; padding: 3rem 1.8rem; width: 100%;
        }
        .hero-mini {
            text-align: center; padding: 2rem 0 2rem;
        }
        .hero-mini h1 {
            font-family: 'Merriweather', serif; font-size: 2.8rem; color: var(--color-primary); margin-bottom: 1rem;
        }
        .hero-mini p {
            font-size: 1.2rem; color: var(--color-text-muted); max-width: 650px; margin: 0 auto;
        }

        .card {
            background: var(--color-bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border); padding: 2rem; margin-bottom: 2rem;
        }
        .card h3 {
            font-family: 'Merriweather', serif; font-size: 1.5rem; color: var(--color-primary); margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .card h3 i { color: var(--color-secondary); font-size: 1.3rem; }
        .card p { font-size: 1rem; color: var(--color-text); line-height: 1.8; margin-bottom: 1rem; }
        .card ul, .card ol {
            padding-left: 1.5rem; margin-bottom: 1rem; line-height: 1.8;
        }
        .card li { margin-bottom: 0.5rem; color: var(--color-text); }

        .checklist-item {
            display: flex; align-items: flex-start; gap: 0.8rem; margin-bottom: 1rem;
            padding: 1rem; background: var(--color-surface); border-radius: var(--radius-md);
        }
        .checklist-item i {
            font-size: 1.2rem; margin-top: 0.15rem; flex-shrink: 0;
        }
        .checklist-item i.fa-check-circle { color: var(--color-success); }
        .checklist-item i.fa-times-circle { color: var(--color-danger); }
        .checklist-item i.fa-exclamation-triangle { color: var(--color-warning); }

        .step-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem; margin-top: 1.5rem;
        }
        .step-card {
            text-align: center; padding: 1.5rem; background: var(--color-surface);
            border-radius: var(--radius-md); transition: transform var(--transition-fast);
        }
        .step-card:hover { transform: translateY(-3px); }
        .step-number {
            display: inline-flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--color-primary); color: white;
            font-weight: 700; font-size: 1.2rem; margin-bottom: 0.8rem;
        }
        .step-card h4 { color: var(--color-primary); margin-bottom: 0.5rem; font-size: 1rem; }
        .step-card p { font-size: 0.9rem; color: var(--color-text-muted); line-height: 1.6; }

        .cta-banner {
            text-align: center; background: linear-gradient(135deg, #1a365d, #3b82f6);
            color: white; border-radius: var(--radius-lg); padding: 3rem 2rem;
        }
        .cta-banner h2 {
            font-family: 'Merriweather', serif; font-size: 2rem; margin-bottom: 1rem;
        }
        .cta-banner p { font-size: 1.1rem; margin-bottom: 1.5rem; opacity: 0.9; }
        .btn-cta {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--color-gold); color: white; padding: 0.85rem 2.2rem;
            border-radius: 30px; font-weight: 600; font-size: 1.05rem;
            text-decoration: none; transition: background var(--transition-fast);
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.3);
        }
        .btn-cta:hover { background: #d97706; }

        .loading-state {
            text-align: center; padding: 3rem; color: var(--color-text-muted);
        }
        .loading-state i {
            font-size: 2.5rem; color: var(--color-accent); margin-bottom: 0.8rem;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile nav */
        .mobile-nav-panel {
            position: fixed; top: 0; right: -320px; width: 280px;
            height: auto; max-height: 100vh; overflow-y: auto;
            background: white; box-shadow: -8px 0 30px rgba(0,0,0,0.12);
            z-index: 200; padding: 5rem 1.8rem 2rem;
            display: flex; flex-direction: column; gap: 0.8rem;
            opacity: 0; transition: right 0.35s ease, opacity 0.35s ease;
        }
        .mobile-nav-panel.active { right: 0; opacity: 1; }
        .mobile-nav-panel a {
            display: block; padding: 0.8rem 1rem; text-decoration: none;
            color: var(--color-text); font-weight: 500; border-radius: 30px;
            transition: background var(--transition-fast);
        }
        .mobile-nav-panel a:hover { background: var(--color-surface); }
        .mobile-nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.35);
            z-index: 150; opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .mobile-nav-overlay.active { opacity: 1; pointer-events: auto; }

        /* Footer */
        .site-footer {
            background: #0f172a; color: #cbd5e1; padding: 3rem 1.5rem 2rem; margin-top: auto;
        }
        .footer-intro {
            max-width: var(--max-width); margin: 0 auto 2rem;
            text-align: center; padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .footer-intro .logo { color: #f0f9ff; }
        .footer-inner {
            max-width: var(--max-width); margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2.5rem;
        }
        .footer-links h4 {
            font-weight: 700; font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 0.06em; color: #f0f9ff; margin-bottom: 1rem;
        }
        .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: color var(--transition-fast); }
        .footer-links a:hover { color: var(--color-gold-light); }
        .footer-bottom {
            max-width: var(--max-width); margin: 2.5rem auto 0; padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.08); text-align: center;
            font-size: 0.82rem; color: #64748b;
        }

        @media (max-width: 768px) {
            .hero-mini h1 { font-size: 2rem; }
            .step-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="BioLearn Home">
                <i class="fa-solid fa-dna"></i> BioLearn
            </a>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            <button class="hamburger-action" id="hamburger-action" aria-label="Open menu" aria-expanded="false">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="main-content" id="guidelines-content">
        <div class="loading-state" id="loading-state">
            <i class="fa-solid fa-dna"></i>
            <p>Loading guidelines...</p>
        </div>
    </main>

    <div class="mobile-nav-panel" id="mobile-nav-panel">
        <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        <a href="notes.html"><i class="fa-solid fa-book"></i> Browse Notes</a>
        <a href="submit.html"><i class="fa-solid fa-upload"></i> Submit a Resource</a>
        <a href="guidelines.html"><i class="fa-solid fa-check-circle"></i> Guidelines</a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a>
        <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
    </div>
    <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>

    <footer class="site-footer" id="site-footer">
        <div class="footer-intro">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <p>Free biology notes for O‑ and A‑Level learners.</p>
        </div>
        <div class="footer-inner" id="footer-inner"></div>
        <div class="footer-bottom">
            <p>&copy; <span id="current-year"></span> BioLearn. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        const SUPABASE_URL = 'https://bhhndmcqjibodbfmbrpj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoaG5kbWNxamlib2RiZm1icnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI3MzIsImV4cCI6MjA5MjA1ODczMn0.aXTyrqWOECUHccOLcrwERPWTWu46fsGxYwkt-5xbrl8';
        const supabase = window.supabase?.createClient?.(SUPABASE_URL, SUPABASE_ANON_KEY) ?? null;
        if (!supabase) { console.error('Supabase client not loaded.'); }

        const API_BASE = '/api';

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // ── Footer ──
        async function loadFooter() {
            try {
                const res = await fetch(`${API_BASE}/data?action=site-sections`);
                const data = await res.json();
                const footerData = data.find(row => row.section === 'footer');
                if (footerData?.data?.columns) {
                    renderFooter(footerData.data.columns);
                }
            } catch (err) { console.warn('Footer load failed', err); }
        }

        function renderFooter(columns) {
            const footerInner = document.getElementById('footer-inner');
            if (!footerInner) return;
            footerInner.innerHTML = columns.map(col => {
                const heading = escapeHtml(col.heading);
                const items = (col.items || []).map(item => {
                    let href = item.href ? item.href.trim() : '#';
                    let iconHtml = item.icon ? `<i class="${escapeHtml(item.icon)}"></i> ` : '';
                    return `<li><a href="${escapeHtml(href)}">${iconHtml}${escapeHtml(item.label)}</a></li>`;
                }).join('');
                return `<div class="footer-links"><h4>${heading}</h4><ul>${items}</ul></div>`;
            }).join('');
        }

        // ── Guidelines Content (loaded from site_sections) ──
        async function loadGuidelines() {
            const container = document.getElementById('guidelines-content');
            try {
                const res = await fetch(`${API_BASE}/data?action=site-sections`);
                const data = await res.json();
                const guidelinesData = data.find(row => row.section === 'guidelines');

                if (!guidelinesData?.data) {
                    // Fallback to hardcoded content if no DB entry
                    renderFallbackGuidelines(container);
                    return;
                }

                const d = guidelinesData.data;
                let html = '';

                // Hero
                html += `
                <div class="hero-mini">
                    <h1>${escapeHtml(d.title || 'Submission Guidelines')}</h1>
                    <p>${escapeHtml(d.subtitle || 'Help us maintain quality resources for biology learners. Follow these guidelines when submitting content.')}</p>
                </div>`;

                // Content sections from database
                if (d.sections && Array.isArray(d.sections)) {
                    d.sections.forEach(section => {
                        html += renderSection(section);
                    });
                }

                // CTA
                html += `
                <div class="cta-banner">
                    <h2>Ready to Contribute?</h2>
                    <p>Your knowledge can help thousands of biology students across Uganda and beyond.</p>
                    <a href="submit.html" class="btn-cta">
                        <i class="fa-solid fa-upload"></i> Submit a Resource Now
                    </a>
                </div>`;

                container.innerHTML = html;
            } catch (err) {
                console.error('Failed to load guidelines:', err);
                renderFallbackGuidelines(container);
            }
        }

        function renderSection(section) {
            const type = section.type || 'card';
            let html = '';

            if (type === 'steps') {
                html += `<div class="card">
                    <h3><i class="fa-solid ${escapeHtml(section.icon || 'fa-list-ol')}"></i> ${escapeHtml(section.heading)}</h3>
                    <p>${escapeHtml(section.body || '')}</p>
                    <div class="step-grid">
                        ${(section.steps || []).map((step, i) => `
                            <div class="step-card">
                                <div class="step-number">${i + 1}</div>
                                <h4>${escapeHtml(step.title)}</h4>
                                <p>${escapeHtml(step.description)}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>`;

            } else if (type === 'checklist') {
                html += `<div class="card">
                    <h3><i class="fa-solid ${escapeHtml(section.icon || 'fa-clipboard-check')}"></i> ${escapeHtml(section.heading)}</h3>
                    <p>${escapeHtml(section.body || '')}</p>
                    ${(section.items || []).map(item => `
                        <div class="checklist-item">
                            <i class="fa-solid ${escapeHtml(item.icon || 'fa-check-circle')}"></i>
                            <span>${escapeHtml(item.text)}</span>
                        </div>
                    `).join('')}
                </div>`;

            } else if (type === 'list') {
                html += `<div class="card">
                    <h3><i class="fa-solid ${escapeHtml(section.icon || 'fa-circle-info')}"></i> ${escapeHtml(section.heading)}</h3>
                    <p>${escapeHtml(section.body || '')}</p>
                    <ul>
                        ${(section.items || []).map(item => `<li>${escapeHtml(item)}</li>`).join('')}
                    </ul>
                </div>`;

            } else {
                // Default card
                html += `<div class="card">
                    <h3><i class="fa-solid ${escapeHtml(section.icon || 'fa-circle-info')}"></i> ${escapeHtml(section.heading)}</h3>
                    <p>${escapeHtml(section.body || '')}</p>
                </div>`;
            }

            return html;
        }

        function renderFallbackGuidelines(container) {
            container.innerHTML = `
                <div class="hero-mini">
                    <h1>Submission Guidelines</h1>
                    <p>Help us maintain quality resources for biology learners. Follow these guidelines when submitting content.</p>
                </div>

                <div class="card">
                    <h3><i class="fa-solid fa-list-ol"></i> How to Submit</h3>
                    <p>Follow these simple steps to contribute your biology resources:</p>
                    <div class="step-grid">
                        <div class="step-card">
                            <div class="step-number">1</div>
                            <h4>Sign In</h4>
                            <p>Create an account or sign in to access the submission form.</p>
                        </div>
                        <div class="step-card">
                            <div class="step-number">2</div>
                            <h4>Prepare Your Content</h4>
                            <p>Ensure your notes are accurate, well-formatted, and original.</p>
                        </div>
                        <div class="step-card">
                            <div class="step-number">3</div>
                            <h4>Fill the Form</h4>
                            <p>Provide a clear title, description, author info, and file URL.</p>
                        </div>
                        <div class="step-card">
                            <div class="step-number">4</div>
                            <h4>Submit for Review</h4>
                            <p>Our team reviews all submissions within 48 hours.</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3><i class="fa-solid fa-check-circle"></i> What We Accept</h3>
                    <div class="checklist-item">
                        <i class="fa-solid fa-check-circle"></i>
                        <span>Original biology notes for O‑Level or A‑Level</span>
                    </div>
                    <div class="checklist-item">
                        <i class="fa-solid fa-check-circle"></i>
                        <span>Past papers with answer keys</span>
                    </div>
                    <div class="checklist-item">
                        <i class="fa-solid fa-check-circle"></i>
                        <span>Well-organized PDF documents</span>
                    </div>
                    <div class="checklist-item">
                        <i class="fa-solid fa-check-circle"></i>
                        <span>Diagrams and illustrations</span>
                    </div>
                </div>

                <div class="card">
                    <h3><i class="fa-solid fa-times-circle"></i> What We Don't Accept</h3>
                    <div class="checklist-item">
                        <i class="fa-solid fa-times-circle"></i>
                        <span>Copyrighted material from other websites</span>
                    </div>
                    <div class="checklist-item">
                        <i class="fa-solid fa-times-circle"></i>
                        <span>Incomplete or low-quality scans</span>
                    </div>
                    <div class="checklist-item">
                        <i class="fa-solid fa-times-circle"></i>
                        <span>Content unrelated to biology</span>
                    </div>
                    <div class="checklist-item">
                        <i class="fa-solid fa-times-circle"></i>
                        <span>Duplicate submissions</span>
                    </div>
                </div>

                <div class="card">
                    <h3><i class="fa-solid fa-star"></i> Tips for Quality Submissions</h3>
                    <ul>
                        <li>Use clear, descriptive titles (e.g., "O‑Level Cell Biology Notes" not just "Notes")</li>
                        <li>Include the author's name and institution if applicable</li>
                        <li>Provide accurate file size and format information</li>
                        <li>Add relevant tags to help students find your resource</li>
                        <li>Review your content for accuracy before submitting</li>
                    </ul>
                </div>

                <div class="cta-banner">
                    <h2>Ready to Contribute?</h2>
                    <p>Your knowledge can help thousands of biology students across Uganda and beyond.</p>
                    <a href="submit.html" class="btn-cta">
                        <i class="fa-solid fa-upload"></i> Submit a Resource Now
                    </a>
                </div>`;
        }

        // ── Mobile Nav ──
        function initMobileNav() {
            const hamburger = document.getElementById('hamburger-action');
            const panel = document.getElementById('mobile-nav-panel');
            const overlay = document.getElementById('mobile-nav-overlay');
            function openNav() { panel.classList.add('active'); overlay.classList.add('active'); hamburger.setAttribute('aria-expanded','true'); document.body.style.overflow = 'hidden'; }
            function closeNav() { panel.classList.remove('active'); overlay.classList.remove('active'); hamburger.setAttribute('aria-expanded','false'); document.body.style.overflow = ''; }
            hamburger.addEventListener('click', () => panel.classList.contains('active') ? closeNav() : openNav());
            overlay.addEventListener('click', closeNav);
            panel.querySelectorAll('a').forEach(link => link.addEventListener('click', closeNav));
        }

        // ── Init ──
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            window.addEventListener('scroll', () => {
                document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 10);
            }, { passive: true });
            initMobileNav();
            loadFooter();
            loadGuidelines();
        });
    </script>
</body>
</html>

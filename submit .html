<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLearn – Submit a Resource</title>
    <meta name="description" content="Contribute biology notes, past papers, and study materials.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --color-primary: #1a365d; --color-primary-light: #2a4a7f; --color-secondary: #3b82f6;
            --color-accent: #60a5fa; --color-gold: #f59e0b; --color-surface: #f0f4f8;
            --color-bg-white: #ffffff; --color-text: #111827; --color-text-muted: #6b7280;
            --color-border: #d1d5db; --radius-md: 0.75rem; --radius-lg: 1.25rem;
            --shadow-md: 0 6px 18px rgba(0,0,0,0.06); --transition-fast: 180ms ease;
            --max-width: 1200px; --header-height: 4.5rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--color-surface); color: var(--color-text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .site-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--color-border); height: var(--header-height); display: flex; align-items: center; }
        .header-inner { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 1.8rem; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 700; font-size: 1.3rem; font-family: 'Merriweather', serif; color: var(--color-primary); }
        .logo i { color: var(--color-secondary); }
        .home-btn { background: var(--color-secondary); color: white; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; }
        .home-btn:hover { background: var(--color-primary); }
        .hamburger-action { background: white; border: 2px solid var(--color-border); color: var(--color-primary); font-size: 1.3rem; padding: 0.7rem 1.6rem; border-radius: 30px; display: none; cursor: pointer; }
        .hamburger-action:hover { background: #e5e7eb; }
        @media (max-width: 768px) { .hamburger-action { display: inline-flex; } }
        .main-content { max-width: 700px; margin: 2rem auto; padding: 0 1.8rem; width: 100%; }
        .form-card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: 2rem; border: 1px solid var(--color-border); }
        .form-card h2 { font-family: 'Merriweather', serif; margin-bottom: 1.5rem; color: var(--color-primary); font-size: 1.8rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-family: inherit; font-size: 0.95rem; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--color-secondary); outline: none; }
        .btn-submit { background: linear-gradient(135deg, #1a365d, #3b82f6); color: white; border: none; padding: 0.75rem 2rem; border-radius: 30px; font-weight: 600; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-submit:hover { background: linear-gradient(135deg, #2a4a7f, #60a5fa); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .signin-prompt { text-align: center; padding: 3rem 1rem; color: var(--color-text-muted); }
        .signin-prompt a { color: var(--color-secondary); font-weight: 600; }
        .site-footer { background: #0f172a; color: #cbd5e1; padding: 2rem 1.5rem; margin-top: auto; text-align: center; }
        .site-footer a { color: var(--color-gold); }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            <button class="hamburger-action" id="hamburger-action" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>
    <main class="main-content"><div id="auth-state"><div class="signin-prompt"><p>Please <a href="index.html#account-section">sign in</a> to submit a resource.</p></div></div></main>
    <footer class="site-footer"><p>&copy; <span id="current-year"></span> BioLearn. <a href="index.html">Home</a> | <a href="guidelines.html">Guidelines</a> | <a href="contact.html">Contact</a></p></footer>
    <script>
        var AUTH = {
            async getValidSession() { if (!supabase) return null; var cached = getCachedSession(); if (cached) { var exp = cached.expires_at || 0; var now = Math.floor(Date.now() / 1000); if (exp > now + 60) return cached; } try { var _a = await supabase.auth.getSession(); var session = _a.data.session; if (session) { setCachedSession(session); return session; } } catch(e) {} return null; },
            async requireAuth() { var session = await this.getValidSession(); if (!session) { alert('Please sign in to continue.'); window.location.href = 'index.html#account-section'; throw new Error('AUTH_REQUIRED'); } return session; },
            async logout() { sessionStorage.removeItem('biolearn_session'); if (supabase) await supabase.auth.signOut(); window.location.href = 'index.html'; }
        };
        var SUPABASE_URL = 'https://bhhndmcqjibodbfmbrpj.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoaG5kbWNxamlib2RiZm1icnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI3MzIsImV4cCI6MjA5MjA1ODczMn0.aXTyrqWOECUHccOLcrwERPWTWu46fsGxYwkt-5xbrl8';
        var supabase = window.supabase && window.supabase.createClient ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
        var API_BASE = '/api'; var categories = [];
        function getCachedSession() { var c = sessionStorage.getItem('biolearn_session'); if (c) { try { var p = JSON.parse(c); if (p.timestamp && Date.now() - p.timestamp < 300000) return p.session; } catch(e) {} } return null; }
        function setCachedSession(s) { if (s) sessionStorage.setItem('biolearn_session', JSON.stringify({session:s, timestamp:Date.now()})); else sessionStorage.removeItem('biolearn_session'); }
        supabase && supabase.auth.onAuthStateChange(function(e) { if (e === 'SIGNED_OUT') { sessionStorage.removeItem('biolearn_session'); } });
        function escapeHtml(t) { var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, function(c){return m[c];}); }

        async function loadFilterOptions() { try { var d = await (await fetch(API_BASE + '/data?action=filter-options')).json(); categories = d.categories || []; } catch(err) {} }

        async function checkAuthAndRender() {
            var container = document.getElementById('auth-state');
            var session = await AUTH.getValidSession();
            if (!session) { container.innerHTML = '<div class="signin-prompt"><p>Please <a href="index.html#account-section">sign in</a> to submit a resource.</p></div>'; return; }
            renderForm();
        }

        function renderForm() {
            var container = document.getElementById('auth-state');
            var catOpts = categories.map(function(c){ return '<option value="'+escapeHtml(c)+'">'+escapeHtml(c)+'</option>'; }).join('');
            container.innerHTML = '<div class="form-card"><h2>Submit a Resource</h2><form id="submit-form"><div class="form-group"><label>Title *</label><input type="text" id="title" required maxlength="200"></div><div class="form-group"><label>Description *</label><textarea id="description" rows="5" required maxlength="2000"></textarea></div><div class="form-group"><label>Author</label><input type="text" id="author" maxlength="100"></div><div class="form-group"><label>Level</label><select id="level"><option value="">Select</option><option value="O-Level">O‑Level</option><option value="A-Level">A‑Level</option></select></div><div class="form-group"><label>Category</label><select id="category"><option value="">Select</option>'+catOpts+'</select></div><div class="form-group"><label>Tags</label><input type="text" id="tag" placeholder="e.g. Notes, Past Papers"></div><div class="form-group"><label>File URL</label><input type="url" id="file_url" placeholder="https://..."></div><div class="form-group"><label>File Size</label><input type="text" id="file_size" placeholder="e.g. 2.4 MB"></div><button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Submit for Review</button><div id="message-status" style="margin-top:1rem;"></div></form></div>';
            document.getElementById('submit-form').addEventListener('submit', handleSubmit);
        }

        async function handleSubmit(e) {
            e.preventDefault();
            var btn = document.querySelector('.btn-submit'), statusEl = document.getElementById('message-status');
            btn.disabled = true; statusEl.innerText = '';
            try {
                var session = await AUTH.requireAuth();
                var payload = { title: document.getElementById('title').value.trim(), description: document.getElementById('description').value.trim(), author: document.getElementById('author').value.trim(), level: document.getElementById('level').value, category: document.getElementById('category').value, tag: document.getElementById('tag').value.trim(), file_url: document.getElementById('file_url').value.trim(), file_size: document.getElementById('file_size').value.trim() };
                if (!payload.title || !payload.description) { statusEl.innerText = 'Title and description required.'; btn.disabled = false; return; }
                var res = await fetch(API_BASE + '/actions?action=submit-resource', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token}, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error((await res.json()).error || 'Failed');
                statusEl.innerHTML = '<span style="color:green;">✅ Submitted for review!</span>';
                document.getElementById('submit-form').reset();
            } catch(err) { if (err.message !== 'AUTH_REQUIRED') statusEl.innerHTML = '<span style="color:red;">❌ '+escapeHtml(err.message)+'</span>'; }
            finally { btn.disabled = false; }
        }

        document.addEventListener('DOMContentLoaded', async function(){ document.getElementById('current-year').textContent = new Date().getFullYear(); await loadFilterOptions(); supabase.auth.onAuthStateChange(function(){ checkAuthAndRender(); }); checkAuthAndRender(); });
    </script>
</body>
</html>

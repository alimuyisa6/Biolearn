<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources — AliverBiopharm</title>
    <meta name="description" content="Browse all biology and pharmacy learning resources.">
    <meta name="theme-color" content="#0b0b1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        :root{--clr-deep-space:#0b0b1a;--clr-cyan:#00d9ff;--clr-magenta:#ff00aa;--clr-navy-card:#1a1a2e;--clr-navy-light:#16213e;--clr-white:#e0f0ff;--clr-text-dim:#9aa9c1;--clr-text-muted:#6b7a94;--clr-border-glow:rgba(0,217,255,0.25);--shadow-card:0 8px 32px rgba(0,0,0,0.3);--transition-fast:180ms ease;--max-width:1200px;--font-body:'Inter',sans-serif;--font-display:'Space Grotesk',sans-serif;--radius-sm:0.5rem;--radius-md:0.75rem;--radius-lg:1.25rem;--gradient-cyan:linear-gradient(135deg,#00d9ff,#00b4d8);--gradient-magenta:linear-gradient(135deg,#ff00aa,#d6008e)}
        body.light-mode{--clr-deep-space:#f0f4f8;--clr-cyan:#0077b6;--clr-magenta:#d6008e;--clr-navy-card:#fff;--clr-navy-light:#e8edf2;--clr-white:#0b1a2f;--clr-text-dim:#2c3e50;--clr-text-muted:#4a5568;--clr-border-glow:rgba(0,119,182,0.25);--shadow-card:0 8px 32px rgba(0,0,0,0.08)}
        *{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;font-size:16px}
        body{font-family:var(--font-body);background:var(--clr-deep-space);color:var(--clr-white);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;transition:background 0.3s,color 0.3s}
        .site-header{position:sticky;top:0;z-index:100;background:rgba(11,11,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--clr-border-glow);padding:0.8rem 0}
        body.light-mode .site-header{background:rgba(240,244,248,0.9)}
        .header-container{max-width:var(--max-width);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem}
        .logo-link{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--clr-cyan);text-decoration:none;display:flex;align-items:center;gap:0.5rem}
        .logo-link i{color:var(--clr-magenta)}
        .nav-actions{display:flex;gap:0.8rem;align-items:center}
        .theme-toggle,.home-btn{background:transparent;border:1px solid var(--clr-cyan);color:var(--clr-cyan);font-size:0.9rem;padding:0.5rem 1rem;border-radius:30px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem}
        .home-btn:hover,.theme-toggle:hover{background:var(--clr-cyan);color:#0b0b1a}
        .section{max-width:var(--max-width);margin:3rem auto;padding:0 1.5rem}
        .section-title{font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--clr-cyan);margin-bottom:0.5rem;text-align:center}
        .section-subtitle{text-align:center;color:var(--clr-text-dim);margin-bottom:2rem}
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;margin-bottom:2rem;text-align:center}
        .stat-item{padding:1.5rem;background:var(--clr-navy-card);border:1px solid var(--clr-border-glow);border-radius:var(--radius-lg)}
        .stat-number{font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--clr-cyan)}
        .stat-label{font-size:0.85rem;color:var(--clr-text-muted);margin-top:0.3rem}
        .tab-bar{display:flex;gap:0.5rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
        .tab-btn{padding:0.6rem 1.5rem;border-radius:30px;border:1px solid var(--clr-cyan);background:transparent;color:var(--clr-cyan);cursor:pointer;font-weight:600;transition:all var(--transition-fast)}
        .tab-btn.active{background:var(--clr-cyan);color:#0b0b1a}
        .resources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
        .resource-card{background:var(--clr-navy-card);border:1px solid var(--clr-border-glow);border-radius:var(--radius-lg);padding:1.8rem;box-shadow:var(--shadow-card);transition:all var(--transition-fast);display:flex;flex-direction:column;gap:0.6rem}
        .resource-card:hover{transform:translateY(-4px);border-color:var(--clr-magenta)}
        .resource-level{display:inline-block;font-size:0.7rem;font-weight:700;text-transform:uppercase;padding:0.25rem 0.7rem;border-radius:1rem;background:var(--clr-navy-light);color:var(--clr-cyan)}
        .btn-download{display:inline-flex;align-items:center;gap:0.4rem;background:var(--gradient-cyan);color:#0b0b1a;padding:0.5rem 1.2rem;border-radius:30px;text-decoration:none;font-weight:600;font-size:0.85rem;margin-top:auto}
        .btn-download:hover{background:var(--clr-magenta);color:#fff}
        .category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.8rem;margin-bottom:2rem}
        .category-chip{display:flex;align-items:center;gap:0.5rem;padding:0.7rem 1rem;background:var(--clr-navy-card);border:1px solid var(--clr-border-glow);border-radius:2rem;color:var(--clr-text-dim);text-decoration:none;font-size:0.85rem;transition:all var(--transition-fast)}
        .category-chip:hover{border-color:var(--clr-cyan);color:var(--clr-cyan)}
        .footer-fat{background:#060615;border-top:2px solid var(--clr-cyan);padding:3rem 1.5rem 1.5rem;margin-top:auto}
        .footer-grid{max-width:var(--max-width);margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2rem}
        .footer-col h4{font-family:var(--font-display);color:var(--clr-cyan);font-weight:600;margin-bottom:1rem;text-transform:uppercase;font-size:0.9rem}
        .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:0.5rem}
        .footer-col a{color:var(--clr-text-dim);text-decoration:none;font-size:0.85rem}
        .footer-col a:hover{color:var(--clr-magenta)}
        .footer-social{display:flex;gap:1rem;margin-top:1rem}
        .footer-social a{width:36px;height:36px;border-radius:50%;border:1px solid var(--clr-cyan);display:flex;align-items:center;justify-content:center;color:var(--clr-cyan)}
        .footer-social a:hover{background:var(--clr-magenta);border-color:var(--clr-magenta);color:#fff}
        .footer-bottom{max-width:var(--max-width);margin:2rem auto 0;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.08);text-align:center;font-size:0.8rem;color:var(--clr-text-muted)}
        .spinner{text-align:center;padding:3rem;color:var(--clr-cyan)}
        .spinner i{font-size:2.5rem;animation:spin 1.2s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        @media(max-width:768px){.stats-row{grid-template-columns:repeat(2,1fr)}.resources-grid{grid-template-columns:1fr}}
        @media(max-width:480px){.stats-row{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo-link"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
                <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            </div>
        </div>
    </header>

    <main>
        <section class="section" id="resources-content">
            <div class="spinner"><i class="fa-solid fa-dna"></i><p>Loading resources...</p></div>
        </section>
    </main>

    <footer class="footer-fat">
        <div class="footer-grid" id="footer-grid"><div class="footer-col"><a href="index.html" class="logo-link" style="font-size:1.2rem"><i class="fa-solid fa-dna"></i> AliverBiopharm</a><p style="color:var(--clr-text-dim);margin-top:0.5rem">Advancing biology and pharmacy education.</p><div class="footer-social" id="footer-social"></div></div></div>
        <div class="footer-bottom"><p>&copy; <span id="current-year"></span> AliverBiopharm</p></div>
    </footer>

    <script>
        const API_BASE = '/api/query';
        async function apiCall(a, p = {}) {
            const r = await fetch(API_BASE, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: a, ...p }) });
            const j = await r.json();
            if (!r.ok) throw new Error(j.error || 'Failed');
            return j.data;
        }
        function esc(t) { const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }; return String(t || '').replace(/[&<>"']/g, c => m[c]); }
        function safeUrl(u) { if (!u || typeof u !== 'string') return '#'; const t = u.trim(); return t && !/^(javascript|data|vbscript):/i.test(t) ? t : '#'; }
        function buildFooter(d) {
            if (!d?.columns) return;
            const fg = document.getElementById('footer-grid'), fs = document.getElementById('footer-social'), logo = fg.querySelector('.footer-col');
            fg.innerHTML = logo.outerHTML + d.columns.map(c => `<div class="footer-col"><h4>${esc(c.heading)}</h4><ul>${(c.items||[]).map(i => `<li><a href="${esc(i.href||'#')}">${i.icon?`<i class="${esc(i.icon)}" style="color:var(--clr-magenta);margin-right:0.5rem"></i>`:''}${esc(i.label)}</a></li>`).join('')}</ul></div>`).join('');
            fs.innerHTML = (d.social_links||[]).map(s => `<a href="${esc(s.url)}"><i class="${esc(s.icon)}"></i></a>`).join('');
        }

        let allResources = [], currentTab = 'All';

        async function loadPage() {
            try {
                const sections = await apiCall('get_all_site_sections');
                if (sections) buildFooter(sections.footer);
                const data = await apiCall('get_resources');
                allResources = data || [];
                renderPage(allResources);
            } catch(e) { document.getElementById('resources-content').innerHTML = '<p style="text-align:center;color:var(--clr-magenta)">Failed to load.</p>' }
        }

        function renderPage(resources) {
            const c = document.getElementById('resources-content');
            const oCount = resources.filter(r => r.level === 'O-Level').length;
            const aCount = resources.filter(r => r.level === 'A-Level').length;
            const cats = [...new Set(resources.map(r => r.category).filter(Boolean))];

            let h = `<h1 class="section-title">All Resources</h1><p class="section-subtitle">Browse our complete collection of biology and pharmacy materials.</p>`;
            h += `<div class="stats-row"><div class="stat-item"><div class="stat-number">${resources.length}</div><div class="stat-label">Total</div></div><div class="stat-item"><div class="stat-number">${oCount}</div><div class="stat-label">O-Level</div></div><div class="stat-item"><div class="stat-number">${aCount}</div><div class="stat-label">A-Level</div></div><div class="stat-item"><div class="stat-number">${cats.length}</div><div class="stat-label">Categories</div></div></div>`;
            h += `<div class="tab-bar"><button class="tab-btn active" data-tab="All">All</button><button class="tab-btn" data-tab="O-Level">O-Level</button><button class="tab-btn" data-tab="A-Level">A-Level</button></div>`;
            h += `<div class="resources-grid" id="res-grid"></div>`;
            if (cats.length) {
                h += `<h3 style="font-family:var(--font-display);color:var(--clr-cyan);margin:2rem 0 1rem">Browse by Category</h3><div class="category-grid">${cats.map(cat => `<a href="index.html#courses" class="category-chip"><i class="fa-solid fa-folder"></i> ${esc(cat)}</a>`).join('')}</div>`;
            }
            c.innerHTML = h;
            filterResources('All');
            document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => { document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); filterResources(b.dataset.tab) });
        }

        function filterResources(tab) {
            const filtered = tab === 'All' ? allResources : allResources.filter(r => r.level === tab);
            const g = document.getElementById('res-grid');
            if (!filtered.length) { g.innerHTML = '<p style="text-align:center;color:var(--clr-text-dim);grid-column:1/-1">No resources found.</p>'; return }
            g.innerHTML = filtered.map(r => `<div class="resource-card"><span class="resource-level">${esc(r.level||'N/A')}</span><h3 style="color:var(--clr-white);font-size:1.1rem">${esc(r.title||'Untitled')}</h3><p style="color:var(--clr-text-dim);font-size:0.9rem;flex-grow:1">${esc(r.description||'')}</p><div style="display:flex;gap:1rem;font-size:0.8rem;color:var(--clr-text-muted)"><span><i class="fa-regular fa-user"></i> ${esc(r.author||'Unknown')}</span><span><i class="fa-regular fa-file"></i> ${esc(r.file_size||'N/A')}</span></div><div style="display:flex;justify-content:space-between;align-items:center"><a href="notes.html?id=${esc(String(r.id))}" style="color:var(--clr-cyan);text-decoration:none;font-weight:600">View →</a><a href="${esc(safeUrl(r.file_url))}" class="btn-download" download><i class="fa-solid fa-download"></i> Download</a></div></div>`).join('');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            const tt = document.getElementById('theme-toggle'), icon = tt.querySelector('i');
            if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); icon.classList.replace('fa-moon', 'fa-sun') }
            tt.onclick = () => { document.body.classList.toggle('light-mode'); const l = document.body.classList.contains('light-mode'); icon.classList.replace(l?'fa-moon':'fa-sun', l?'fa-sun':'fa-moon'); localStorage.setItem('theme', l?'light':'dark') };
            loadPage();
        });
    </script>
</body>
</html>

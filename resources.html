 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology Resources – BioLearn Digital Library</title>
    <meta name="description" content="Browse our complete collection of free O-Level and A-Level biology notes, past papers, and study resources.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Supabase client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --color-primary: #1a365d;
            --color-primary-light: #2a4a7f;
            --color-secondary: #3b82f6;
            --color-accent: #60a5fa;
            --color-gold: #f59e0b;
            --color-gold-light: #fcd34d;
            --color-surface: #f0f4f8;
            --color-bg-white: #ffffff;
            --color-text: #111827;
            --color-text-muted: #6b7280;
            --color-border: #d1d5db;
            --color-success: #10b981;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1.25rem;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 6px 18px rgba(0,0,0,0.06);
            --shadow-lg: 0 14px 32px rgba(0,0,0,0.08);
            --transition-fast: 180ms ease;
            --transition-smooth: 320ms cubic-bezier(0.4, 0, 0.2, 1);
            --max-width: 1200px;
            --header-height: 4.5rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--color-surface);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--color-border);
            height: var(--header-height); display: flex; align-items: center;
        }
        .site-header.scrolled { box-shadow: var(--shadow-md); }
        .header-inner {
            width: 100%; max-width: var(--max-width); margin: 0 auto;
            padding: 0 1.8rem; display: flex; align-items: center;
            justify-content: space-between; gap: 1.2rem;
        }
        .logo {
            display: flex; align-items: center; gap: 0.5rem;
            text-decoration: none; font-weight: 700; font-size: 1.3rem;
            font-family: 'Merriweather', serif;
            color: var(--color-primary);
        }
        .logo i { font-size: 1.4rem; color: var(--color-secondary); }
        .home-btn {
            background: var(--color-secondary); color: white;
            padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;
            transition: background var(--transition-fast);
        }
        .home-btn:hover { background: var(--color-primary); }
        .home-btn i { font-size: 0.9rem; }
        .hamburger-action {
            background: white; border: 2px solid var(--color-border);
            color: var(--color-primary); font-size: 1.3rem; padding: 0.7rem 1.6rem;
            border-radius: 30px; display: none; cursor: pointer;
        }
        .hamburger-action:hover { background: #e5e7eb; }
        @media (max-width: 768px) { .hamburger-action { display: inline-flex; } }

        .main-content {
            max-width: var(--max-width); margin: 0 auto; padding: 2.5rem 1.8rem; width: 100%;
        }

        /* Hero */
        .hero-mini {
            text-align: center; padding: 2rem 0 2.5rem;
        }
        .hero-mini h1 {
            font-family: 'Merriweather', serif; font-size: 2.6rem; color: var(--color-primary); margin-bottom: 0.8rem;
        }
        .hero-mini p {
            font-size: 1.15rem; color: var(--color-text-muted); max-width: 600px; margin: 0 auto;
        }

        /* Stats Row */
        .stats-row {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem;
            margin-bottom: 2.5rem; text-align: center;
        }
        @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
        .stat-item { padding: 1.5rem 1rem; }
        .stat-number {
            font-size: 2.4rem; font-weight: 700; color: var(--color-primary);
            font-family: 'Merriweather', serif;
        }
        .stat-label {
            font-size: 0.85rem; color: var(--color-text-muted); margin-top: 0.3rem;
            text-transform: uppercase; letter-spacing: 0.04em;
        }

        /* Section Header */
        .section-header {
            margin-bottom: 1.5rem; padding-left: 0.75rem;
            border-left: 4px solid var(--color-secondary);
        }
        .section-header h2 {
            font-family: 'Merriweather', serif; font-size: 1.6rem; color: var(--color-primary);
        }
        .section-header p {
            font-size: 0.95rem; color: var(--color-text-muted); margin-top: 0.3rem;
        }

        /* Tab Bar */
        .tab-bar {
            display: flex; gap: 0.5rem; margin-bottom: 2rem;
            border-bottom: 2px solid var(--color-border); padding-bottom: 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 0.7rem 1.6rem; border: none; background: transparent;
            font-weight: 600; font-size: 0.9rem; color: var(--color-text-muted);
            cursor: pointer; border-bottom: 3px solid transparent;
            margin-bottom: -2px; transition: all var(--transition-fast);
            font-family: inherit;
        }
        .tab-btn:hover { color: var(--color-primary); }
        .tab-btn.active {
            color: var(--color-primary); border-bottom-color: var(--color-secondary);
        }

        /* Resource Cards */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem; align-items: stretch; margin-bottom: 2.5rem;
        }
        .resource-card {
            background: var(--color-bg-white); border-radius: var(--radius-lg);
            padding: 1.6rem; box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border); transition: all var(--transition-smooth);
            display: flex; flex-direction: column; gap: 0.5rem; height: 100%;
        }
        .resource-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .resource-icon { font-size: 2rem; color: #d63031; line-height: 1; }
        .resource-level {
            display: inline-block; font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; padding: 0.25rem 0.7rem;
            border-radius: 1rem; background: var(--color-surface);
            color: var(--color-primary); align-self: flex-start;
        }
        .resource-title {
            font-weight: 700; font-size: 1rem; color: var(--color-primary);
            text-decoration: none; line-height: 1.3;
        }
        .resource-title:hover { text-decoration: underline; }
        .resource-description {
            font-size: 0.88rem; color: var(--color-text-muted); flex-grow: 1;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .resource-meta {
            display: flex; flex-wrap: wrap; gap: 0.5rem; font-size: 0.78rem;
            color: var(--color-text-muted);
        }
        .resource-meta span { display: inline-flex; align-items: center; gap: 0.3rem; }
        .resource-actions {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 0.8rem; margin-top: auto; border-top: 1px solid var(--color-border);
        }
        .btn-download-sm {
            background: var(--color-primary); color: white; padding: 0.4rem 1rem;
            border-radius: 20px; font-size: 0.8rem; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem;
            transition: background var(--transition-fast);
        }
        .btn-download-sm:hover { background: var(--color-primary-light); }
        .btn-view {
            background: transparent; color: var(--color-secondary); padding: 0.4rem 0.8rem;
            border-radius: 20px; font-size: 0.8rem; font-weight: 600;
            text-decoration: none; transition: background var(--transition-fast);
        }
        .btn-view:hover { background: var(--color-surface); }

        /* Category Chips */
        .category-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.8rem; margin-bottom: 2.5rem;
        }
        .category-chip {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.8rem 1.2rem; background: var(--color-bg-white);
            border: 1px solid var(--color-border); border-radius: 2rem;
            text-decoration: none; color: var(--color-text); font-weight: 500;
            font-size: 0.9rem; transition: all var(--transition-fast);
        }
        .category-chip:hover {
            border-color: var(--color-secondary); color: var(--color-secondary);
            box-shadow: var(--shadow-sm);
        }
        .category-chip i { color: var(--color-secondary); font-size: 0.9rem; }

        /* Featured Card */
        .featured-card {
            background: linear-gradient(135deg, #1a365d, #2a4a7f);
            color: white; border-radius: var(--radius-lg); padding: 2.5rem 2rem;
            display: flex; align-items: center; gap: 2rem; margin-bottom: 2.5rem;
        }
        @media (max-width: 768px) { .featured-card { flex-direction: column; text-align: center; } }
        .featured-card .icon-circle {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.15); display: flex; align-items: center;
            justify-content: center; font-size: 2.2rem; flex-shrink: 0;
        }
        .featured-card h3 {
            font-family: 'Merriweather', serif; font-size: 1.4rem; margin-bottom: 0.5rem;
        }
        .featured-card p { font-size: 0.95rem; opacity: 0.85; line-height: 1.6; }
        .featured-card .btn-outline-white {
            display: inline-flex; align-items: center; gap: 0.4rem;
            border: 2px solid white; color: white; padding: 0.55rem 1.4rem;
            border-radius: 30px; font-weight: 600; font-size: 0.85rem;
            text-decoration: none; margin-top: 1rem; transition: all var(--transition-fast);
        }
        .featured-card .btn-outline-white:hover { background: white; color: var(--color-primary); }

        /* Empty State */
        .empty-state {
            text-align: center; padding: 3rem 1rem; color: var(--color-text-muted);
        }
        .empty-state i { font-size: 3rem; color: var(--color-accent); margin-bottom: 0.8rem; }

        /* Loading */
        .loading-state {
            text-align: center; padding: 3rem; color: var(--color-text-muted);
        }
        .loading-state i {
            font-size: 2.5rem; color: var(--color-accent); margin-bottom: 0.8rem;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile nav */
        .mobile-nav-panel {
            position: fixed; top: 0; right: -320px; width: 280px;
            height: auto; max-height: 100vh; overflow-y: auto;
            background: white; box-shadow: -8px 0 30px rgba(0,0,0,0.12);
            z-index: 200; padding: 5rem 1.8rem 2rem;
            display: flex; flex-direction: column; gap: 0.8rem;
            opacity: 0; transition: right 0.35s ease, opacity 0.35s ease;
        }
        .mobile-nav-panel.active { right: 0; opacity: 1; }
        .mobile-nav-panel a {
            display: block; padding: 0.8rem 1rem; text-decoration: none;
            color: var(--color-text); font-weight: 500; border-radius: 30px;
            transition: background var(--transition-fast);
        }
        .mobile-nav-panel a:hover { background: var(--color-surface); }
        .mobile-nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.35);
            z-index: 150; opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .mobile-nav-overlay.active { opacity: 1; pointer-events: auto; }

        /* Footer */
        .site-footer {
            background: #0f172a; color: #cbd5e1; padding: 3rem 1.5rem 2rem; margin-top: auto;
        }
        .footer-intro {
            max-width: var(--max-width); margin: 0 auto 2rem;
            text-align: center; padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .footer-intro .logo { color: #f0f9ff; }
        .footer-inner {
            max-width: var(--max-width); margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2.5rem;
        }
        .footer-links h4 {
            font-weight: 700; font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 0.06em; color: #f0f9ff; margin-bottom: 1rem;
        }
        .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: color var(--transition-fast); }
        .footer-links a:hover { color: var(--color-gold-light); }
        .footer-bottom {
            max-width: var(--max-width); margin: 2.5rem auto 0; padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.08); text-align: center;
            font-size: 0.82rem; color: #64748b;
        }
    </style>
</head>
<body>
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="BioLearn Home">
                <i class="fa-solid fa-dna"></i> BioLearn
            </a>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            <button class="hamburger-action" id="hamburger-action" aria-label="Open menu" aria-expanded="false">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="main-content" id="resources-content">
        <div class="loading-state" id="loading-state">
            <i class="fa-solid fa-dna"></i>
            <p>Loading resources...</p>
        </div>
    </main>

    <div class="mobile-nav-panel" id="mobile-nav-panel">
        <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        <a href="resources.html"><i class="fa-solid fa-book"></i> All Resources</a>
        <a href="notes.html"><i class="fa-solid fa-book-open"></i> Browse Notes</a>
        <a href="submit.html"><i class="fa-solid fa-upload"></i> Submit a Resource</a>
        <a href="guidelines.html"><i class="fa-solid fa-check-circle"></i> Guidelines</a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a>
        <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
    </div>
    <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>

    <footer class="site-footer" id="site-footer">
        <div class="footer-intro">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <p>Free biology notes for O‑ and A‑Level learners.</p>
        </div>
        <div class="footer-inner" id="footer-inner"></div>
        <div class="footer-bottom">
            <p>&copy; <span id="current-year"></span> BioLearn. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        // ── Import shared auth module ──
        import { supabase, getSession, pageCache } from './auth-check.js';

        const API_BASE = '/api';
        let currentTab = 'All';
        let allResources = [];

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // ── Footer ──
        async function loadFooter() {
            try {
                if (pageCache.siteSections) {
                    const footerData = pageCache.siteSections.find(row => row.section === 'footer');
                    if (footerData?.data?.columns) { renderFooter(footerData.data.columns); return; }
                }
                const res = await fetch(`${API_BASE}/data?action=site-sections`);
                const data = await res.json();
                pageCache.siteSections = data;
                const footerData = data.find(row => row.section === 'footer');
                if (footerData?.data?.columns) {
                    renderFooter(footerData.data.columns);
                }
            } catch (err) { console.warn('Footer load failed', err); }
        }

        function renderFooter(columns) {
            const footerInner = document.getElementById('footer-inner');
            if (!footerInner) return;
            footerInner.innerHTML = columns.map(col => {
                const heading = escapeHtml(col.heading);
                const items = (col.items || []).map(item => {
                    let href = item.href ? item.href.trim() : '#';
                    let iconHtml = item.icon ? `<i class="${escapeHtml(item.icon)}"></i> ` : '';
                    return `<li><a href="${escapeHtml(href)}">${iconHtml}${escapeHtml(item.label)}</a></li>`;
                }).join('');
                return `<div class="footer-links"><h4>${heading}</h4><ul>${items}</ul></div>`;
            }).join('');
        }

        // ── Load Resources (cached) ──
        async function loadAllResources() {
            if (pageCache.resources) {
                allResources = pageCache.resources;
                return allResources;
            }
            try {
                const res = await fetch(`${API_BASE}/data?action=resources`);
                allResources = await res.json();
                pageCache.resources = allResources;
                return allResources;
            } catch (err) {
                console.error('Failed to load resources:', err);
                return [];
            }
        }

        // ── Load Page Config from site_sections ──
        async function loadPageConfig() {
            try {
                let data;
                if (pageCache.siteSections) {
                    data = pageCache.siteSections;
                } else {
                    const res = await fetch(`${API_BASE}/data?action=site-sections`);
                    data = await res.json();
                    pageCache.siteSections = data;
                }
                const config = data.find(row => row.section === 'resources_page');
                return config?.data || null;
            } catch (err) {
                console.warn('No resources_page config found, using defaults');
                return null;
            }
        }

        // ── Render Everything ──
        async function renderPage() {
            const container = document.getElementById('resources-content');
            const config = await loadPageConfig();
            const resources = await loadAllResources();

            if (!resources.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-book-open"></i>
                        <p>No resources available yet. Check back soon!</p>
                    </div>`;
                return;
            }

            // Compute stats
            const oLevelCount = resources.filter(r => r.level === 'O-Level').length;
            const aLevelCount = resources.filter(r => r.level === 'A-Level').length;
            const categories = [...new Set(resources.map(r => r.category).filter(Boolean))];

            let html = '';

            // Hero
            html += `
            <div class="hero-mini">
                <h1>${escapeHtml(config?.title || 'Biology Resources')}</h1>
                <p>${escapeHtml(config?.subtitle || 'Explore our complete collection of free O-Level and A-Level biology study materials.')}</p>
            </div>`;

            // Stats Row
            html += `
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-number">${resources.length}</div>
                    <div class="stat-label">Total Resources</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${oLevelCount}</div>
                    <div class="stat-label">O-Level</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${aLevelCount}</div>
                    <div class="stat-label">A-Level</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${categories.length}</div>
                    <div class="stat-label">Categories</div>
                </div>
            </div>`;

            // Featured Banner
            if (config?.featured) {
                html += `
                <div class="featured-card">
                    <div class="icon-circle">
                        <i class="fa-solid ${escapeHtml(config.featured.icon || 'fa-star')}"></i>
                    </div>
                    <div>
                        <h3>${escapeHtml(config.featured.heading || 'Featured')}</h3>
                        <p>${escapeHtml(config.featured.body || '')}</p>
                        ${config.featured.link ? `
                        <a href="${escapeHtml(config.featured.link)}" class="btn-outline-white">
                            <i class="fa-solid fa-arrow-right"></i> ${escapeHtml(config.featured.link_text || 'Learn More')}
                        </a>` : ''}
                    </div>
                </div>`;
            }

            // Level Tabs
            html += `
            <div class="section-header">
                <h2>Browse by Level</h2>
                <p>Filter resources by education level</p>
            </div>
            <div class="tab-bar" id="tab-bar">
                <button class="tab-btn active" data-tab="All">All</button>
                <button class="tab-btn" data-tab="O-Level">O‑Level</button>
                <button class="tab-btn" data-tab="A-Level">A‑Level</button>
            </div>`;

            // Resource Grid
            html += `<div class="resources-grid" id="resources-grid"></div>`;

            // Browse by Category
            if (categories.length) {
                html += `
                <div class="section-header" style="margin-top:1rem;">
                    <h2>Browse by Category</h2>
                    <p>Find resources by topic</p>
                </div>
                <div class="category-grid">
                    ${categories.map(cat => `
                        <a href="index.html?category=${encodeURIComponent(cat)}" class="category-chip">
                            <i class="fa-solid fa-folder"></i> ${escapeHtml(cat)}
                        </a>
                    `).join('')}
                </div>`;
            }

            // CTA
            html += `
            <div class="featured-card" style="background: linear-gradient(135deg, #1a365d, #3b82f6);">
                <div class="icon-circle">
                    <i class="fa-solid fa-upload"></i>
                </div>
                <div>
                    <h3>Have Resources to Share?</h3>
                    <p>Help grow our library by submitting your own biology notes and materials.</p>
                    <a href="submit.html" class="btn-outline-white">
                        <i class="fa-solid fa-arrow-right"></i> Submit a Resource
                    </a>
                </div>
            </div>`;

            container.innerHTML = html;

            // Render initial resource grid
            renderResourceGrid(resources);

            // Tab handlers
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTab = btn.dataset.tab;
                    const filtered = currentTab === 'All'
                        ? resources
                        : resources.filter(r => r.level === currentTab);
                    renderResourceGrid(filtered);
                });
            });
        }

        function renderResourceGrid(resources) {
            const grid = document.getElementById('resources-grid');
            if (!grid) return;

            if (!resources.length) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fa-solid fa-search"></i>
                        <p>No resources found for this level.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = resources.map(item => {
                const fileUrl = item.file_url || '#';
                return `
                <div class="resource-card">
                    <div class="resource-icon"><i class="fa-solid fa-file-pdf"></i></div>
                    ${item.level ? `<span class="resource-level">${escapeHtml(item.level)}</span>` : ''}
                    <a href="notes.html?id=${escapeHtml(String(item.id))}" class="resource-title">
                        ${escapeHtml(item.title || 'Untitled')}
                    </a>
                    <p class="resource-description">${escapeHtml(item.description || 'No description.')}</p>
                    <div class="resource-meta">
                        <span><i class="fa-regular fa-user"></i> ${escapeHtml(item.author || 'Unknown')}</span>
                        <span><i class="fa-regular fa-file"></i> ${escapeHtml(item.file_size || 'N/A')}</span>
                    </div>
                    <div class="resource-actions">
                        <a href="notes.html?id=${escapeHtml(String(item.id))}" class="btn-view">
                            <i class="fa-solid fa-eye"></i> View
                        </a>
                        <a href="${escapeHtml(fileUrl)}" class="btn-download-sm" download>
                            <i class="fa-solid fa-download"></i> Download
                        </a>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Mobile Nav ──
        function initMobileNav() {
            const hamburger = document.getElementById('hamburger-action');
            const panel = document.getElementById('mobile-nav-panel');
            const overlay = document.getElementById('mobile-nav-overlay');
            function openNav() { panel.classList.add('active'); overlay.classList.add('active'); hamburger.setAttribute('aria-expanded','true'); document.body.style.overflow = 'hidden'; }
            function closeNav() { panel.classList.remove('active'); overlay.classList.remove('active'); hamburger.setAttribute('aria-expanded','false'); document.body.style.overflow = ''; }
            hamburger.addEventListener('click', () => panel.classList.contains('active') ? closeNav() : openNav());
            overlay.addEventListener('click', closeNav);
            panel.querySelectorAll('a').forEach(link => link.addEventListener('click', closeNav));
        }

        // ── Init ──
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            window.addEventListener('scroll', () => {
                document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 10);
            }, { passive: true });
            initMobileNav();
            loadFooter();
            renderPage();
        });
    </script>
</body>
</html>

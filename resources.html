 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology Resources – BioLearn</title>
    <meta name="description" content="Browse our complete collection of free O-Level and A-Level biology notes.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --color-primary: #1a365d; --color-primary-light: #2a4a7f; --color-secondary: #3b82f6;
            --color-accent: #60a5fa; --color-surface: #f0f4f8; --color-bg-white: #ffffff;
            --color-text: #111827; --color-text-muted: #6b7280; --color-border: #d1d5db;
            --radius-lg: 1.25rem; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow-lg: 0 14px 32px rgba(0,0,0,0.08);
            --transition-fast: 180ms ease; --max-width: 1200px; --header-height: 4.5rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--color-surface); color: var(--color-text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .site-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--color-border); height: var(--header-height); display: flex; align-items: center; }
        .header-inner { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 1.8rem; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 700; font-size: 1.3rem; font-family: 'Merriweather', serif; color: var(--color-primary); }
        .logo i { color: var(--color-secondary); }
        .home-btn { background: var(--color-secondary); color: white; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background var(--transition-fast); }
        .home-btn:hover { background: var(--color-primary); }
        .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: var(--color-primary); font-weight: 500; font-size: 0.9rem; transition: color var(--transition-fast); }
        .nav-links a:hover { color: var(--color-secondary); }
        @media (max-width: 768px) { .nav-links { display: none; } }
        .main-content { max-width: var(--max-width); margin: 0 auto; padding: 2rem 1.8rem; }
        .hero-mini { text-align: center; padding: 2rem 0; }
        .hero-mini h1 { font-family: 'Merriweather', serif; font-size: 2.6rem; color: var(--color-primary); }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; text-align: center; }
        @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
        .stat-number { font-size: 2.4rem; font-weight: 700; color: var(--color-primary); font-family: 'Merriweather', serif; }
        .stat-label { font-size: 0.85rem; color: var(--color-text-muted); text-transform: uppercase; }
        .tab-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 2px solid var(--color-border); flex-wrap: wrap; }
        .tab-btn { padding: 0.7rem 1.6rem; border: none; background: transparent; font-weight: 600; color: var(--color-text-muted); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; font-family: inherit; }
        .tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-secondary); }
        .resources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .resource-card { background: white; border-radius: var(--radius-lg); padding: 1.6rem; box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); transition: all var(--transition-fast); display: flex; flex-direction: column; gap: 0.5rem; }
        .resource-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .resource-icon { font-size: 2rem; color: #d63031; }
        .resource-level { display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 0.25rem 0.7rem; border-radius: 1rem; background: var(--color-surface); color: var(--color-primary); align-self: flex-start; }
        .resource-title { font-weight: 700; color: var(--color-primary); text-decoration: none; }
        .resource-title:hover { text-decoration: underline; }
        .resource-description { font-size: 0.88rem; color: var(--color-text-muted); flex-grow: 1; }
        .resource-meta { display: flex; gap: 0.5rem; font-size: 0.78rem; color: var(--color-text-muted); }
        .resource-actions { display: flex; justify-content: space-between; padding-top: 0.8rem; border-top: 1px solid var(--color-border); }
        .btn-download-sm { background: var(--color-primary); color: white; padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-decoration: none; }
        .btn-download-sm:hover { background: var(--color-primary-light); }
        .btn-view { color: var(--color-secondary); padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-decoration: none; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.8rem; margin-bottom: 2rem; }
        .category-chip { display: flex; align-items: center; gap: 0.5rem; padding: 0.8rem 1.2rem; background: white; border: 1px solid var(--color-border); border-radius: 2rem; text-decoration: none; color: var(--color-text); font-weight: 500; font-size: 0.9rem; }
        .category-chip:hover { border-color: var(--color-secondary); color: var(--color-secondary); }
        .cta-banner { background: linear-gradient(135deg, #1a365d, #3b82f6); color: white; border-radius: var(--radius-lg); padding: 2.5rem 2rem; display: flex; align-items: center; gap: 2rem; }
        @media (max-width: 768px) { .cta-banner { flex-direction: column; text-align: center; } }
        .btn-outline-white { display: inline-flex; align-items: center; gap: 0.4rem; border: 2px solid white; color: white; padding: 0.55rem 1.4rem; border-radius: 30px; font-weight: 600; text-decoration: none; margin-top: 1rem; }
        .btn-outline-white:hover { background: white; color: var(--color-primary); }
        .site-footer { background: #0f172a; color: #cbd5e1; padding: 2rem 1.5rem; margin-top: auto; text-align: center; }
        .site-footer a { color: var(--color-gold); }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <nav class="nav-links">
                <a href="index.html">Home</a><a href="notes.html">Notes</a><a href="submit.html">Submit</a><a href="guidelines.html">Guidelines</a><a href="about.html">About</a><a href="contact.html">Contact</a>
            </nav>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
        </div>
    </header>
    <main class="main-content" id="resources-content"><p style="text-align:center;padding:3rem;">Loading...</p></main>
    <footer class="site-footer"><p>&copy; <span id="current-year"></span> BioLearn. <a href="index.html">Home</a> | <a href="notes.html">Notes</a> | <a href="contact.html">Contact</a></p></footer>
    <script type="module">
        const API_BASE = '/api';
        let allResources = [], currentTab = 'All';
        const cache = {};

        function escapeHtml(t) { const m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, c => m[c]); }

        async function loadAllResources() {
            if (cache.resources) { allResources = cache.resources; return allResources; }
            try { const res = await fetch(`${API_BASE}/data?action=resources`); allResources = await res.json(); cache.resources = allResources; return allResources; }
            catch (err) { return []; }
        }

        async function renderPage() {
            const container = document.getElementById('resources-content');
            const resources = await loadAllResources();
            if (!resources.length) { container.innerHTML = '<p style="text-align:center;padding:3rem;">No resources yet.</p>'; return; }
            const oCount = resources.filter(r => r.level === 'O-Level').length;
            const aCount = resources.filter(r => r.level === 'A-Level').length;
            const cats = [...new Set(resources.map(r => r.category).filter(Boolean))];
            container.innerHTML = `
                <div class="hero-mini"><h1>Biology Resources</h1><p>Explore our complete collection of free study materials.</p></div>
                <div class="stats-row"><div><div class="stat-number">${resources.length}</div><div class="stat-label">Total</div></div><div><div class="stat-number">${oCount}</div><div class="stat-label">O-Level</div></div><div><div class="stat-number">${aCount}</div><div class="stat-label">A-Level</div></div><div><div class="stat-number">${cats.length}</div><div class="stat-label">Categories</div></div></div>
                <div class="tab-bar"><button class="tab-btn active" data-tab="All">All</button><button class="tab-btn" data-tab="O-Level">O‑Level</button><button class="tab-btn" data-tab="A-Level">A‑Level</button></div>
                <div class="resources-grid" id="resources-grid"></div>
                ${cats.length ? `<h3 style="font-family:Merriweather,serif;color:var(--color-primary);margin:1.5rem 0 1rem;">Browse by Category</h3><div class="category-grid">${cats.map(c => `<a href="index.html" class="category-chip"><i class="fa-solid fa-folder"></i> ${escapeHtml(c)}</a>`).join('')}</div>` : ''}
                <div class="cta-banner"><div><i class="fa-solid fa-upload" style="font-size:2rem;"></i></div><div><h3>Have Resources to Share?</h3><p>Help grow our library.</p><a href="submit.html" class="btn-outline-white"><i class="fa-solid fa-arrow-right"></i> Submit a Resource</a></div></div>`;
            renderGrid(resources);
            document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                renderGrid(currentTab === 'All' ? resources : resources.filter(r => r.level === currentTab));
            }));
        }

        function renderGrid(items) {
            const grid = document.getElementById('resources-grid');
            if (!items.length) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--color-text-muted);">No resources for this level.</p>'; return; }
            grid.innerHTML = items.map(item => `
                <div class="resource-card">
                    <div class="resource-icon"><i class="fa-solid fa-file-pdf"></i></div>
                    ${item.level ? `<span class="resource-level">${escapeHtml(item.level)}</span>` : ''}
                    <a href="notes.html?id=${escapeHtml(String(item.id))}" class="resource-title">${escapeHtml(item.title||'Untitled')}</a>
                    <p class="resource-description">${escapeHtml(item.description||'')}</p>
                    <div class="resource-meta"><span><i class="fa-regular fa-user"></i> ${escapeHtml(item.author||'Unknown')}</span><span><i class="fa-regular fa-file"></i> ${escapeHtml(item.file_size||'N/A')}</span></div>
                    <div class="resource-actions"><a href="notes.html?id=${escapeHtml(String(item.id))}" class="btn-view"><i class="fa-solid fa-eye"></i> View</a><a href="${escapeHtml(item.file_url||'#')}" class="btn-download-sm" download><i class="fa-solid fa-download"></i> Download</a></div>
                </div>`).join('');
        }

        document.addEventListener('DOMContentLoaded', () => { document.getElementById('current-year').textContent = new Date().getFullYear(); renderPage(); });
    </script>
</body>
</html>

 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles & Blog – BioLearn</title>
    <meta name="description" content="Read biology study tips, insights, and updates from the BioLearn team.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --color-primary: #1a365d; --color-primary-light: #2a4a7f; --color-secondary: #3b82f6;
            --color-accent: #60a5fa; --color-gold: #f59e0b; --color-gold-light: #fcd34d;
            --color-surface: #f0f4f8; --color-bg-white: #ffffff; --color-text: #111827;
            --color-text-muted: #6b7280; --color-border: #d1d5db; --radius-sm: 0.5rem;
            --radius-md: 0.75rem; --radius-lg: 1.25rem; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 6px 18px rgba(0,0,0,0.06); --shadow-lg: 0 14px 32px rgba(0,0,0,0.08);
            --transition-fast: 180ms ease; --max-width: 1200px; --header-height: 4.5rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--color-surface); color: var(--color-text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        .site-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--color-border); height: var(--header-height); display: flex; align-items: center; }
        .site-header.scrolled { box-shadow: var(--shadow-md); }
        .header-inner { width: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 1.8rem; display: flex; align-items: center; justify-content: space-between; gap: 1.2rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; font-weight: 700; font-size: 1.3rem; font-family: 'Merriweather', serif; color: var(--color-primary); }
        .logo i { font-size: 1.4rem; color: var(--color-secondary); }
        .home-btn { background: var(--color-secondary); color: white; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background var(--transition-fast); }
        .home-btn:hover { background: var(--color-primary); }
        .home-btn i { font-size: 0.9rem; }
        .hamburger-action { background: white; border: 2px solid var(--color-border); color: var(--color-primary); font-size: 1.3rem; padding: 0.7rem 1.6rem; border-radius: 30px; display: none; cursor: pointer; }
        .hamburger-action:hover { background: #e5e7eb; }
        @media (max-width: 768px) { .hamburger-action { display: inline-flex; } }
        .main-content { max-width: var(--max-width); margin: 0 auto; padding: 2rem 1.8rem; width: 100%; }
        .hero-mini { text-align: center; padding: 2rem 0 2.5rem; }
        .hero-mini h1 { font-family: 'Merriweather', serif; font-size: 2.6rem; color: var(--color-primary); margin-bottom: 0.8rem; }
        .hero-mini p { font-size: 1.15rem; color: var(--color-text-muted); max-width: 600px; margin: 0 auto; }
        .tab-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 2px solid var(--color-border); flex-wrap: wrap; justify-content: center; }
        .tab-btn { padding: 0.7rem 2rem; border: none; background: transparent; font-weight: 600; font-size: 1rem; color: var(--color-text-muted); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; font-family: inherit; transition: all var(--transition-fast); display: inline-flex; align-items: center; gap: 0.5rem; }
        .tab-btn:hover { color: var(--color-primary); }
        .tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-secondary); }
        .tab-btn i { font-size: 0.9rem; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
        @media (max-width: 768px) { .posts-grid { grid-template-columns: 1fr; } }
        .post-card { background: var(--color-bg-white); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); transition: all var(--transition-fast); display: flex; flex-direction: column; }
        .post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .post-image { height: 180px; background-size: cover; background-position: center; position: relative; }
        .post-category { position: absolute; top: 1rem; left: 1rem; background: var(--color-secondary); color: white; padding: 0.3rem 0.9rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
        .post-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; flex-grow: 1; }
        .post-title { font-weight: 700; font-size: 1.1rem; color: var(--color-primary); text-decoration: none; line-height: 1.3; }
        .post-title:hover { text-decoration: underline; }
        .post-excerpt { font-size: 0.9rem; color: var(--color-text-muted); flex-grow: 1; line-height: 1.6; }
        .post-meta { display: flex; flex-wrap: wrap; gap: 1rem; font-size: 0.78rem; color: var(--color-text-muted); padding-top: 0.8rem; border-top: 1px solid var(--color-border); }
        .post-meta span { display: inline-flex; align-items: center; gap: 0.3rem; }
        .btn-read { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--color-secondary); font-weight: 600; font-size: 0.85rem; text-decoration: none; margin-top: 0.5rem; }
        .btn-read:hover { text-decoration: underline; }
        .newsletter-card { background: linear-gradient(135deg, #1a365d, #3b82f6); color: white; border-radius: var(--radius-lg); padding: 2.5rem 2rem; text-align: center; margin-top: 2.5rem; }
        .newsletter-card h3 { font-family: 'Merriweather', serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .newsletter-card p { opacity: 0.85; margin-bottom: 1.5rem; }
        .newsletter-form { display: flex; gap: 0.5rem; max-width: 450px; margin: 0 auto; }
        .newsletter-form input { flex: 1; padding: 0.7rem 1rem; border: none; border-radius: 2rem; font-family: inherit; font-size: 0.9rem; }
        .newsletter-form button { background: var(--color-gold); color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 2rem; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
        .newsletter-form button:hover { background: #d97706; }
        .mobile-nav-panel { position: fixed; top: 0; right: -320px; width: 280px; height: auto; max-height: 100vh; overflow-y: auto; background: white; box-shadow: -8px 0 30px rgba(0,0,0,0.12); z-index: 200; padding: 5rem 1.8rem 2rem; display: flex; flex-direction: column; gap: 0.8rem; opacity: 0; transition: right 0.35s ease, opacity 0.35s ease; }
        .mobile-nav-panel.active { right: 0; opacity: 1; }
        .mobile-nav-panel a { display: block; padding: 0.8rem 1rem; text-decoration: none; color: var(--color-text); font-weight: 500; border-radius: 30px; transition: background var(--transition-fast); }
        .mobile-nav-panel a:hover { background: var(--color-surface); }
        .mobile-nav-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
        .mobile-nav-overlay.active { opacity: 1; pointer-events: auto; }
        .site-footer { background: #0f172a; color: #cbd5e1; padding: 3rem 1.5rem 2rem; margin-top: auto; }
        .footer-intro { max-width: var(--max-width); margin: 0 auto 2rem; text-align: center; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .footer-intro .logo { color: #f0f9ff; }
        .footer-inner { max-width: var(--max-width); margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2.5rem; }
        .footer-links h4 { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.06em; color: #f0f9ff; margin-bottom: 1rem; }
        .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: color var(--transition-fast); }
        .footer-links a:hover { color: var(--color-gold-light); }
        .footer-bottom { max-width: var(--max-width); margin: 2.5rem auto 0; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.08); text-align: center; font-size: 0.82rem; color: #64748b; }
        .empty-state { text-align: center; padding: 3rem; color: var(--color-text-muted); }
        .empty-state i { font-size: 3rem; color: var(--color-accent); margin-bottom: 0.8rem; display: block; }
    </style>
</head>
<body>
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="BioLearn Home"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            <button class="hamburger-action" id="hamburger-action" aria-label="Open menu" aria-expanded="false"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <main class="main-content" id="blog-content">
        <p style="text-align:center; padding:3rem;">Loading...</p>
    </main>

    <div class="mobile-nav-panel" id="mobile-nav-panel">
        <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        <a href="resources.html"><i class="fa-solid fa-book"></i> All Resources</a>
        <a href="notes.html"><i class="fa-solid fa-book-open"></i> Browse Notes</a>
        <a href="submit.html"><i class="fa-solid fa-upload"></i> Submit a Resource</a>
        <a href="guidelines.html"><i class="fa-solid fa-check-circle"></i> Guidelines</a>
        <a href="blog.html"><i class="fa-solid fa-newspaper"></i> Articles & Blog</a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a>
        <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
    </div>
    <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>

    <footer class="site-footer" id="site-footer">
        <div class="footer-intro">
            <a href="index.html" class="logo"><i class="fa-solid fa-dna"></i> BioLearn</a>
            <p>Free biology notes for O‑ and A‑Level learners.</p>
        </div>
        <div class="footer-inner" id="footer-inner"></div>
        <div class="footer-bottom"><p>&copy; <span id="current-year"></span> BioLearn. All rights reserved.</p></div>
    </footer>

    <script>
        let blogData = null;

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        async function loadBlog() {
            const container = document.getElementById('blog-content');
            try {
                const res = await fetch('/api/data?action=site-sections');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!Array.isArray(data)) throw new Error('Invalid response');

                // Footer
                const footerRow = data.find(r => r.section === 'footer');
                if (footerRow?.data?.columns) {
                    document.getElementById('footer-inner').innerHTML = footerRow.data.columns.map(col => {
                        const heading = escapeHtml(col.heading);
                        const items = (col.items || []).map(item => {
                            let href = item.href ? item.href.trim() : '#';
                            let iconHtml = item.icon ? `<i class="${escapeHtml(item.icon)}"></i> ` : '';
                            return `<li><a href="${escapeHtml(href)}">${iconHtml}${escapeHtml(item.label)}</a></li>`;
                        }).join('');
                        return `<div class="footer-links"><h4>${heading}</h4><ul>${items}</ul></div>`;
                    }).join('');
                }

                // Blog content
                const blogRow = data.find(r => r.section === 'blog');
                if (!blogRow?.data?.tabs?.length) { container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-newspaper"></i><p>No posts yet.</p></div>'; return; }
                blogData = blogRow.data;
                const tabs = blogData.tabs;

                let html = `<div class="hero-mini"><h1>${escapeHtml(blogData.title||'Articles & Blog')}</h1><p>${escapeHtml(blogData.subtitle||'')}</p></div>`;
                html += '<div class="tab-bar">';
                tabs.forEach((tab, i) => { html += `<button class="tab-btn${i===0?' active':''}" data-tab="${escapeHtml(tab.id)}"><i class="fa-solid ${escapeHtml(tab.icon||'fa-newspaper')}"></i> ${escapeHtml(tab.label)}</button>`; });
                html += '</div><div class="posts-grid" id="posts-grid"></div>';
                html += '<div class="newsletter-card"><h3>Stay Updated</h3><p>Get the latest articles and study tips.</p><form class="newsletter-form"><input type="email" placeholder="Your email" required><button type="submit">Subscribe</button></form></div>';
                container.innerHTML = html;

                renderPosts(tabs[0].posts);

                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const tab = tabs.find(t => t.id === btn.dataset.tab);
                        if (tab) renderPosts(tab.posts);
                    });
                });

                document.querySelector('.newsletter-form').addEventListener('submit', (e) => {
                    e.preventDefault(); alert('Thanks for subscribing!'); e.target.reset();
                });
            } catch (err) {
                container.innerHTML = `<p style="text-align:center;padding:3rem;color:red;">Failed: ${escapeHtml(err.message)}</p>`;
            }
        }

        function renderPosts(posts) {
            const grid = document.getElementById('posts-grid');
            if (!posts?.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fa-solid fa-newspaper"></i><p>No posts yet.</p></div>'; return; }
            grid.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-image" style="background-image:url('${escapeHtml(post.image||'')}');"><span class="post-category">${escapeHtml(post.category||'General')}</span></div>
                    <div class="post-body">
                        <a href="${escapeHtml(post.link||'#')}" class="post-title">${escapeHtml(post.title)}</a>
                        <p class="post-excerpt">${escapeHtml(post.excerpt||'')}</p>
                        <div class="post-meta"><span><i class="fa-regular fa-user"></i> ${escapeHtml(post.author)}</span><span><i class="fa-regular fa-calendar"></i> ${escapeHtml(post.date)}</span><span><i class="fa-regular fa-clock"></i> ${escapeHtml(post.read_time)}</span></div>
                        <a href="${escapeHtml(post.link||'#')}" class="btn-read">Read More <i class="fa-solid fa-arrow-right"></i></a>
                    </div>
                </div>`).join('');
        }

        function initMobileNav() {
            const h = document.getElementById('hamburger-action');
            const p = document.getElementById('mobile-nav-panel');
            const o = document.getElementById('mobile-nav-overlay');
            function open() { p.classList.add('active'); o.classList.add('active'); h.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; }
            function close() { p.classList.remove('active'); o.classList.remove('active'); h.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
            h.addEventListener('click', () => p.classList.contains('active') ? close() : open());
            o.addEventListener('click', close);
            p.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            initMobileNav();
            window.addEventListener('scroll', () => { document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 10); }, { passive: true });
            loadBlog();
        });
    </script>
</body>
</html>

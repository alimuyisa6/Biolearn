<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — AliverBiopharm</title>
    <meta name="description" content="Read the latest articles on biology, pharmacy, and education.">
    <meta name="theme-color" content="#0b0b1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        :root{--clr-deep-space:#0b0b1a;--clr-cyan:#00d9ff;--clr-magenta:#ff00aa;--clr-navy-card:#1a1a2e;--clr-navy-light:#16213e;--clr-white:#e0f0ff;--clr-text-dim:#9aa9c1;--clr-text-muted:#6b7a94;--clr-border-glow:rgba(0,217,255,0.25);--shadow-card:0 8px 32px rgba(0,0,0,0.3);--transition-fast:180ms ease;--max-width:1200px;--font-body:'Inter',sans-serif;--font-display:'Space Grotesk',sans-serif;--radius-sm:0.5rem;--radius-md:0.75rem;--radius-lg:1.25rem;--gradient-cyan:linear-gradient(135deg,#00d9ff,#00b4d8);--gradient-magenta:linear-gradient(135deg,#ff00aa,#d6008e)}
        body.light-mode{--clr-deep-space:#f0f4f8;--clr-cyan:#0077b6;--clr-magenta:#d6008e;--clr-navy-card:#fff;--clr-navy-light:#e8edf2;--clr-white:#0b1a2f;--clr-text-dim:#2c3e50;--clr-text-muted:#4a5568;--clr-border-glow:rgba(0,119,182,0.25);--shadow-card:0 8px 32px rgba(0,0,0,0.08)}
        *{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;font-size:16px}
        body{font-family:var(--font-body);background:var(--clr-deep-space);color:var(--clr-white);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;transition:background 0.3s,color 0.3s}
        .site-header{position:sticky;top:0;z-index:100;background:rgba(11,11,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--clr-border-glow);padding:0.8rem 0}
        body.light-mode .site-header{background:rgba(240,244,248,0.9)}
        .header-container{max-width:var(--max-width);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem}
        .logo-link{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--clr-cyan);text-decoration:none;display:flex;align-items:center;gap:0.5rem}
        .logo-link i{color:var(--clr-magenta)}
        .nav-actions{display:flex;gap:0.8rem;align-items:center}
        .theme-toggle,.home-btn{background:transparent;border:1px solid var(--clr-cyan);color:var(--clr-cyan);font-size:0.9rem;padding:0.5rem 1rem;border-radius:30px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem}
        .home-btn:hover,.theme-toggle:hover{background:var(--clr-cyan);color:#0b0b1a}
        .section{max-width:var(--max-width);margin:3rem auto;padding:0 1.5rem}
        .section-title{font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--clr-cyan);margin-bottom:0.5rem;text-align:center}
        .section-subtitle{text-align:center;color:var(--clr-text-dim);margin-bottom:2rem}
        .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem}
        .post-card{background:var(--clr-navy-card);border:1px solid var(--clr-border-glow);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-card);transition:all var(--transition-fast)}
        .post-card:hover{transform:translateY(-4px);border-color:var(--clr-magenta)}
        .post-image{height:180px;background-size:cover;background-position:center}
        .post-body{padding:1.5rem}
        .post-body h3{color:var(--clr-white);margin-bottom:0.5rem;font-size:1.1rem}
        .post-body p{color:var(--clr-text-dim);font-size:0.9rem;line-height:1.6;margin-bottom:1rem}
        .post-meta{display:flex;gap:1rem;font-size:0.8rem;color:var(--clr-text-muted);margin-bottom:0.8rem}
        .read-more{color:var(--clr-magenta);text-decoration:none;font-weight:600}
        .newsletter-card{background:var(--gradient-magenta);color:#fff;border-radius:var(--radius-lg);padding:2rem;text-align:center;margin-top:2rem}
        .newsletter-card h3{font-family:var(--font-display);margin-bottom:0.5rem}
        .newsletter-form{display:flex;gap:0.5rem;max-width:450px;margin:1rem auto 0}
        .newsletter-form input{flex:1;padding:0.7rem 1rem;border:none;border-radius:30px;font-family:inherit}
        .newsletter-form button{padding:0.7rem 1.5rem;border:none;border-radius:30px;background:#0b0b1a;color:#fff;font-weight:600;cursor:pointer}
        .footer-fat{background:#060615;border-top:2px solid var(--clr-cyan);padding:3rem 1.5rem 1.5rem;margin-top:auto}
        .footer-grid{max-width:var(--max-width);margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2rem}
        .footer-col h4{font-family:var(--font-display);color:var(--clr-cyan);font-weight:600;margin-bottom:1rem;text-transform:uppercase;font-size:0.9rem}
        .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:0.5rem}
        .footer-col a{color:var(--clr-text-dim);text-decoration:none;font-size:0.85rem}
        .footer-col a:hover{color:var(--clr-magenta)}
        .footer-social{display:flex;gap:1rem;margin-top:1rem}
        .footer-social a{width:36px;height:36px;border-radius:50%;border:1px solid var(--clr-cyan);display:flex;align-items:center;justify-content:center;color:var(--clr-cyan)}
        .footer-social a:hover{background:var(--clr-magenta);border-color:var(--clr-magenta);color:#fff}
        .footer-bottom{max-width:var(--max-width);margin:2rem auto 0;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.08);text-align:center;font-size:0.8rem;color:var(--clr-text-muted)}
        .spinner{text-align:center;padding:3rem;color:var(--clr-cyan)}
        .spinner i{font-size:2.5rem;animation:spin 1.2s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        @media(max-width:768px){.posts-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo-link"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
                <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
            </div>
        </div>
    </header>

    <main>
        <section class="section" id="blog-content">
            <div class="spinner"><i class="fa-solid fa-dna"></i><p>Loading articles...</p></div>
        </section>
    </main>

    <footer class="footer-fat">
        <div class="footer-grid" id="footer-grid"><div class="footer-col"><a href="index.html" class="logo-link" style="font-size:1.2rem"><i class="fa-solid fa-dna"></i> AliverBiopharm</a><p style="color:var(--clr-text-dim);margin-top:0.5rem">Advancing biology and pharmacy education.</p><div class="footer-social" id="footer-social"></div></div></div>
        <div class="footer-bottom"><p>&copy; <span id="current-year"></span> AliverBiopharm</p></div>
    </footer>

    <script>
        const API_BASE = '/api/query';
        async function apiCall(a, p = {}) {
            const r = await fetch(API_BASE, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: a, ...p }) });
            const j = await r.json();
            if (!r.ok) throw new Error(j.error || 'Failed');
            return j.data;
        }
        function esc(t) { const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }; return String(t || '').replace(/[&<>"']/g, c => m[c]); }
        function buildFooter(d) {
            if (!d?.columns) return;
            const fg = document.getElementById('footer-grid'), fs = document.getElementById('footer-social'), logo = fg.querySelector('.footer-col');
            fg.innerHTML = logo.outerHTML + d.columns.map(c => `<div class="footer-col"><h4>${esc(c.heading)}</h4><ul>${(c.items||[]).map(i => `<li><a href="${esc(i.href||'#')}">${i.icon?`<i class="${esc(i.icon)}" style="color:var(--clr-magenta);margin-right:0.5rem"></i>`:''}${esc(i.label)}</a></li>`).join('')}</ul></div>`).join('');
            fs.innerHTML = (d.social_links||[]).map(s => `<a href="${esc(s.url)}"><i class="${esc(s.icon)}"></i></a>`).join('');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            const tt = document.getElementById('theme-toggle'), icon = tt.querySelector('i');
            if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); icon.classList.replace('fa-moon', 'fa-sun') }
            tt.onclick = () => { document.body.classList.toggle('light-mode'); const l = document.body.classList.contains('light-mode'); icon.classList.replace(l?'fa-moon':'fa-sun', l?'fa-sun':'fa-moon'); localStorage.setItem('theme', l?'light':'dark') };

            try {
                const sections = await apiCall('get_all_site_sections');
                if (sections) buildFooter(sections.footer);
                const blog = sections?.blog;
                const c = document.getElementById('blog-content');
                if (!blog?.posts?.length) { c.innerHTML = '<h1 class="section-title">Blog</h1><p style="text-align:center;color:var(--clr-text-dim)">Articles coming soon.</p>'; return }
                c.innerHTML = `<h1 class="section-title">${esc(blog.title||'Articles & Insights')}</h1><p class="section-subtitle">${esc(blog.subtitle||'Stay updated with the latest in biology and pharmacy.')}</p><div class="posts-grid">${blog.posts.map(p => `<div class="post-card">${p.image_url?`<div class="post-image" style="background-image:url('${esc(p.image_url)}')"></div>`:''}<div class="post-body"><h3>${esc(p.title)}</h3><p>${esc(p.excerpt||'')}</p><div class="post-meta"><span><i class="fa-regular fa-user"></i> ${esc(p.author||'')}</span><span><i class="fa-regular fa-calendar"></i> ${esc(p.date||'')}</span></div><a href="${esc(p.slug?'/blog/'+p.slug:'#')}" class="read-more">Read More →</a></div></div>`).join('')}</div><div class="newsletter-card"><h3>Stay Updated</h3><p>Get the latest articles delivered to your inbox.</p><form class="newsletter-form"><input type="email" placeholder="Your email" required><button type="submit">Subscribe</button></form></div>`;
                document.querySelector('.newsletter-form').onsubmit = async e => { e.preventDefault(); try { await apiCall('subscribe_newsletter', { formData: { email: e.target.querySelector('input').value.trim() } }); alert('✓ Subscribed!'); e.target.reset() } catch(err) { alert('Subscribed!'); e.target.reset() } };
            } catch(e) { document.getElementById('blog-content').innerHTML = '<p style="text-align:center;color:var(--clr-magenta)">Failed to load.</p>' }
        });
    </script>
</body>
</html>

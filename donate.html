    <script>
        // ── Config ──
        var SUPABASE_URL = 'https://bhhndmcqjibodbfmbrpj.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoaG5kbWNxamlib2RiZm1icnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI3MzIsImV4cCI6MjA5MjA1ODczMn0.aXTyrqWOECUHccOLcrwERPWTWu46fsGxYwkt-5xbrl8';
        var supabase = window.supabase && window.supabase.createClient ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
        var API_BASE = '/api';
        var pageCache = { siteSections: null };
        var currentTab = 'crypto';
        var selectedCoin = 'usdt';
        var selectedAmount = 10;
        var paymentId = null;
        var paymentPoll = null;

        // ── Session ──
        function getCachedSession() { var c = sessionStorage.getItem('bl_sess'); if (c) { try { var p = JSON.parse(c); if (p.t && Date.now() - p.t < 300000) return p.s; } catch(e) {} } return null; }
        function setCachedSession(s) { if (s) sessionStorage.setItem('bl_sess', JSON.stringify({s:s, t:Date.now()})); else sessionStorage.removeItem('bl_sess'); }
        async function getSession() { var c = getCachedSession(); if (c) return c; if (!supabase) return null; var _a = await supabase.auth.getSession(), s = _a.data.session; setCachedSession(s); return s; }
        supabase && supabase.auth.onAuthStateChange(function(e) { if (e === 'SIGNED_OUT') sessionStorage.removeItem('bl_sess'); });

        function escapeHtml(t) { var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, function(c){return m[c];}); }
        function removeSpinner() { var s = document.getElementById('loading-spinner'); if (s) s.remove(); }
        function clearPayment() { paymentId = null; if (paymentPoll) { clearInterval(paymentPoll); paymentPoll = null; } resetQr(); resetStatus('crypto-status'); }
        function resetQr() { var qp = document.getElementById('qr-panel'); if (qp) qp.innerHTML = '<p style="color:var(--color-text-muted);">Select coin and amount, then click Pay.</p>'; }
        function resetStatus(id) { var el = document.getElementById(id); if (el) el.innerHTML = ''; }

        // ── Site sections ──
        async function loadSiteSections() { if (pageCache.siteSections) return pageCache.siteSections; var r = await fetch(API_BASE + '/data?action=site-sections'); if (!r.ok) throw new Error('HTTP ' + r.status); var d = await r.json(); pageCache.siteSections = d; return d; }
        function loadFooter(data) { var fr = data.find(function(r){return r.section==='footer';}); if (fr&&fr.data&&fr.data.columns) { document.getElementById('footer-inner').innerHTML = fr.data.columns.map(function(col){ var h=escapeHtml(col.heading); var items=(col.items||[]).map(function(item){ var href=item.href?item.href.trim():'#'; var icon=item.icon?'<i class="'+escapeHtml(item.icon)+'"></i> ':''; return '<li><a href="'+escapeHtml(href)+'">'+icon+escapeHtml(item.label)+'</a></li>'; }).join(''); return '<div class="footer-links"><h4>'+h+'</h4><ul>'+items+'</ul></div>'; }).join(''); } }

        // ── Render ──
        function renderPage(data) {
            var c = document.getElementById('donate-content');
            var dr = data.find(function(r){return r.section==='donate';});
            if (!dr||!dr.data) { removeSpinner(); c.innerHTML = '<div class="hero-mini"><h1>Donate</h1><p>Page being set up.</p></div>'; return; }
            var d = dr.data;
            var html = '';
            html += '<div class="hero-mini"><h1>' + escapeHtml(d.title||'Support BioLearn') + '</h1><p>' + escapeHtml(d.subtitle||'') + '</p></div>';
            if (d.impact_items&&d.impact_items.length) { html += '<div class="impact-bar">'; d.impact_items.forEach(function(i){ html += '<div class="impact-item"><div class="num">'+escapeHtml(i.value)+'</div><div class="label">'+escapeHtml(i.label)+'</div></div>'; }); html += '</div>'; }
            var goal = d.goal_amount||500000, raised = d.raised_amount||0, pct = Math.min(Math.round((raised/goal)*100),100);
            html += '<div class="goal-bar-wrap"><div class="goal-label"><span>Monthly Goal</span><strong>'+pct+'%</strong></div><div class="goal-bar"><div class="goal-fill" style="width:'+pct+'%;"></div></div><div class="goal-label" style="margin-top:0.5rem;"><span>UGX '+raised.toLocaleString()+'</span><span>UGX '+goal.toLocaleString()+'</span></div></div>';
            html += '<div class="tab-bar"><button class="tab-btn active" data-tab="crypto"><i class="fa-brands fa-bitcoin"></i> Crypto</button><button class="tab-btn" data-tab="momo"><i class="fa-solid fa-mobile-screen"></i> Mobile Money</button></div>';
            // Crypto panel
            html += '<div id="crypto-panel" class="card crypto-grid"><div><h3 style="color:var(--color-primary);margin-bottom:1rem;">Donate with Crypto</h3>';
            html += '<div class="coin-selector">';
            [{id:'usdt',label:'USDT',icon:'fa-dollar-sign'},{id:'btc',label:'BTC',icon:'fa-brands fa-bitcoin'},{id:'eth',label:'ETH',icon:'fa-brands fa-ethereum'},{id:'bnb',label:'BNB',icon:'fa-brands fa-bootstrap'}].forEach(function(cc){ html += '<button class="coin-chip'+(cc.id===selectedCoin?' active':'')+'" data-coin="'+cc.id+'"><i class="fa-solid '+cc.icon+'"></i> '+cc.label+'</button>'; });
            html += '</div>';
            html += '<p style="font-size:0.85rem;color:var(--color-text-muted);margin-bottom:0.5rem;">Amount (USD)</p><div class="amount-buttons">';
            (d.suggested_amounts||[5,10,25,50,100]).forEach(function(a){ html += '<button class="amount-btn'+(a===selectedAmount?' active':'')+'" data-amount="'+a+'">$'+a+'</button>'; });
            html += '<input type="number" class="amount-input" id="custom-amount" placeholder="Custom" min="1" value="'+selectedAmount+'"></div>';
            html += '<button class="btn-donate" id="crypto-donate-btn"><i class="fa-brands fa-bitcoin"></i> Pay with Crypto</button>';
            html += '<div class="payment-status" id="crypto-status"></div></div>';
            html += '<div class="qr-container" id="qr-panel"><p style="color:var(--color-text-muted);">Select coin and amount, then click Pay.</p></div></div>';
            // MoMo panel
            var momo = d.momo||{};
            html += '<div id="momo-panel" class="card" style="display:none;"><h3 style="color:var(--color-primary);margin-bottom:1rem;">Donate via Mobile Money</h3><div class="momo-numbers">';
            if (momo.mtn) html += '<div class="momo-card"><h4><i class="fa-solid fa-mobile-screen"></i> MTN MoMo</h4><div class="number">'+escapeHtml(momo.mtn.number||'')+'</div><div class="name">'+escapeHtml(momo.mtn.name||'')+'</div><button class="btn-copy" onclick="copyText(\''+escapeHtml(momo.mtn.number||'')+'\',this)"><i class="fa-regular fa-copy"></i> Copy</button></div>';
            if (momo.airtel) html += '<div class="momo-card"><h4><i class="fa-solid fa-mobile-screen"></i> Airtel</h4><div class="number">'+escapeHtml(momo.airtel.number||'')+'</div><div class="name">'+escapeHtml(momo.airtel.name||'')+'</div><button class="btn-copy" onclick="copyText(\''+escapeHtml(momo.airtel.number||'')+'\',this)"><i class="fa-regular fa-copy"></i> Copy</button></div>';
            html += '</div><p style="font-size:0.85rem;color:var(--color-text-muted);margin-bottom:1rem;">After sending, confirm your donation:</p>';
            html += '<form id="momo-form"><div class="form-group"><label>Name (optional)</label><input type="text" id="momo-name" placeholder="Your name"></div><div class="form-group"><label>Amount (UGX) *</label><input type="number" id="momo-amount" placeholder="e.g. 10000" required></div><div class="form-group"><label>Transaction ID *</label><input type="text" id="momo-txid" placeholder="From MoMo SMS" required></div><button type="submit" class="btn-submit" id="momo-submit-btn"><i class="fa-solid fa-paper-plane"></i> Confirm Donation</button></form>';
            html += '<div class="payment-status" id="momo-status"></div></div>';
            // Donor wall
            html += '<div class="card"><h3 style="color:var(--color-primary);margin-bottom:1rem;"><i class="fa-solid fa-heart" style="color:var(--color-gold);"></i> Recent Supporters</h3><div id="donor-list"><p style="color:var(--color-text-muted);">Loading...</p></div></div>';
            removeSpinner(); c.innerHTML = html;
            bindEvents();
            loadDonors();
        }

        function bindEvents() {
            document.querySelectorAll('.tab-btn').forEach(function(b){ b.addEventListener('click',function(){ document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active');}); b.classList.add('active'); currentTab=b.dataset.tab; document.getElementById('crypto-panel').style.display=currentTab==='crypto'?'':'none'; document.getElementById('momo-panel').style.display=currentTab==='momo'?'':'none'; }); });
            document.querySelectorAll('.coin-chip').forEach(function(c){ c.addEventListener('click',function(){ document.querySelectorAll('.coin-chip').forEach(function(x){x.classList.remove('active');}); c.classList.add('active'); selectedCoin=c.dataset.coin; clearPayment(); }); });
            document.querySelectorAll('.amount-btn').forEach(function(b){ b.addEventListener('click',function(){ document.querySelectorAll('.amount-btn').forEach(function(x){x.classList.remove('active');}); b.classList.add('active'); selectedAmount=parseInt(b.dataset.amount); document.getElementById('custom-amount').value=selectedAmount; clearPayment(); }); });
            var ci = document.getElementById('custom-amount'); if (ci) ci.addEventListener('change',function(){ selectedAmount=parseFloat(this.value)||10; document.querySelectorAll('.amount-btn').forEach(function(x){x.classList.remove('active');}); clearPayment(); });
            var cdb = document.getElementById('crypto-donate-btn'); if (cdb) cdb.addEventListener('click', handleCryptoDonate);
            var mf = document.getElementById('momo-form'); if (mf) mf.addEventListener('submit', function(e){ e.preventDefault(); handleMomoSubmit(); });
        }

        // ── Crypto ──
        async function handleCryptoDonate() {
            var btn = document.getElementById('crypto-donate-btn'), st = document.getElementById('crypto-status');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating invoice...'; st.innerHTML = '';
            try {
                var res = await fetch(API_BASE + '/donate', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ amount: selectedAmount, pay_currency: selectedCoin }) });
                if (!res.ok) { var e = await res.json(); throw new Error(e.error||'Failed'); }
                var inv = await res.json();
                var qp = document.getElementById('qr-panel');
                qp.innerHTML = '<div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(inv.pay_address)+'" alt="QR" width="180" height="180"></div><div class="wallet-address">'+escapeHtml(inv.pay_address)+'</div><button class="btn-copy" onclick="copyText(\''+escapeHtml(inv.pay_address)+'\',this)"><i class="fa-regular fa-copy"></i> Copy Address</button><p style="font-size:0.8rem;color:var(--color-text-muted);margin-top:0.5rem;">Send <strong>'+inv.pay_amount+' '+inv.pay_currency.toUpperCase()+'</strong></p>';
                st.innerHTML = '<span class="pending"><i class="fa-solid fa-clock"></i> Waiting for payment...</span>';
                btn.innerHTML = '<i class="fa-solid fa-clock"></i> Awaiting payment...';
                paymentId = inv.invoice_id;
                if (paymentPoll) clearInterval(paymentPoll);
                paymentPoll = setInterval(async function() {
                    try {
                        var cr = await fetch(API_BASE + '/donate-status?id=' + paymentId);
                        if (!cr.ok) return;
                        var cd = await cr.json();
                        if (cd.status === 'finished' || cd.status === 'confirmed') {
                            clearInterval(paymentPoll); paymentPoll = null;
                            st.innerHTML = '<span class="success"><i class="fa-solid fa-circle-check"></i> Confirmed! Thank you!</span>';
                            btn.innerHTML = '<i class="fa-solid fa-check"></i> Received!'; btn.disabled = true;
                            qp.innerHTML = '<div style="text-align:center;font-size:4rem;">🎉</div><p style="text-align:center;color:var(--color-success);">Thank you for your support!</p>';
                            loadDonors();
                        } else if (cd.status === 'expired') {
                            clearInterval(paymentPoll); paymentPoll = null;
                            st.innerHTML = '<span style="color:var(--color-danger);">Invoice expired. Please try again.</span>';
                            btn.disabled = false; btn.innerHTML = '<i class="fa-brands fa-bitcoin"></i> Pay with Crypto';
                        }
                    } catch(e) {}
                }, 10000);
            } catch(err) {
                st.innerHTML = '<span style="color:var(--color-danger);">'+escapeHtml(err.message)+'</span>';
                btn.disabled = false; btn.innerHTML = '<i class="fa-brands fa-bitcoin"></i> Pay with Crypto';
            }
        }

        // ── MoMo ──
        async function handleMomoSubmit() {
            var btn = document.getElementById('momo-submit-btn'), st = document.getElementById('momo-status');
            var name = document.getElementById('momo-name').value.trim();
            var amount = document.getElementById('momo-amount').value.trim();
            var txid = document.getElementById('momo-txid').value.trim();
            if (!amount || !txid) { st.innerHTML = '<span style="color:var(--color-danger);">Fill amount and transaction ID.</span>'; return; }
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
            try {
                var res = await fetch(API_BASE + '/actions?action=submit-resource', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ title: 'Donation: '+(name||'Anonymous')+' - UGX '+amount, description: 'MoMo donation. TxID: '+txid+'. Amount: UGX '+amount, author: name||'Anonymous', level: 'Donation', category: 'Donation', tag: 'momo-donation', file_url: '', file_size: amount+' UGX' }) });
                if (!res.ok) throw new Error('Submission failed');
                st.innerHTML = '<span class="success"><i class="fa-solid fa-circle-check"></i> Thank you! Your donation will be confirmed shortly.</span>';
                document.getElementById('momo-form').reset();
                loadDonors();
            } catch(err) {
                st.innerHTML = '<span style="color:var(--color-danger);">'+escapeHtml(err.message)+'</span>';
            } finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Confirm Donation'; }
        }

        // ── Donors ──
        async function loadDonors() {
            var list = document.getElementById('donor-list'); if (!list) return;
            try {
                var r = await fetch(API_BASE + '/data?action=site-sections');
                var d = await r.json();
                var dr = d.find(function(x){return x.section==='donors';});
                var donors = (dr&&dr.data&&dr.data.donors) ? dr.data.donors : [];
                if (!donors.length) { list.innerHTML = '<p style="color:var(--color-text-muted);">No donors yet. Be the first!</p>'; return; }
                list.innerHTML = donors.map(function(dn){ return '<div class="donor-item"><div class="donor-avatar">'+(dn.name||'A').charAt(0).toUpperCase()+'</div><div class="donor-info"><strong>'+escapeHtml(dn.name||'Anonymous')+'</strong><span>'+escapeHtml(dn.date||'')+'</span></div><div class="donor-amount">'+escapeHtml(dn.amount||'')+'</div></div>'; }).join('');
            } catch(e) { list.innerHTML = '<p style="color:var(--color-text-muted);">Unable to load donors.</p>'; }
        }

        window.copyText = function(text, btn) {
            if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function(){ btn.innerHTML='<i class="fa-solid fa-check"></i> Copied!'; setTimeout(function(){ btn.innerHTML='<i class="fa-regular fa-copy"></i> Copy'; },2000); }); }
            else { var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed';ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); btn.innerHTML='<i class="fa-solid fa-check"></i> Copied!'; setTimeout(function(){ btn.innerHTML='<i class="fa-regular fa-copy"></i> Copy'; },2000); }
        };

        function initMobileNav() {
            var ha=document.getElementById('hamburger-action'), panel=document.getElementById('mobile-nav-panel'), overlay=document.getElementById('mobile-nav-overlay');
            function open(){ panel.classList.add('active'); overlay.classList.add('active'); ha.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; }
            function close(){ panel.classList.remove('active'); overlay.classList.remove('active'); ha.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
            ha.addEventListener('click',function(){ panel.classList.contains('active')?close():open(); });
            overlay.addEventListener('click',close);
            panel.querySelectorAll('a').forEach(function(l){ l.addEventListener('click',close); });
        }

        document.addEventListener('DOMContentLoaded', async function(){
            document.getElementById('current-year').textContent = new Date().getFullYear();
            window.addEventListener('scroll',function(){ document.getElementById('site-header').classList.toggle('scrolled',window.scrollY>10); },{passive:true});
            initMobileNav();
            try { var data = await loadSiteSections(); loadFooter(data); renderPage(data); }
            catch(err) { removeSpinner(); document.getElementById('donate-content').innerHTML = '<div class="hero-mini"><h1>Donate</h1><p>Unable to load page.</p></div>'; }
        });
    </script>
</body>
</html>

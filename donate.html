    <style>

        .donor-amount { font-weight: 700; color: var(--color-success); font-size: 0.9rem; }
        .spinner-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; }
        .spinner-icon { font-size: 2.5rem; color: var(--color-secondary); animation: spin 1.2s linear infinite; margin-bottom: 0.6rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadePulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .spinner-message { font-size: 0.9rem; color: var(--color-text-muted); animation: fadePulse 2s ease-in-out infinite; }
        .mobile-nav-panel { position: fixed; top: 0; right: -280px; width: 260px; max-height: 100vh; overflow-y: auto; background: white; box-shadow: -8px 0 30px rgba(0,0,0,0.12); z-index: 200; padding: 4rem 1.5rem 2rem; display: flex; flex-direction: column; gap: 0.6rem; opacity: 0; transition: right 0.3s ease, opacity 0.3s ease; }
        .mobile-nav-panel.active { right: 0; opacity: 1; }
        .mobile-nav-panel a { display: block; padding: 0.7rem 1rem; text-decoration: none; color: var(--color-text); font-weight: 500; border-radius: 30px; transition: background var(--transition-fast); }

        .site-footer { background: #0f172a; color: #cbd5e1; padding: 2rem 1.5rem; margin-top: auto; }
        .footer-intro { max-width: 900px; margin: 0 auto 1.5rem; text-align: center; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.08); }

        .footer-inner { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 2rem; }

        .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; transition: color var(--transition-fast); }
        .footer-links a:hover { color: var(--color-gold-light); }

    </style>

    <script>
        // Config
        var SUPABASE_URL = 'https://bhhndmcqjibodbfmbrpj.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoaG5kbWNxamlib2RiZm1icnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI3MzIsImV4cCI6MjA5MjA1ODczMn0.aXTyrqWOECUHccOLcrwERPWTWu46fsGxYwkt-5xbrl8';
        var supabase = window.supabase && window.supabase.createClient ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
        var API_BASE = '/api';
        var pageCache = { siteSections: null };
        var currentTab = 'crypto', selectedCoin = '', selectedAmount = 10, paymentId = null, paymentPoll = null, availableCoins = [];

        // Session
        function getCachedSession() { var c = sessionStorage.getItem('bl_sess'); if (c) { try { var p = JSON.parse(c); if (p.t && Date.now() - p.t < 300000) return p.s; } catch(e) {} } return null; }
        function setCachedSession(s) { if (s) sessionStorage.setItem('bl_sess', JSON.stringify({s:s, t:Date.now()})); else sessionStorage.removeItem('bl_sess'); }
        async function getSession() { var c = getCachedSession(); if (c) return c; if (!supabase) return null; var _a = await supabase.auth.getSession(), s = _a.data.session; setCachedSession(s); return s; }
        supabase && supabase.auth.onAuthStateChange(function(e) { if (e === 'SIGNED_OUT') sessionStorage.removeItem('bl_sess'); });

        function escapeHtml(t) { var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, function(c){return m[c];}); }
        function removeSpinner() { var s = document.getElementById('loading-spinner'); if (s) s.remove(); }
        function clearPayment() { paymentId = null; if (paymentPoll) { clearInterval(paymentPoll); paymentPoll = null; } var qp = document.getElementById('qr-panel'); if (qp) qp.innerHTML = '<p style="color:var(--color-text-muted);text-align:center;">Choose coin and amount, then tap Pay.</p>'; var st = document.getElementById('crypto-status'); if (st) st.innerHTML = ''; }

        // Site sections
        async function loadSiteSections() { if (pageCache.siteSections) return pageCache.siteSections; var r = await fetch(API_BASE + '/data?action=site-sections'); if (!r.ok) throw new Error('HTTP ' + r.status); var d = await r.json(); pageCache.siteSections = d; return d; }
        function loadFooter(data) { var fr = data.find(function(r){return r.section==='footer';}); if (fr&&fr.data&&fr.data.columns) { document.getElementById('footer-inner').innerHTML = fr.data.columns.map(function(col){ var h=escapeHtml(col.heading); var items=(col.items||[]).map(function(item){ var href=item.href?item.href.trim():'#'; var icon=item.icon?'<i class="'+escapeHtml(item.icon)+'"></i> ':''; return '<li><a href="'+escapeHtml(href)+'">'+icon+escapeHtml(item.label)+'</a></li>'; }).join(''); return '<div class="footer-links"><h4>'+h+'</h4><ul>'+items+'</ul></div>'; }).join(''); } }

        // Fetch available coins from API
        async function fetchAvailableCoins() {
            try { var r = await fetch(API_BASE + '/donate?action=currencies'); if (!r.ok) return ['usdttrc20','btc','eth']; var d = await r.json(); var popular = ['btc','eth','usdttrc20','usdterc20','usdt','bnbmainnet','trx','ltc','doge','usdc']; return (d.currencies||[]).filter(function(c){return popular.indexOf(c)!==-1;}); }
            catch(e) { return ['usdttrc20','btc','eth']; }
        }

        // Render
        async function renderPage(data) {
            var c = document.getElementById('donate-content');
            var dr = data.find(function(r){return r.section==='donate';});
            if (!dr||!dr.data) { removeSpinner(); c.innerHTML = '<div class="hero-mini"><h1>Donate</h1><p>Page being set up.</p></div>'; return; }
            var d = dr.data;
            availableCoins = await fetchAvailableCoins();
            selectedCoin = availableCoins[0] || 'usdttrc20';

            var html = '';
            html += '<div class="hero-mini"><h1>' + escapeHtml(d.title||'Support BioLearn') + '</h1><p>' + escapeHtml(d.subtitle||'Help keep biology education free.') + '</p></div>';
            var goal = d.goal_amount||500000, raised = d.raised_amount||0, pct = Math.min(Math.round((raised/goal)*100),100);
            html += '<div class="goal-bar-wrap"><div class="goal-label"><span>Monthly Goal</span><strong>'+pct+'%</strong></div><div class="goal-bar"><div class="goal-fill" style="width:'+pct+'%;"></div></div><div class="goal-label" style="margin-top:0.3rem;"><span>UGX '+raised.toLocaleString()+'</span><span>UGX '+goal.toLocaleString()+'</span></div></div>';
            html += '<div class="tab-bar"><button class="tab-btn active" data-tab="crypto"><i class="fa-brands fa-bitcoin"></i> Crypto</button><button class="tab-btn" data-tab="momo"><i class="fa-solid fa-mobile-screen"></i> Mobile Money</button></div>';

            // Crypto card
            var coinLabels = { btc:'BTC', eth:'ETH', usdttrc20:'USDT', usdterc20:'USDT', usdt:'USDT', bnbmainnet:'BNB', trx:'TRX', ltc:'LTC', doge:'DOGE', usdc:'USDC' };
            var coinIcons = { btc:'fa-brands fa-bitcoin', eth:'fa-brands fa-ethereum', usdttrc20:'fa-dollar-sign', usdterc20:'fa-dollar-sign', usdt:'fa-dollar-sign', bnbmainnet:'fa-brands fa-bootstrap', trx:'fa-brands fa-tron', ltc:'fa-brands fa-litecoin', doge:'fa-brands fa-dog', usdc:'fa-dollar-sign' };
            html += '<div class="card crypto-grid" id="crypto-panel"><div><h3><i class="fa-brands fa-bitcoin" style="color:var(--color-gold);"></i> Crypto Donation</h3>';
            html += '<div class="coin-selector">';
            availableCoins.forEach(function(cc){ html += '<button class="coin-chip'+(cc===selectedCoin?' active':'')+'" data-coin="'+cc+'"><i class="fa-solid '+(coinIcons[cc]||'fa-coins')+'"></i> '+(coinLabels[cc]||cc.toUpperCase())+'</button>'; });
            html += '</div><p style="font-size:0.8rem;color:var(--color-text-muted);margin-bottom:0.4rem;">Amount (USD)</p><div class="amount-buttons">';
            (d.suggested_amounts||[5,10,25,50,100]).forEach(function(a){ html += '<button class="amount-btn'+(a===selectedAmount?' active':'')+'" data-amount="'+a+'">$'+a+'</button>'; });
            html += '<input type="number" class="amount-input" id="custom-amount" placeholder="Custom" min="1" value="'+selectedAmount+'"></div>';
            html += '<button class="btn-donate" id="crypto-donate-btn"><i class="fa-brands fa-bitcoin"></i> Pay with Crypto</button>';
            html += '<div class="payment-status" id="crypto-status"></div></div><div class="qr-container" id="qr-panel"><p style="color:var(--color-text-muted);text-align:center;">Choose coin and amount, then tap Pay.</p></div></div>';

            // MoMo
            var momo = d.momo||{};
            html += '<div id="momo-panel" style="display:none;"><h3 style="font-family:Merriweather,serif;font-size:1.2rem;color:var(--color-primary);margin-bottom:1rem;"><i class="fa-solid fa-mobile-screen" style="color:var(--color-gold);"></i> Mobile Money</h3><div class="momo-numbers">';
            if (momo.mtn) html += '<div class="momo-card"><h4>MTN MoMo</h4><div class="number">'+escapeHtml(momo.mtn.number||'')+'</div><div class="name">'+escapeHtml(momo.mtn.name||'')+'</div><button class="btn-copy" onclick="copyText(\''+escapeHtml(momo.mtn.number||'')+'\',this)"><i class="fa-regular fa-copy"></i> Copy</button></div>';
            if (momo.airtel) html += '<div class="momo-card"><h4>Airtel Money</h4><div class="number">'+escapeHtml(momo.airtel.number||'')+'</div><div class="name">'+escapeHtml(momo.airtel.name||'')+'</div><button class="btn-copy" onclick="copyText(\''+escapeHtml(momo.airtel.number||'')+'\',this)"><i class="fa-regular fa-copy"></i> Copy</button></div>';
            html += '</div><p style="font-size:0.85rem;color:var(--color-text-muted);margin-bottom:0.8rem;">After sending, fill in your transaction details:</p><div class="form-inline"><div class="form-group"><label>Name (optional)</label><input type="text" id="momo-name" placeholder="Your name"></div><div class="form-group"><label>Amount (UGX) *</label><input type="number" id="momo-amount" placeholder="e.g. 10000" required></div><div class="form-group"><label>Transaction ID *</label><input type="text" id="momo-txid" placeholder="From MoMo SMS" required></div><button type="submit" class="btn-submit" id="momo-submit-btn"><i class="fa-solid fa-paper-plane"></i> Confirm</button></div><div class="status-text" id="momo-status"></div></div>';

            // Donor wall
            html += '<div class="card"><h3><i class="fa-solid fa-heart" style="color:var(--color-gold);"></i> Recent Supporters</h3><div id="donor-list"><p style="color:var(--color-text-muted);">Loading...</p></div></div>';

            removeSpinner(); c.innerHTML = html;
            bindEvents();
            loadDonors();
        }

        function bindEvents() {
            document.querySelectorAll('.tab-btn').forEach(function(b){ b.addEventListener('click',function(){ document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active');}); b.classList.add('active'); currentTab=b.dataset.tab; document.getElementById('crypto-panel').style.display=currentTab==='crypto'?'':'none'; document.getElementById('momo-panel').style.display=currentTab==='momo'?'':'none'; }); });
            document.querySelectorAll('.coin-chip').forEach(function(ch){ ch.addEventListener('click',function(){ document.querySelectorAll('.coin-chip').forEach(function(x){x.classList.remove('active');}); ch.classList.add('active'); selectedCoin=ch.dataset.coin; clearPayment(); }); });
            document.querySelectorAll('.amount-btn').forEach(function(b){ b.addEventListener('click',function(){ document.querySelectorAll('.amount-btn').forEach(function(x){x.classList.remove('active');}); b.classList.add('active'); selectedAmount=parseInt(b.dataset.amount); document.getElementById('custom-amount').value=selectedAmount; clearPayment(); }); });
            var ci = document.getElementById('custom-amount'); if (ci) ci.addEventListener('change',function(){ selectedAmount=parseFloat(this.value)||10; document.querySelectorAll('.amount-btn').forEach(function(x){x.classList.remove('active');}); clearPayment(); });
            var cdb = document.getElementById('crypto-donate-btn'); if (cdb) cdb.addEventListener('click', handleCryptoDonate);
            var msb = document.getElementById('momo-submit-btn'); if (msb) msb.addEventListener('click', function(e){ e.preventDefault(); handleMomoSubmit(); });
        }

        // Crypto — uses Payment API (not Invoice)
        async function handleCryptoDonate() {
            var btn = document.getElementById('crypto-donate-btn'), st = document.getElementById('crypto-status');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...'; st.innerHTML = '';
            try {
                var res = await fetch(API_BASE + '/donate?action=create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ amount: selectedAmount, pay_currency: selectedCoin }) });
                if (!res.ok) { var e = await res.json(); throw new Error(e.error||'Failed'); }
                var pay = await res.json();
                paymentId = pay.payment_id;
                var qp = document.getElementById('qr-panel');
                qp.innerHTML = '<div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data='+encodeURIComponent(pay.pay_address)+'" alt="QR" width="170" height="170"></div><div class="wallet-address">'+escapeHtml(pay.pay_address)+'</div><button class="btn-copy" onclick="copyText(\''+escapeHtml(pay.pay_address)+'\',this)"><i class="fa-regular fa-copy"></i> Copy Address</button><p style="font-size:0.78rem;color:var(--color-text-muted);margin-top:0.4rem;">Send <strong>'+pay.pay_amount+' '+pay.pay_currency.toUpperCase()+'</strong></p>';
                st.innerHTML = '<span style="color:var(--color-gold);"><i class="fa-solid fa-clock"></i> Waiting for payment...</span>';
                btn.innerHTML = '<i class="fa-solid fa-clock"></i> Awaiting payment...';
                if (paymentPoll) clearInterval(paymentPoll);
                paymentPoll = setInterval(async function() {
                    try {
                        var cr = await fetch(API_BASE + '/donate?action=status&id=' + paymentId);
                        if (!cr.ok) return;
                        var cd = await cr.json();
                        if (cd.status === 'finished' || cd.status === 'confirmed') {
                            clearInterval(paymentPoll); paymentPoll = null;
                            st.innerHTML = '<span style="color:var(--color-success);"><i class="fa-solid fa-circle-check"></i> Confirmed! Thank you!</span>';
                            btn.innerHTML = '<i class="fa-solid fa-check"></i> Received!'; btn.disabled = true;
                            qp.innerHTML = '<div style="text-align:center;font-size:3rem;">🎉</div><p style="text-align:center;color:var(--color-success);">Thank you for your support!</p>';
                            loadDonors();
                        }
                    } catch(e) {}
                }, 15000);
            } catch(err) {
                st.innerHTML = '<span style="color:var(--color-danger);">'+escapeHtml(err.message)+'</span>';
                btn.disabled = false; btn.innerHTML = '<i class="fa-brands fa-bitcoin"></i> Pay with Crypto';
            }
        }

        // MoMo
        async function handleMomoSubmit() {
            var btn = document.getElementById('momo-submit-btn'), st = document.getElementById('momo-status');
            var name = document.getElementById('momo-name').value.trim(), amount = document.getElementById('momo-amount').value.trim(), txid = document.getElementById('momo-txid').value.trim();
            if (!amount || !txid) { st.innerHTML = '<span style="color:var(--color-danger);">Amount and Transaction ID required.</span>'; return; }
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
            try {
                var res = await fetch(API_BASE + '/actions?action=submit-resource', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ title: 'Donation: '+(name||'Anonymous')+' - UGX '+amount, description: 'MoMo TxID: '+txid+' | Amount: UGX '+amount, author: name||'Anonymous', level: 'Donation', category: 'Donation', tag: 'momo-donation', file_url: '', file_size: amount+' UGX' }) });
                if (!res.ok) throw new Error('Submission failed');
                st.innerHTML = '<span style="color:var(--color-success);"><i class="fa-solid fa-circle-check"></i> Thank you! Donation will be confirmed shortly.</span>';
                document.getElementById('momo-name').value = ''; document.getElementById('momo-amount').value = ''; document.getElementById('momo-txid').value = '';
                loadDonors();
            } catch(err) { st.innerHTML = '<span style="color:var(--color-danger);">'+escapeHtml(err.message)+'</span>'; }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Confirm'; }
        }

        // Donor wall
        async function loadDonors() {
            var list = document.getElementById('donor-list'); if (!list) return;
            try { var r = await fetch(API_BASE + '/data?action=site-sections'); var d = await r.json(); var dr = d.find(function(x){return x.section==='donors';}); var donors = (dr&&dr.data&&dr.data.donors)?dr.data.donors:[]; if (!donors.length) { list.innerHTML = '<p style="color:var(--color-text-muted);text-align:center;">Be the first supporter!</p>'; return; } list.innerHTML = donors.map(function(dn){ return '<div class="donor-item"><div class="donor-avatar">'+(dn.name||'A').charAt(0).toUpperCase()+'</div><div class="donor-info"><strong>'+escapeHtml(dn.name||'Anonymous')+'</strong><span>'+escapeHtml(dn.date||'')+'</span></div><div class="donor-amount">'+escapeHtml(dn.amount||'')+'</div></div>'; }).join(''); } catch(e) { list.innerHTML = '<p style="color:var(--color-text-muted);">Unable to load.</p>'; }
        }

        // Utils
        window.copyText = function(text, btn) { if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function(){ btn.innerHTML='<i class="fa-solid fa-check"></i> Copied!'; setTimeout(function(){ btn.innerHTML='<i class="fa-regular fa-copy"></i> Copy'; },2000); }); } else { var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed';ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); btn.innerHTML='<i class="fa-solid fa-check"></i> Copied!'; setTimeout(function(){ btn.innerHTML='<i class="fa-regular fa-copy"></i> Copy'; },2000); } };

        function initMobileNav() { var ha=document.getElementById('hamburger-action'), panel=document.getElementById('mobile-nav-panel'), overlay=document.getElementById('mobile-nav-overlay'); function open(){ panel.classList.add('active'); overlay.classList.add('active'); ha.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; } function close(){ panel.classList.remove('active'); overlay.classList.remove('active'); ha.setAttribute('aria-expanded','false'); document.body.style.overflow=''; } ha.addEventListener('click',function(){ panel.classList.contains('active')?close():open(); }); overlay.addEventListener('click',close); panel.querySelectorAll('a').forEach(function(l){ l.addEventListener('click',close); }); }

        document.addEventListener('DOMContentLoaded', async function(){ document.getElementById('current-year').textContent = new Date().getFullYear(); window.addEventListener('scroll',function(){ document.getElementById('site-header').classList.toggle('scrolled',window.scrollY>10); },{passive:true}); initMobileNav(); try { var data = await loadSiteSections(); loadFooter(data); await renderPage(data); } catch(err) { removeSpinner(); document.getElementById('donate-content').innerHTML = '<div class="hero-mini"><h1>Donate</h1><p>Unable to load page.</p></div>'; } });
    </script>
</body>
</html>

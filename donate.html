<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Donate — AliverBiopharm</title>
  <meta name="description" content="Support AliverBiopharm with crypto or mobile money donations." />
  <meta name="theme-color" content="#012c2c" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: http: 'unsafe-inline' 'unsafe-eval'; script-src 'self' https: http: 'unsafe-inline' 'unsafe-eval'; style-src 'self' https: http: 'unsafe-inline'; img-src 'self' https: http: data:; font-src 'self' https: http: data:; connect-src 'self' https: http:;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            teal: {
              950: '#012c2c', 900: '#013d3d', 800: '#025252', 700: '#037070',
              600: '#069090', 500: '#0ab5b5', 400: '#2ecece', 300: '#6ee7e7',
              200: '#a8f3f3', 100: '#d4fafa',
            },
            gold: { 500: '#c9a84c', 400: '#e2c06a', 300: '#f0d896' },
            cream: '#f9f5ee',
          },
          animation: {
            'fade-up': 'fadeUp 0.7s ease forwards',
            'fade-in': 'fadeIn 1s ease forwards',
            'spin-slow': 'spin 20s linear infinite',
          },
          keyframes: {
            fadeUp: { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
          },
        },
      },
    }
  </script>
  <style>
    /* ── Global Variables & Base ── */
    :root {
      --clr-deep-space: #012c2c; --clr-cyan: #0ab5b5; --clr-magenta: #c9a84c;
      --clr-navy-card: rgba(2, 82, 82, 0.45); --clr-navy-light: rgba(2, 82, 82, 0.25);
      --clr-white: #f9f5ee; --clr-text-dim: rgba(249, 245, 238, 0.7);
      --clr-text-muted: rgba(249, 245, 238, 0.45);
      --clr-border-glow: rgba(10, 181, 181, 0.25);
      --shadow-card: 0 15px 40px rgba(0, 0, 0, 0.4);
      --shadow-magenta: 0 0 22px rgba(201, 168, 76, 0.35);
      --transition-fast: 180ms ease; --transition-smooth: 350ms cubic-bezier(0.4,0,0.2,1);
      --max-width: 900px;
      --font-body: 'DM Sans', sans-serif;
      --font-display: 'Playfair Display', serif;
      --radius-sm: 0.5rem; --radius-md: 0.85rem; --radius-lg: 1.4rem;
      --gradient-cyan: linear-gradient(135deg, #0ab5b5, #069090);
      --gradient-magenta: linear-gradient(135deg, #c9a84c, #e2c06a);
      --gold: #c9a84c; --success: #2ecece; --danger: #e2c06a;
    }
    body.light-mode {
      --clr-deep-space: #f9f5ee; --clr-cyan: #037070; --clr-magenta: #b08a2c;
      --clr-navy-card: #ffffff; --clr-navy-light: #e2f0f0;
      --clr-white: #012c2c; --clr-text-dim: #2c4a4a;
      --clr-text-muted: #4a6666;
      --clr-border-glow: rgba(3, 112, 112, 0.25);
      --shadow-card: 0 8px 36px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--clr-deep-space);
      color: var(--clr-white);
      line-height: 1.6;
      min-height: 100vh;
      display: flex; flex-direction: column;
      max-width: 100vw; overflow-x: hidden;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(10,181,181,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(201,168,76,0.06) 0%, transparent 60%);
      transition: background 0.35s, color 0.35s;
    }
    body.light-mode { background-image: none; }

    /* ── Header ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(1, 44, 44, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--clr-border-glow);
      padding: 0.8rem 0;
      transition: box-shadow var(--transition-smooth), background var(--transition-smooth);
    }
    body.light-mode .site-header { background: rgba(249, 245, 238, 0.88); }
    .site-header.scrolled { box-shadow: 0 0 28px rgba(10, 181, 181, 0.25); }

    .header-container {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
    }

    .logo-link {
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 700;
      color: var(--clr-cyan); text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem;
      text-shadow: 0 0 18px rgba(10,181,181,0.4);
      letter-spacing: -0.02em;
      transition: opacity var(--transition-fast);
    }
    .logo-link:hover { opacity: 0.88; }
    .logo-link i { color: var(--clr-magenta); }

    .home-btn {
      background: transparent; border: 1.5px solid var(--clr-cyan);
      color: var(--clr-cyan); font-size: 0.9rem; font-weight: 500;
      padding: 0.5rem 1.2rem; border-radius: 30px;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.4rem;
      transition: all var(--transition-fast);
      font-family: var(--font-body);
    }
    .home-btn:hover { background: var(--clr-cyan); color: #012c2c; }

    /* ── Main Content ── */
    .main-content {
      max-width: var(--max-width); margin: 0 auto;
      padding: 0 1.5rem 2.5rem; width: 100%; flex: 1;
    }

    .section-title {
      font-family: var(--font-display); font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 700; color: var(--clr-cyan);
      margin-bottom: 0.5rem; text-align: center;
      text-shadow: 0 0 20px rgba(10,181,181,0.25);
    }
    .section-subtitle {
      text-align: center; color: var(--clr-text-dim);
      margin-bottom: 2rem; font-size: 1rem;
    }

    /* ── Hero Banner ── */
    .hero-banner {
      padding: 4rem 2rem; margin: 0 -1.5rem 2.5rem -1.5rem;
      text-align: center; border-bottom: 2px solid var(--clr-cyan);
      background-size: cover; background-position: center;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      position: relative; overflow: hidden;
    }
    .hero-banner::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(1, 44, 44, 0.65);
      z-index: 1;
    }
    .hero-banner > * { position: relative; z-index: 2; }
    .hero-banner .section-title { text-shadow: 0 0 24px rgba(0,0,0,0.7); }
    .hero-banner .section-subtitle { text-shadow: 0 0 12px rgba(0,0,0,0.7); margin-bottom: 0; }

    /* ── Goal Bar ── */
    .goal-bar-wrap {
      margin-bottom: 2rem;
      background: var(--clr-navy-card); backdrop-filter: blur(12px);
      border: 1px solid var(--clr-border-glow);
      border-radius: var(--radius-lg); padding: 1.5rem;
      box-shadow: var(--shadow-card);
    }
    .goal-label {
      display: flex; justify-content: space-between;
      margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--clr-text-dim);
      font-weight: 500;
    }
    .goal-bar {
      height: 10px; background: var(--clr-navy-light);
      border-radius: 5px; overflow: hidden;
    }
    .goal-fill {
      height: 100%; background: var(--gradient-cyan);
      border-radius: 5px; transition: width 0.8s ease;
      box-shadow: 0 0 12px rgba(10,181,181,0.4);
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex; gap: 0.5rem; margin-bottom: 1.8rem;
      justify-content: center; flex-wrap: wrap;
    }
    .tab-btn {
      padding: 0.65rem 1.8rem;
      border: 1.5px solid var(--clr-cyan);
      background: transparent; font-weight: 600; font-size: 0.9rem;
      color: var(--clr-cyan); cursor: pointer;
      border-radius: 30px; transition: all var(--transition-fast);
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: var(--font-body);
      backdrop-filter: blur(8px);
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--clr-cyan); color: #012c2c;
      box-shadow: 0 0 18px rgba(10,181,181,0.35);
    }

    /* ── Cards ── */
    .card {
      background: var(--clr-navy-card); backdrop-filter: blur(12px);
      border: 1px solid var(--clr-border-glow);
      border-radius: var(--radius-lg); padding: 2rem;
      box-shadow: var(--shadow-card); margin-bottom: 1.5rem;
      transition: transform var(--transition-smooth), border-color var(--transition-smooth);
    }
    .card:hover { border-color: rgba(201,168,76,0.4); }
    .card h3 {
      font-family: var(--font-display); font-size: 1.3rem;
      color: var(--clr-cyan); margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    /* ── Widget ── */
    .widget-container {
      display: flex; justify-content: center; align-items: center;
      min-height: 650px; border-radius: var(--radius-md);
      overflow: hidden; background: rgba(1, 61, 61, 0.3);
      backdrop-filter: blur(8px);
      border: 1px solid var(--clr-border-glow);
    }
    .widget-container iframe { width: 100%; max-width: 360px; height: 650px; border: none; }

    .donate-btn-wrapper { text-align: center; margin-top: 1.2rem; }
    .donate-btn-wrapper a { display: inline-block; }
    .donate-btn-wrapper img {
      max-width: 260px; height: auto;
      transition: transform var(--transition-fast);
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }
    .donate-btn-wrapper img:hover { transform: scale(1.04); }

    /* ── Mobile Money ── */
    .momo-numbers {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1.2rem; margin-bottom: 1.8rem;
    }
    .momo-card {
      background: var(--clr-navy-light); backdrop-filter: blur(8px);
      border-radius: var(--radius-md); padding: 1.5rem; text-align: center;
      border: 1px solid var(--clr-border-glow);
      transition: transform var(--transition-fast);
    }
    .momo-card:hover { transform: translateY(-3px); }
    .momo-logo {
      height: 48px; margin-bottom: 0.8rem;
      display: flex; align-items: center; justify-content: center;
    }
    .momo-card .number {
      font-size: 1.2rem; font-weight: 700; color: var(--clr-white);
      font-family: var(--font-mono); margin-bottom: 0.3rem;
      letter-spacing: 0.02em;
    }
    .momo-card .name {
      font-size: 0.8rem; color: var(--clr-text-muted); margin-bottom: 0.8rem;
    }
    .btn-copy {
      background: transparent; border: 1.5px solid var(--clr-cyan);
      color: var(--clr-cyan); padding: 0.4rem 1.2rem;
      border-radius: 2rem; font-size: 0.78rem; cursor: pointer;
      transition: all var(--transition-fast);
      font-family: var(--font-body);
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .btn-copy:hover { background: var(--clr-cyan); color: #012c2c; }

    /* ── Form ── */
    .form-inline {
      display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: flex-end;
    }
    .form-group { flex: 1; min-width: 140px; }
    .form-group label {
      display: block; margin-bottom: 0.2rem; font-weight: 600;
      font-size: 0.8rem; color: var(--clr-text-dim);
      letter-spacing: 0.02em;
    }
    .form-group input {
      width: 100%; padding: 0.6rem 0.9rem;
      border: 1.5px solid var(--clr-border-glow);
      border-radius: 30px; background: rgba(2, 82, 82, 0.35);
      color: var(--clr-white); font-size: 0.85rem;
      font-family: var(--font-body);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .form-group input:focus {
      border-color: var(--clr-cyan); outline: none;
      box-shadow: 0 0 18px rgba(10,181,181,0.2);
    }
    .btn-submit {
      background: var(--gradient-cyan); color: #012c2c;
      border: none; padding: 0.65rem 1.6rem; border-radius: 30px;
      font-weight: 600; font-size: 0.85rem; cursor: pointer;
      white-space: nowrap; transition: all var(--transition-fast);
      font-family: var(--font-body);
      box-shadow: 0 4px 18px rgba(10,181,181,0.3);
      display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(10,181,181,0.45); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .status-text { font-size: 0.85rem; margin-top: 0.6rem; min-height: 1.2rem; }

    /* ── Donor List ── */
    .donor-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.8rem 0; border-bottom: 1px solid var(--clr-border-glow);
      transition: background var(--transition-fast);
    }
    .donor-item:last-child { border-bottom: none; }
    .donor-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--gradient-magenta); color: #012c2c;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
      box-shadow: 0 0 12px rgba(201,168,76,0.3);
    }
    .donor-info { flex: 1; }
    .donor-info strong { display: block; font-size: 0.9rem; color: var(--clr-white); }
    .donor-info span { font-size: 0.75rem; color: var(--clr-text-muted); }
    .donor-amount { font-weight: 700; color: var(--success); font-size: 0.9rem; }

    /* ── Footer ── */
    .footer-fat {
      background: #011f1f; border-top: 2px solid rgba(10,181,181,0.3);
      padding: 3rem 1.5rem 1.5rem; margin-top: auto;
    }
    .footer-grid {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
    }
    .footer-col h4 {
      font-family: var(--font-display); color: var(--clr-cyan);
      font-weight: 600; margin-bottom: 1rem; text-transform: uppercase;
      font-size: 0.9rem; letter-spacing: 0.05em;
    }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .footer-col a {
      color: var(--clr-text-dim); text-decoration: none;
      font-size: 0.85rem; transition: color var(--transition-fast);
    }
    .footer-col a:hover { color: var(--clr-magenta); }
    .footer-social { display: flex; gap: 1rem; margin-top: 1rem; }
    .footer-social a {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid var(--clr-cyan);
      display: flex; align-items: center; justify-content: center;
      color: var(--clr-cyan); transition: all var(--transition-fast);
    }
    .footer-social a:hover { background: var(--clr-magenta); border-color: var(--clr-magenta); color: #012c2c; }
    .footer-bottom {
      max-width: 1100px; margin: 2rem auto 0; padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center; font-size: 0.8rem; color: var(--clr-text-muted);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .momo-numbers { grid-template-columns: 1fr; }
      .hero-banner { padding: 2.5rem 1.2rem; }
      .card { padding: 1.5rem; }
      .form-inline { flex-direction: column; }
      .form-group { min-width: 100%; }
    }
  </style>
</head>
<body>
  <header class="site-header" id="site-header">
    <div class="header-container">
      <a href="index.html" class="logo-link"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
      <a href="index.html" class="home-btn"><i class="fa-solid fa-home"></i> Home</a>
    </div>
  </header>

  <main class="main-content" id="donate-content"></main>

  <footer class="footer-fat">
    <div class="footer-grid" id="footer-grid">
      <div class="footer-col">
        <a href="index.html" class="logo-link" style="font-size:1.2rem"><i class="fa-solid fa-dna"></i> AliverBiopharm</a>
        <p style="color:var(--clr-text-dim);margin-top:0.5rem">Advancing biology and pharmacy education.</p>
        <div class="footer-social" id="footer-social"></div>
      </div>
    </div>
    <div class="footer-bottom"><p>&copy; <span id="current-year"></span> AliverBiopharm</p></div>
  </footer>

  <script>
    const API_BASE = '/api/query';
    let currentTab = 'crypto';

    async function apiCall(action, params = {}) {
        const headers = { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' };
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        try {
            const res = await fetch(API_BASE, { method: 'POST', headers, body: JSON.stringify({ action, ...params }), signal: controller.signal });
            clearTimeout(timeout);
            if (res.status === 429) throw new Error('Too many requests');
            const json = await res.json();
            if (!res.ok) throw new Error(json.error || 'Request failed');
            return json.data !== undefined ? json.data : json;
        } catch (err) { clearTimeout(timeout); throw err; }
    }

    function esc(t) { const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }; return String(t || '').replace(/[&<>"']/g, c => m[c]); }

    function buildFooter(d) {
        if (!d?.columns) return;
        const fg = document.getElementById('footer-grid'), fs = document.getElementById('footer-social'), logo = fg.querySelector('.footer-col');
        fg.innerHTML = logo.outerHTML + d.columns.map(c => `<div class="footer-col"><h4>${esc(c.heading)}</h4><ul>${(c.items||[]).map(i => `<li><a href="${esc(i.href||'#')}">${i.icon?`<i class="${esc(i.icon)}" style="color:var(--clr-magenta);margin-right:0.5rem"></i>`:''}${esc(i.label)}</a></li>`).join('')}</ul></div>`).join('');
        fs.innerHTML = (d.social_links||[]).map(s => `<a href="${esc(s.url)}"><i class="${esc(s.icon)}"></i></a>`).join('');
    }

    window.copyText = (text, btn) => {
        if (!text || typeof text !== 'string') return;
        navigator.clipboard?.writeText(text).then(() => { btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!'; setTimeout(() => btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy', 2000) });
    };

    async function loadDonors() {
        const list = document.getElementById('donor-list');
        if (!list) return;
        try {
            const sections = await apiCall('get_all_sections');
            const donors = sections?.donors?.donors || [];
            if (!donors.length) { list.innerHTML = '<p style="color:var(--clr-text-dim);text-align:center">Be the first supporter!</p>'; return }
            list.innerHTML = donors.map(dn => `<div class="donor-item"><div class="donor-avatar">${esc((dn.name||'A').charAt(0).toUpperCase())}</div><div class="donor-info"><strong>${esc(dn.name||'Anonymous')}</strong><span>${esc(dn.date||'')}</span></div><div class="donor-amount">${esc(dn.amount||'')}</div></div>`).join('');
        } catch(e) { list.innerHTML = '<p style="color:var(--clr-text-dim)">Unable to load supporters.</p>' }
    }

    async function renderPage() {
        const c = document.getElementById('donate-content');
        let sectionData, momoConfig = {}, nowpaymentsApiKey = '';

        try {
            const [sections, configData] = await Promise.all([apiCall('get_all_sections'), apiCall('get_donate_page_config')]);
            if (sections) { buildFooter(sections.footer); sectionData = sections.donate; momoConfig = sections.donate_config?.momo || {}; }
            nowpaymentsApiKey = (configData && configData.nowpayments_api_key) || '';
        } catch(e) {}

        const d = sectionData || {};
        const goal = d.goal_amount || 500000, raised = d.raised_amount || 0, pct = Math.min(Math.round((raised/goal)*100), 100);
        const bgImage = d.background_image || '';

        let html = `
            <div class="hero-banner" style="${bgImage ? `background-image:url('${esc(bgImage)}');` : ''}">
                <h1 class="section-title">${esc(d.title||'Support Our Mission')}</h1>
                <p class="section-subtitle">${esc(d.subtitle||'Help keep biology and pharmacy education free and accessible.')}</p>
            </div>
            <div class="goal-bar-wrap">
                <div class="goal-label"><span>Monthly Goal</span><strong style="color:var(--clr-cyan);">${pct}%</strong></div>
                <div class="goal-bar"><div class="goal-fill" style="width:${pct}%"></div></div>
                <div class="goal-label" style="margin-top:0.6rem"><span>UGX ${raised.toLocaleString()}</span><span>UGX ${goal.toLocaleString()}</span></div>
            </div>
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="crypto"><i class="fa-brands fa-bitcoin"></i> Crypto</button>
                <button class="tab-btn" data-tab="momo"><i class="fa-solid fa-mobile-screen"></i> Mobile Money</button>
            </div>
            <div class="card" id="crypto-panel">
                <h3><i class="fa-brands fa-bitcoin" style="color:var(--gold)"></i> Donate with Cryptocurrency</h3>
                <p style="color:var(--clr-text-dim);text-align:center;margin-bottom:1.2rem">Choose your preferred method below:</p>
                <div class="widget-container"><iframe src="https://nowpayments.io/embeds/donation-widget?api_key=${esc(nowpaymentsApiKey)}" width="346" height="623" scrolling="no" style="overflow-y:hidden;">Loading donation widget...</iframe></div>
                <div class="donate-btn-wrapper"><a href="https://nowpayments.io/donation?api_key=${esc(nowpaymentsApiKey)}" target="_blank" rel="noreferrer noopener"><img src="https://nowpayments.io/images/embeds/donation-button-white.svg" alt="Donate with Crypto"></a></div>
            </div>
            <div id="momo-panel" style="display:none">
                <h3 style="font-family:var(--font-display);font-size:1.3rem;color:var(--clr-cyan);margin-bottom:1.2rem"><i class="fa-solid fa-mobile-screen" style="color:var(--gold)"></i> Mobile Money</h3>
                <div class="momo-numbers">
                    ${momoConfig.mtn ? `<div class="momo-card"><div class="momo-logo"><span style="font-size:1.8rem;font-weight:800;color:#fdc100;font-family:var(--font-display);">MTN</span></div><div class="number">${esc(momoConfig.mtn.number||'')}</div><div class="name">${esc(momoConfig.mtn.name||'')}</div><button class="btn-copy" onclick="copyText('${esc(momoConfig.mtn.number||'')}',this)"><i class="fa-regular fa-copy"></i> Copy</button></div>` : ''}
                    ${momoConfig.airtel ? `<div class="momo-card"><div class="momo-logo"><span style="font-size:1.8rem;font-weight:800;color:#ff0000;font-family:var(--font-display);">airtel</span></div><div class="number">${esc(momoConfig.airtel.number||'')}</div><div class="name">${esc(momoConfig.airtel.name||'')}</div><button class="btn-copy" onclick="copyText('${esc(momoConfig.airtel.number||'')}',this)"><i class="fa-regular fa-copy"></i> Copy</button></div>` : ''}
                </div>
                <p style="font-size:0.9rem;color:var(--clr-text-dim);margin-bottom:0.8rem">After sending, fill in your transaction details:</p>
                <div class="form-inline">
                    <div class="form-group"><label>Name (optional)</label><input type="text" id="momo-name" placeholder="Your name" maxlength="100"></div>
                    <div class="form-group"><label>Amount (UGX) *</label><input type="number" id="momo-amount" placeholder="e.g. 10000" required min="1"></div>
                    <div class="form-group"><label>Transaction ID *</label><input type="text" id="momo-txid" placeholder="From MoMo SMS" required maxlength="100"></div>
                    <button type="submit" class="btn-submit" id="momo-submit-btn"><i class="fa-solid fa-paper-plane"></i> Confirm</button>
                </div>
                <div class="status-text" id="momo-status"></div>
            </div>
            <div class="card"><h3><i class="fa-solid fa-heart" style="color:var(--gold)"></i> Recent Supporters</h3><div id="donor-list"><p style="color:var(--clr-text-dim)">Loading...</p></div></div>`;

        c.innerHTML = html;
        bindEvents();
        loadDonors();
    }

    function bindEvents() {
        document.querySelectorAll('.tab-btn').forEach(b => { b.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            currentTab = this.dataset.tab;
            document.getElementById('crypto-panel').style.display = currentTab === 'crypto' ? '' : 'none';
            document.getElementById('momo-panel').style.display = currentTab === 'momo' ? '' : 'none';
        })});

        const msb = document.getElementById('momo-submit-btn');
        if (msb) msb.addEventListener('click', async function(e) {
            e.preventDefault();
            const btn = this, st = document.getElementById('momo-status');
            const name = document.getElementById('momo-name').value.trim().slice(0, 100);
            const amount = document.getElementById('momo-amount').value.trim();
            const txid = document.getElementById('momo-txid').value.trim().slice(0, 100);
            if (!amount || !txid) { st.innerHTML = '<span style="color:var(--danger)">Amount and Transaction ID required.</span>'; return }
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
            try {
                await apiCall('submit_momo_donation', { name: name||'Anonymous', amount, txid });
                st.innerHTML = '<span style="color:var(--success)"><i class="fa-solid fa-circle-check"></i> Thank you! Donation recorded.</span>';
                document.getElementById('momo-name').value = ''; document.getElementById('momo-amount').value = ''; document.getElementById('momo-txid').value = '';
                loadDonors();
            } catch(err) { st.innerHTML = `<span style="color:var(--danger)">${esc(err.message)}</span>` }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Confirm' }
        });
    }

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('current-year').textContent = new Date().getFullYear();
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        window.addEventListener('scroll', () => { document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 10) }, { passive: true });
        await renderPage();
    });
  </script>
</body>
</html>
